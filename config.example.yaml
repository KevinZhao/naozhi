server:
  addr: ":8180"
  dashboard_token: "${NAOZHI_DASHBOARD_TOKEN}"
  trusted_proxy: true

workspace:
  id: "your-node-id"
  name: "Your Node Name"

cli:
  path: "~/.local/bin/claude"
  # --dangerously-skip-permissions is always applied by protocol_claude.go; no need to repeat here.
  # Naozhi's dashboard markdown renderer escapes raw HTML as a security
  # measure (see dashboard.js renderMdUncached + inlineMd), so <details>,
  # <summary>, <kbd>, <sub>, <sup> etc. render as literal text instead of
  # collapsible widgets. Instruct the model to stick to pure Markdown.
  args: []

session:
  max_procs: 20
  ttl: "30m"
  prune_ttl: "72h"
  cwd: "/path/to/your/workspace"
  watchdog:
    no_output_timeout: "1800s"
    total_timeout: "14400s"
  store_path: "~/.naozhi/sessions.json"
  shim:
    idle_timeout: "8h"
  queue:
    # Message queuing when a session is busy. Three modes:
    #   collect     (default) — queue new messages, wait for current turn,
    #                 merge into a single follow-up prompt after a settle delay
    #   interrupt   — auto-abort the current turn on every new message; burns
    #                 tokens but minimizes response latency
    #   passthrough — forward every message directly to the CLI; each message
    #                 gets its own result (or a merged group result with
    #                 head/follower IM fan-out). Requires stream-json backend
    #                 (Claude CLI). ACP backends silently fall back to collect.
    #                 Enables /urgent <msg> for priority:"now" preemption.
    mode: "collect"
    max_depth: 20
    collect_delay: "500ms"

agents:
  code-reviewer:
    model: "sonnet"
    args: ["--append-system-prompt", "You are a code review expert. Review code for quality, security, and maintainability."]
  researcher:
    model: "opus"
    args: ["--append-system-prompt", "You are a deep research expert. Decompose questions, search from multiple angles, and synthesize findings."]

agent_commands:
  review: "code-reviewer"
  research: "researcher"

cron:
  store_path: "~/.naozhi/cron_jobs.json"
  max_jobs: 50
  # Per-job timeout is schedule_period × 0.8, clamped to [3m, execution_timeout].
  # Set this to the longest period you schedule × 0.8 (or slightly more) so long
  # schedules get their full proportional budget; short schedules auto-scale down.
  execution_timeout: "8h"
  # IANA timezone for interpreting cron expressions (e.g. "0 9 * * *" = 9am in this zone).
  # Empty / "Local" uses the system local time (respects $TZ). Examples: "Asia/Shanghai", "UTC".
  timezone: "Asia/Shanghai"
  # Fallback IM target for jobs that opt into completion notifications via the
  # dashboard toggle but don't specify a per-job target. Both fields required.
  # Leave empty to disable the default (per-job targets still work).
  notify_default:
    platform: "feishu"
    chat_id: "${NAOZHI_CRON_NOTIFY_CHAT_ID}"
  # 调度抖动上限：多个同 schedule 的 job 不再"整点同秒起跑"，而是在
  # [0, min(jitter_max, period/4)] 区间内随机延迟，拍平 CPU / API 并发峰值。
  # 默认 2m。"0" 关闭抖动（回退到 v1 行为）。上限硬编码 10m。TriggerNow
  # （dashboard 的 "run now" 按钮）始终跳过抖动立即执行。
  jitter_max: "2m"

platforms:
  feishu:
    app_id: "${FEISHU_APP_ID}"
    app_secret: "${FEISHU_APP_SECRET}"
    verification_token: "${FEISHU_VERIFICATION_TOKEN}"
    encrypt_key: "${FEISHU_ENCRYPT_KEY}"
    max_reply_length: 4000

log:
  level: "info"

transcribe:
  enabled: true
  provider: "aws"
  region: "ap-northeast-1"
  language: "zh-CN,en-US"

projects:
  root: "/path/to/your/workspace"
  planner_defaults:
    model: "sonnet"

# Reverse-connect nodes: remote machines dial in to this primary (NAT traversal).
# Each entry is node_id: {token, display_name}. Token must match upstream.token on the remote.
#reverse_nodes:
