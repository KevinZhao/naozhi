# lint-server-handlers exemptions
#
# 数据来源：origin/master HEAD 5a7f04aa (2026-05-28 实测，含 Phase 4b PRs)
# 配套：docs/design/server-split-phase4-design.md v0.6.1 §6.2.0.4 + §0 事实速查表
#
# 规则：
# - server 包文件硬上限 limit:500（不是 800）— 见 §9.2 file_size budget
# - dashboard 子包文件硬上限 800（v0.6.1 暂无此条目）
# - 每条 until_phase 标到具体 phase；该 phase merge 时 PR commit 必须含
#   "Closes-exemption: <file>" trailer，否则 rule 5 (stale_exemption) fail
# - 豁免清单只在 Phase 0 一次性建立，后续 phase 不允许新增条目；但 baseline
#   `current` 必须随 master 漂移更新（preflight 必检 — 见 §6.2.0.4）

file_size:
    # 9 个 > 800 行 + 2 个 500-800 行 = 11 个超 server 500 硬上限
    # ── 9 个 > 800 行 ──
    # internal/server/dashboard_session.go: removed Phase 3e (PR #1441) — file
    # moved to internal/dashboard/session/handlers.go. Closes-exemption trailer
    # in commit message satisfies rule 5.
    - path: internal/dashboard/session/handlers.go
      current: 1873                         # Phase 3e 搬迁后实际行数；含 New ctor + Deps + getters
      limit: 800
      until_phase: "5"        # Phase 5 内部拆分（按 6 handler + history cache + retired store 分文件）
    # internal/server/project_files.go: removed Phase 2 (PR #1437) — file
    # moved to internal/dashboard/project/files.go. Closes-exemption trailer
    # in commit message satisfies rule 5. New dashboard/project/files.go
    # entry tracks the post-move size (1633) until Phase 5 internal split.
    - path: internal/dashboard/project/files.go
      current: 1633                         # Phase 2 搬迁后实际行数；dashboard 子包硬上限 800
      limit: 800
      until_phase: "5"        # Phase 5 内部拆分（每个 serve* / handle* 一个文件）
    - path: internal/server/dashboard_send.go
      current: 997                          # 2026-05-28 persistFileRefs 抽到 send_persist.go (Phase 3f-prep)，dashboard_send.go 累计缩减 515 行
      limit: 500
      until_phase: 3f
    # internal/server/dashboard_cron.go: removed Phase 1 (PR #1438) — file
    # moved to internal/dashboard/cron/handlers.go. Closes-exemption trailer
    # in commit message satisfies rule 5.
    # internal/server/dashboard_cron_transcript.go: removed Phase 1 — file
    # moved to internal/dashboard/cron/transcript.go.
    - path: internal/dashboard/cron/handlers.go
      current: 1628                         # Phase 1 搬迁后实际行数；含 New ctor + Deps + getter
      limit: 800
      until_phase: "5"        # Phase 5 内部拆分（按 11 handler 分文件）
    - path: internal/dashboard/cron/transcript.go
      current: 1438                         # Phase 1 搬迁后实际行数
      limit: 800
      until_phase: "5"        # Phase 5 内部拆分
    - path: internal/server/server.go
      current: 992                          # 2026-05-28 cookie + warning helpers 抽到独立文件 (Phase 5-prep)
      limit: 500
      until_phase: "5"
    - path: internal/server/wshub.go        # v0.6.1 新增豁免：v0.4 时 514 不超线
      current: 1107                         # 2026-05-28 master + Phase 3a auth import
      limit: 500
      until_phase: 4b
    - path: internal/server/routes.go         # v0.6.1 新增豁免：v0.4 时 731 不超线
      current: 575                          # 2026-05-28 embed.FS + ETag helper 抽到 static_assets.go (Phase 5-prep)
      limit: 500
      until_phase: "5"
    - path: internal/server/agent_tailer.go # v0.6.1 新增豁免：v0.4 时 655 不超线
      current: 356                          # 2026-05-28 tailerRegistry 抽到 agent_tailer_registry.go (Phase 4c-prep)；agent_tailer.go 现仅含 agentTailer struct + 方法（已不超 500 限）
      limit: 500
      until_phase: 4c
    # ── 2 个 500-800 行（v0.6.1 新增） ──
    - path: internal/server/send.go
      current: 567                          # 2026-05-31 R248-ARCH-9 (#379) headless 显式模式 + nil-hub fail-loud 守卫 + 文档
      limit: 500
      until_phase: 3f
    # internal/server/dashboard_auth.go: removed Phase 3a (PR #1436) — file
    # moved to internal/dashboard/auth/handlers.go. Closes-exemption trailer
    # in commit message satisfies rule 5.

# Phase 0 baseline 锁定的 Server.handle* 方法（rule 1: handle_decl）
# 新增的 (s *Server) handle* 方法 → linter fail
# v0.6.1 校准：origin/master HEAD 5788207b 比 v0.4 baseline 多 1 个
# (handlePlannerStats，#1349 加入)
# 2026-05-28 静态资源清理：4 个零状态 handler（handleAgentViewJS / handleDashboardJS
# / handleManifest / handleSW）转为包级 func，从 baseline 移除。剩 4 个 *Server
# handler 待 Phase 5 处理（handleDashboard / handleClearLabelOrigin /
# handlePlannerStats / handleSystemDaemons —— 这些都依赖 s.X 字段）。
handle_baseline:
    - Server.handleClearLabelOrigin
    - Server.handleDashboard
    - Server.handlePlannerStats     # v0.6.1 新增：PR #1349 引入
    - Server.handleSystemDaemons
