server:
  addr: ":8180"

cli:
  path: "~/.local/bin/claude"
  model: "sonnet"
  args:
    - "--dangerously-skip-permissions"

session:
  max_procs: 3
  ttl: "30m"
  watchdog:
    no_output_timeout: "120s"
    total_timeout: "300s"
  store_path: "~/.naozhi/sessions.json"

agents:
  code-reviewer:
    model: "sonnet"
    args: ["--append-system-prompt", "You are a code review expert. Review code for quality, security, and maintainability."]
  researcher:
    model: "opus"
    args: ["--append-system-prompt", "You are a deep research expert. Decompose questions, search from multiple angles, and synthesize findings."]

agent_commands:
  review: "code-reviewer"
  research: "researcher"

cron:
  store_path: "~/.naozhi/cron_jobs.json"
  max_jobs: 50
  execution_timeout: "300s"

platforms:
  feishu:
    app_id: "${IM_APP_ID}"
    app_secret: "${IM_APP_SECRET}"
    verification_token: "${IM_VERIFICATION_TOKEN}"
    encrypt_key: "${IM_ENCRYPT_KEY}"
    max_reply_length: 4000

log:
  level: "info"
