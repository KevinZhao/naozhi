server:
  addr: ":8180"

workspace:
  id: "ec2-dev"
  name: "EC2 Dev"

cli:
  path: "~/.local/bin/claude"
  model: "sonnet"
  args:
    - "--dangerously-skip-permissions"

session:
  max_procs: 20
  ttl: "30m"
  cwd: "/home/ec2-user/workspace"
  watchdog:
    no_output_timeout: "1800s"
    total_timeout: "14400s"
  store_path: "~/.naozhi/sessions.json"

agents:
  code-reviewer:
    model: "sonnet"
    args: ["--append-system-prompt", "You are a code review expert. Review code for quality, security, and maintainability."]
  researcher:
    model: "opus"
    args: ["--append-system-prompt", "You are a deep research expert. Decompose questions, search from multiple angles, and synthesize findings."]

agent_commands:
  review: "code-reviewer"
  research: "researcher"

cron:
  store_path: "~/.naozhi/cron_jobs.json"
  max_jobs: 50
  execution_timeout: "300s"

platforms:
  feishu:
    app_id: "${FEISHU_APP_ID}"
    app_secret: "${FEISHU_APP_SECRET}"
    verification_token: "${FEISHU_VERIFICATION_TOKEN}"
    encrypt_key: "${FEISHU_ENCRYPT_KEY}"
    max_reply_length: 4000

log:
  level: "info"

transcribe:
  enabled: true
  provider: "aws"
  region: "us-west-2"
  language: "zh-CN"

projects:
  root: "/home/ec2-user/workspace"
  planner_defaults:
    model: "sonnet"

workspaces:
  macbook:
    url: "http://192.168.1.101:8180"
    token: ""
    display_name: "MacBook Pro"

# Reverse-connect nodes: remote machines dial in to this primary (NAT traversal).
# Each entry is node_id: {token, display_name}. Token must match upstream.token on the remote.
reverse_nodes:
  pc:
    token: "cdf413552fadce22f6c7e413c83f444dd58c2a89a2664700d311226442f478c7"
    display_name: "PC (10.200.0.10)"

# Upstream: this node dials a primary naozhi instance (reverse-connect mode).
# Use when this machine is behind NAT and cannot be reached by the primary directly.
#upstream:
#  url: "wss://primary.example.com/ws-node"
