<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>naozhi dashboard</title>
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0d1117">
<!-- KaTeX stylesheet is injected lazily by dashboard.js on first math render to keep first paint unblocked. -->
<style>
:root{
  --nz-bg-0:#0d1117;--nz-bg-1:#161b22;--nz-bg-2:#21262d;--nz-border:#30363d;
  --nz-text:#c9d1d9;--nz-text-strong:#f0f6fc;--nz-text-mute:#8b949e;
  --nz-text-dim:#6e7681;--nz-text-faint:#484f58;
  --nz-accent:#58a6ff;--nz-blue:#1f6feb;--nz-green:#3fb950;
  --nz-red:#da3633;--nz-amber:#d29922;
  --nz-focus:#58a6ff;
}
/* Global focus-visible: keyboard users get a clear ring, mouse users don't. */
:focus{outline:none}
:focus-visible{outline:2px solid var(--nz-focus);outline-offset:2px;border-radius:4px}
button:focus-visible,[role="button"]:focus-visible{box-shadow:0 0 0 2px rgba(88,166,255,.35)}
/* Respect reduced motion preferences site-wide. */
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;height:100%;width:100%;overscroll-behavior:none;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace;background:var(--nz-bg-0);color:var(--nz-text);font-size:20px}
.container{display:flex;height:100%;height:100dvh;overflow:hidden;width:100%}

.sidebar{width:360px;min-width:200px;max-width:60vw;border-right:none;display:flex;flex-direction:column}
.resizer{width:4px;cursor:col-resize;background:var(--nz-border);flex-shrink:0;transition:background .15s}
.resizer:hover,.resizer.dragging{background:var(--nz-accent)}
.sidebar-header{padding:16px;border-bottom:1px solid var(--nz-border)}
.sidebar-header .header-row{display:flex;align-items:center;justify-content:space-between}
.sidebar-header h1{font-size:19px;color:var(--nz-text-strong);font-weight:600}
.session-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--nz-border) transparent}

.sidebar-status{padding:6px 16px;border-top:1px solid var(--nz-border);font-size:12px;color:var(--nz-text-mute);flex-shrink:0;max-height:40%;overflow-y:auto}
.sidebar-status .status-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.sidebar-status .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-status .status-dot.ok,.sidebar-status .status-dot.connected{background:var(--nz-green)}
.sidebar-status .status-dot.connecting,.sidebar-status .status-dot.authenticating{background:var(--nz-amber);animation:pulse 1.5s ease-in-out infinite}
.sidebar-status .status-dot.disconnected,.sidebar-status .status-dot.error{background:var(--nz-red)}
.sidebar-status .status-dot.offline,.sidebar-status .status-dot.off{background:var(--nz-text-faint)}
.sidebar-status .status-info{flex:1;min-width:0;overflow:hidden}
.sidebar-status .status-ws{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-status .status-sys{color:var(--nz-text-dim);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

.session-card{position:relative;display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--nz-bg-2);cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.session-card:hover{background:var(--nz-bg-1)}
.session-card.active{background:#1f2937;border-left-color:var(--nz-accent)}
.session-card.dead-card{opacity:.6}
.session-card .btn-dismiss{position:absolute;top:4px;right:6px;background:none;border:none;color:var(--nz-text-faint);font-size:17px;cursor:pointer;padding:0 4px;line-height:1;opacity:0;transition:opacity .15s}
.session-card:hover .btn-dismiss{opacity:1}
.session-card .btn-dismiss:hover{color:var(--nz-red)}

.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:12px;font-weight:600}
.badge.running{background:#238636;color:#fff}
.badge.ready{background:var(--nz-blue);color:#fff}

.badge.new{background:var(--nz-blue);color:#fff;border:1px dashed var(--nz-accent)}
.badge.paused{background:var(--nz-text-faint);color:var(--nz-text)}
.death-tag{font-size:11px;color:var(--nz-text-mute);background:var(--nz-bg-2);padding:1px 4px;border-radius:4px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative}
.main-header{padding:8px 20px;border-bottom:1px solid var(--nz-border);flex-shrink:0;display:flex;align-items:center;gap:8px}
.main-header-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.main-header h2{font-size:16px;color:var(--nz-text-strong);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.main-header h2 .btn-rename{margin-left:6px;background:transparent;border:0;color:var(--nz-text-mute);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:3px;vertical-align:baseline;opacity:0;transition:opacity 120ms ease,color 120ms ease}
.main-header:hover h2 .btn-rename,.main-header h2 .btn-rename:focus-visible{opacity:1}
.main-header h2 .btn-rename:hover{color:var(--nz-text-strong);background:rgba(255,255,255,0.06)}
.main-header .detail{font-size:12px;color:var(--nz-text-dim);display:flex;justify-content:space-between;align-items:center;gap:8px}
.main-header .detail-left,.main-header .detail-right{display:flex;align-items:center;gap:6px;white-space:nowrap}
.main-header .detail-cost{color:var(--nz-text-mute);font-variant-numeric:tabular-nums}
.main-header .detail-cost.has-cost{color:#e6edf3}
.main-header .detail-cost.high-cost{color:var(--nz-amber)}

.events{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 0;scrollbar-width:thin;scrollbar-color:var(--nz-border) transparent;min-width:0}
/* Message navigation pill */
.nav-pill{position:absolute;right:16px;bottom:100px;display:flex;flex-direction:column;align-items:center;gap:0;background:rgba(22,27,34,.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--nz-border);border-radius:20px;padding:4px;z-index:10;opacity:0;pointer-events:none;transition:opacity .2s;user-select:none}
.nav-pill.visible{opacity:1;pointer-events:auto}
.nav-pill button{width:32px;height:28px;background:none;border:none;color:var(--nz-text-mute);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:14px;transition:all .15s}
.nav-pill button:hover{background:var(--nz-border);color:var(--nz-text)}
.nav-pill .nav-counter{font-size:10px;color:var(--nz-text-dim);padding:0 4px;white-space:nowrap;cursor:pointer;transition:color .15s}
.nav-pill .nav-counter:hover{color:var(--nz-text)}
.event.nav-highlight .event-content{box-shadow:0 0 0 2px var(--nz-accent)}
.event{display:flex;gap:10px;padding:6px 24px;max-width:clamp(760px,65vw,1200px);margin-left:auto;margin-right:auto;width:100%;box-sizing:border-box}
.event-icon{width:26px;height:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:14px}
.event-content{flex:1;font-size:15px;line-height:1.6;word-break:break-word;overflow-wrap:anywhere;min-width:0;white-space:normal;transition:box-shadow .3s ease}
.md-blank{display:block;height:0.75em}
/* User messages: right-aligned bubble */
.event.user{flex-direction:row-reverse}
.event.user .event-icon{background:rgba(88,166,255,.15);color:var(--nz-accent);font-size:13px}
.event.user .event-content{flex:0 1 auto;max-width:80%;color:#e6edf3;background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.2);padding:10px 14px;border-radius:18px 18px 4px 18px}
/* AI text: left-aligned, clean markdown */
.event.text .event-icon{background:rgba(163,118,255,.15);color:#a376ff;font-size:13px}
.event.text .event-content{color:var(--nz-text);max-width:clamp(720px,60vw,1100px)}
/* Copy button for long AI messages — bottom of content, always visible */
.event-copy-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1px solid var(--nz-border);border-radius:4px;color:var(--nz-text-faint);font-size:11px;padding:1px 8px;cursor:pointer;transition:color .15s,border-color .15s;line-height:1.6;margin-top:8px}
.event-copy-btn:hover{color:var(--nz-text);border-color:var(--nz-text-faint)}
.event-copy-btn.copied{color:var(--nz-green);border-color:var(--nz-green)}
/* System/init: centered label */
.event.system,.event.init{justify-content:center;padding-top:12px;padding-bottom:12px}
.event.system .event-icon,.event.init .event-icon{display:none}
.event.system .event-content,.event.init .event-content{flex:none;color:var(--nz-text-dim);font-size:12px;text-align:center}
/* Hidden types (kept for safety) */
.event.thinking .event-content{color:#a5d6ff;font-style:italic}
.event.result{margin:2px 0}
.event.result .event-content{color:#7ee787;background:rgba(126,231,135,.05);padding:4px 8px;border-radius:4px;border-left:2px solid var(--nz-green)}
.event.agent .event-content{color:#a5d6ff}
.event.agent{background:rgba(56,139,253,.05);border-left:2px solid #388bfd}
/* Todo checklist bubble — neutral framing, keeps per-item legibility */
.event.todo .event-icon{background:rgba(139,148,158,.12);color:var(--nz-text-mute);font-size:12px}
.event.todo .event-content{color:var(--nz-text);background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:8px;padding:10px 14px;max-width:clamp(600px,55vw,900px)}
.todo-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--nz-bg-2)}
.todo-title{font-size:13px;font-weight:600;color:var(--nz-text-strong);letter-spacing:.02em}
.todo-counts{display:flex;gap:6px;font-variant-numeric:tabular-nums}
.todo-count{display:inline-flex;align-items:center;padding:1px 8px;border-radius:10px;background:var(--nz-bg-2);font-size:11px;line-height:1.5;color:var(--nz-text-dim)}
.todo-count.done{color:var(--nz-green);background:rgba(63,185,80,.08)}
.todo-count.active{color:var(--nz-accent);background:rgba(88,166,255,.1)}
.todo-list{list-style:none;margin:0;padding:0}
.todo-item{display:flex;gap:8px;align-items:flex-start;padding:3px 0;font-size:14px;line-height:1.55}
.todo-mark{flex-shrink:0;width:18px;text-align:center;font-size:13px;line-height:1.55;user-select:none}
.todo-done .todo-mark{color:var(--nz-green)}
.todo-active .todo-mark{color:var(--nz-accent)}
.todo-pending .todo-mark{color:var(--nz-text-faint)}
.todo-text{flex:1;word-break:break-word}
.todo-done .todo-text{color:var(--nz-text-mute);text-decoration:line-through;text-decoration-color:var(--nz-text-faint)}
.todo-active .todo-text{color:var(--nz-text-strong);font-weight:500}
.todo-pending .todo-text{color:var(--nz-text)}
/* Turn separation */
.event.text+.event.user{margin-top:24px}
.event.user+.event.text{margin-top:8px}
.event.system+.event.user,.event.system+.event.text,.event.init+.event.user,.event.init+.event.text{margin-top:8px}
.event.user+.event.user,.event.text+.event.text{margin-top:2px}
.event-time-divider{text-align:center;color:var(--nz-text-dim);font-size:11px;margin:16px 0 6px;opacity:.55;user-select:none;letter-spacing:.02em}
.empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:var(--nz-text-dim);font-size:15px}
.no-sessions{padding:40px 16px;text-align:center;color:var(--nz-text-faint);font-size:14px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Message input area */
.input-area{border-top:1px solid var(--nz-border);padding:12px 20px;flex-shrink:0;background:var(--nz-bg-0)}
.input-area.disabled{opacity:.5;pointer-events:none}
.file-preview{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.file-thumb{position:relative;width:60px;height:60px;border-radius:6px;overflow:hidden;border:1px solid var(--nz-border)}
.file-thumb img{width:100%;height:100%;object-fit:cover}
.file-thumb .remove{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--nz-red);color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.upload-status{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.upload-status.uploading{background:rgba(0,0,0,.45)}
.upload-status.uploading::after{content:'';width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.upload-status.error{background:rgba(218,54,51,.55);color:#fff}
.event-images{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.event-images img{max-width:300px;max-height:240px;border-radius:6px;border:1px solid var(--nz-border);cursor:pointer;transition:opacity .15s}
.event-images img:hover{opacity:.85}
.lightbox-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);align-items:center;justify-content:center;cursor:zoom-in}
.lightbox-overlay.active{display:flex}
.lightbox-overlay.zoomed{cursor:grab}
.lightbox-overlay.dragging{cursor:grabbing!important}
.lightbox-overlay img{max-width:92vw;max-height:92vh;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,.6);user-select:none;-webkit-user-drag:none}
.lb-zoom-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.8);font-size:13px;background:rgba(0,0,0,.55);padding:4px 14px;border-radius:12px;pointer-events:none;opacity:0;transition:opacity .3s}
.lb-zoom-hint.visible{opacity:1}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row #msg-input{flex:1;background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:8px;color:var(--nz-text);padding:8px 12px;font-family:inherit;font-size:16px;min-height:38px;max-height:120px;outline:none;line-height:1.4;overflow-y:auto;white-space:pre-wrap;word-break:break-word;-webkit-user-select:text;user-select:text}
.input-row #msg-input:focus{border-color:var(--nz-accent)}
.input-row #msg-input:empty::before{content:attr(data-placeholder);color:var(--nz-text-faint);pointer-events:none}
.btn-icon{width:36px;height:36px;border:1px solid var(--nz-border);border-radius:8px;background:var(--nz-bg-1);color:var(--nz-text-mute);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s}
.btn-icon:hover{background:#1f2937;color:var(--nz-text);border-color:var(--nz-text-faint)}
.btn-icon.sending{opacity:.5;pointer-events:none}
.btn-send{background:#238636;border-color:#238636;color:#fff}
.btn-send:hover{background:#2ea043}
.btn-stop{background:var(--nz-red);border-color:var(--nz-red);color:#fff;display:none}
.btn-stop:hover{background:#b62324}
.btn-mic{font-size:16px;position:relative}
.btn-mic.recording{background:var(--nz-red);border-color:var(--nz-red);color:#fff;animation:pulse 1.5s ease-in-out infinite}
.rec-badge{position:absolute;top:-6px;right:-6px;background:var(--nz-red);color:#fff;font-size:10px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:monospace;pointer-events:none}
.btn-mic.transcribing{opacity:.5;pointer-events:none}

/* Voice input mode (WeChat-style hold-to-talk) */
.btn-hold-talk{display:none;flex:1;background:var(--nz-bg-2);border:1px solid var(--nz-border);border-radius:8px;color:var(--nz-text-mute);font-size:15px;padding:8px 12px;min-height:38px;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;text-align:center;transition:all .15s;font-family:inherit}
.btn-hold-talk.active{background:#238636;border-color:#238636;color:#fff}
.input-area.voice-mode .btn-hold-talk{display:block}
.input-area.voice-mode #msg-input{display:none}
.input-area.voice-mode .btn-send{display:none}
.input-area.voice-mode .file-preview{display:none}
.input-area.voice-mode .btn-mic{background:var(--nz-bg-2);border-color:var(--nz-accent);color:var(--nz-accent)}

/* Inline file reference chips in event bubbles */
.file-ref{display:inline-flex;align-items:center;gap:4px;vertical-align:baseline}
.file-ref code{cursor:default}
.file-ref .fr-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;padding:0;border:1px solid var(--nz-border);border-radius:4px;background:var(--nz-bg-2);color:var(--nz-text-mute);font-size:12px;font-family:inherit;cursor:pointer;line-height:1;transition:all .15s}
.file-ref .fr-btn:hover{background:var(--nz-bg-1);color:var(--nz-accent);border-color:var(--nz-accent)}
.file-ref.fr-verified .fr-btn{border-color:rgba(88,166,255,.4)}
.file-ref.fr-candidate .fr-btn{border-style:dashed;opacity:.7}
.file-ref.fr-missing{opacity:.6}
.file-ref.fr-missing .fr-btn{display:none}

/* File viewer drawer — side panel for previewing workspace files */
.fv-drawer{position:fixed;top:0;right:0;bottom:0;width:min(720px,60vw);background:var(--nz-bg-1);border-left:1px solid var(--nz-border);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s ease;box-shadow:-2px 0 12px rgba(0,0,0,.4)}
.fv-drawer.fv-open{transform:translateX(0)}
.fv-drawer.hidden{pointer-events:none;visibility:hidden}
.fv-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--nz-border);flex-shrink:0;min-height:48px}
.fv-title-wrap{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.fv-title{font-size:13px;color:var(--nz-text-strong);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'SF Mono',ui-monospace,monospace}
.fv-meta{font-size:11px;color:var(--nz-text-dim)}
.fv-actions{display:flex;gap:6px;flex-shrink:0}
.fv-btn{height:26px;padding:0 10px;border:1px solid var(--nz-border);border-radius:6px;background:var(--nz-bg-2);color:var(--nz-text);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}
.fv-btn:hover{background:var(--nz-bg-0);border-color:var(--nz-accent);color:var(--nz-accent)}
.fv-close{font-size:18px;line-height:1;padding:0 8px}
.fv-body{flex:1;overflow:auto;padding:12px 16px;scrollbar-width:thin;scrollbar-color:var(--nz-border) transparent}
.fv-body pre{font-size:12px;line-height:1.5;color:var(--nz-text);white-space:pre;word-break:normal;font-family:'SF Mono',ui-monospace,monospace;margin:0}
.fv-body pre code{font-family:inherit}
.fv-body pre.fv-lined{display:grid;grid-template-columns:auto 1fr;gap:0 12px;white-space:normal}
.fv-body pre.fv-lined .fv-gutter{text-align:right;color:var(--nz-text-faint);user-select:none;padding-right:8px;border-right:1px solid var(--nz-border);white-space:pre;font-variant-numeric:tabular-nums}
.fv-body pre.fv-lined code{white-space:pre;display:block}
.fv-body img{max-width:100%;max-height:calc(100vh - 120px);display:block;margin:0 auto;border:1px solid var(--nz-border);border-radius:6px}
.fv-body iframe{width:100%;height:calc(100vh - 80px);border:none;background:#fff;border-radius:6px}
.fv-body .fv-binary{padding:32px;text-align:center;color:var(--nz-text-mute)}
.fv-body .fv-binary .fv-mime{display:block;margin-top:8px;font-family:'SF Mono',ui-monospace,monospace;font-size:11px;color:var(--nz-text-dim)}
.fv-body .fv-truncated{padding:8px 12px;background:rgba(210,153,34,.1);border-left:3px solid var(--nz-amber);color:var(--nz-amber);font-size:12px;margin-bottom:10px;border-radius:3px}
.fv-body .fv-loading,.fv-body .fv-error{padding:24px;text-align:center;color:var(--nz-text-mute);font-size:13px}
.fv-body .fv-error{color:var(--nz-red)}
@media(max-width:768px){.fv-drawer{width:100%;max-width:100vw}.fv-body iframe{height:calc(100vh - 100px)}}

/* Voice recording overlay */
.voice-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.voice-overlay.show{opacity:1;pointer-events:auto}
.vo-card{background:#1c2128;border:1px solid var(--nz-border);border-radius:16px;padding:32px 40px;display:flex;flex-direction:column;align-items:center;gap:16px;min-width:200px;transition:border-color .2s}
.vo-timer{font-size:48px;color:var(--nz-text-strong);font-weight:300;font-family:'SF Mono',ui-monospace,monospace;letter-spacing:2px}
.vo-wave{display:flex;align-items:center;justify-content:center;gap:3px;height:40px}
.vo-wave span{display:block;width:4px;background:var(--nz-green);border-radius:2px;transition:background .2s;animation:wave-bar .8s ease-in-out infinite}
.vo-wave span:nth-child(1){animation-delay:0s;height:12px}
.vo-wave span:nth-child(2){animation-delay:.1s;height:20px}
.vo-wave span:nth-child(3){animation-delay:.2s;height:28px}
.vo-wave span:nth-child(4){animation-delay:.3s;height:24px}
.vo-wave span:nth-child(5){animation-delay:.15s;height:16px}
.vo-wave span:nth-child(6){animation-delay:.25s;height:32px}
.vo-wave span:nth-child(7){animation-delay:.35s;height:20px}
@keyframes wave-bar{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.5)}}
.vo-hint{font-size:14px;color:var(--nz-text-mute);transition:all .2s}
.voice-overlay.cancel .vo-wave span{background:var(--nz-red)}
.voice-overlay.cancel .vo-hint{color:var(--nz-red);font-weight:600}
.voice-overlay.cancel .vo-card{border-color:var(--nz-red)}
.voice-overlay.transcribing .vo-wave span{animation:none;height:4px;background:var(--nz-accent)}
.voice-overlay.transcribing .vo-hint{color:var(--nz-accent)}

.input-hints{font-size:11px;color:var(--nz-text-faint);margin-top:4px;text-align:right;user-select:none}
.running-banner{background:#1a2332;border-bottom:1px solid rgba(31,111,235,.27);font-size:13px;color:var(--nz-accent);flex-shrink:0}
.rb-tool-row{display:flex;align-items:center;padding:6px 12px;gap:8px}
.rb-tool-row .running-status{flex:1;min-width:0;display:flex;align-items:center;gap:4px;overflow:hidden}
.rb-tool-row .running-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--nz-accent);flex-shrink:0;animation:pulse 1.5s ease-in-out infinite}
#tool-activity{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rb-elapsed{color:var(--nz-text-mute);font-size:12px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rb-thinking-summary{padding:0 12px 4px 22px;font-size:11px;color:var(--nz-text-mute);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rb-agents{max-height:120px;overflow-y:auto}
.rb-agent-row{display:flex;align-items:center;gap:5px;padding:3px 12px 3px 22px;font-size:11px;color:var(--nz-text-mute)}
.rb-agent-row .sa-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--nz-accent);flex-shrink:0;animation:pulse 1.5s ease-in-out infinite}
.rb-agent-row.done .sa-dot{background:var(--nz-green);animation:none}
.rb-agent-row .sa-bg{color:var(--nz-amber);margin-right:2px;font-size:10px}
.rb-agent-row .sa-name{color:var(--nz-text);font-weight:500}
.rb-agent-row .sa-detail{color:var(--nz-text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rb-agent-row .sa-stat{color:var(--nz-text-dim);flex-shrink:0}
.rb-agent-row.done .sa-name{color:var(--nz-text-dim)}
.rb-agent-row.done .sa-detail{color:var(--nz-text-faint)}
.rb-team-header{padding:3px 12px 1px 22px;font-size:11px;color:var(--nz-amber);display:flex;align-items:center;gap:4px}
.rb-team-header .team-icon{font-size:10px}
.rb-team-header .team-count{color:var(--nz-text-dim);font-size:10px}
.rb-stats{padding:2px 12px 4px 22px;font-size:11px;color:var(--nz-text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--nz-red);color:#fff;padding:8px 16px;border-radius:8px;font-size:14px;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.toast.show{opacity:1;pointer-events:auto}

/* Auth modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:12px;padding:24px;width:360px}
.modal h3{font-size:15px;color:var(--nz-text-strong);margin-bottom:12px}
.modal input{width:100%;padding:8px 12px;background:var(--nz-bg-0);border:1px solid var(--nz-border);border-radius:6px;color:var(--nz-text);font-size:14px;outline:none}
.modal input:focus{border-color:var(--nz-accent)}
.modal .modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal .modal-btns button{padding:6px 16px;border-radius:6px;border:1px solid var(--nz-border);background:var(--nz-bg-2);color:var(--nz-text);cursor:pointer;font-size:14px}
.modal .modal-btns button.primary{background:#238636;border-color:#238636;color:#fff}
.modal textarea{width:100%;padding:8px 12px;background:var(--nz-bg-0);border:1px solid var(--nz-border);border-radius:6px;color:var(--nz-text);font-size:14px;font-family:inherit;outline:none;resize:vertical}
.modal textarea:focus{border-color:var(--nz-accent)}
.modal-section-label{font-size:12px;color:var(--nz-text-mute);margin-bottom:6px}
/* Picker list used in modals (presets, projects, workspaces) */
.proj-pick{list-style:none;margin:0;padding:0;border:1px solid var(--nz-border);border-radius:6px;background:var(--nz-bg-0);max-height:220px;overflow-y:auto}
.proj-pick li{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--nz-bg-2);transition:background .12s;min-height:44px;display:flex;flex-direction:column;justify-content:center;-webkit-tap-highlight-color:transparent}
.proj-pick li:last-child{border-bottom:none}
.proj-pick li:hover{background:var(--nz-bg-1)}
.proj-pick li.selected,.proj-pick li[aria-selected="true"]{background:rgba(31,111,235,.2);box-shadow:inset 2px 0 0 var(--nz-accent)}
.proj-pick .pp-name{font-size:13px;color:var(--nz-text-strong);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-pick .pp-path{font-size:11px;color:var(--nz-text-dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
.proj-pick .pp-custom{font-size:12px;color:var(--nz-text-mute);display:flex;align-items:center;gap:6px}
.proj-pick .pp-custom-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:var(--nz-bg-2);color:var(--nz-text-mute);font-size:12px;line-height:1;flex-shrink:0}
/* New session command palette */
.cmd-palette-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding-top:12vh}
.cmd-palette{background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:12px;width:min(560px,92vw);max-height:72vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.cmd-palette-header{padding:14px 16px;border-bottom:1px solid var(--nz-bg-2);flex-shrink:0}
.cmd-palette-header input{width:100%;padding:8px 10px;background:var(--nz-bg-0);border:1px solid var(--nz-border);border-radius:6px;color:var(--nz-text);font-size:14px;outline:none}
.cmd-palette-header input:focus{border-color:var(--nz-accent)}
.cmd-palette-list{flex:1;overflow-y:auto;padding:6px;min-height:0}
.cmd-palette-item{padding:8px 10px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s}
.cmd-palette-item:hover{background:#1c2129}
.cmd-palette-item.active{background:rgba(31,111,235,.2);box-shadow:inset 2px 0 0 var(--nz-accent)}
.cmd-palette-item .cp-main{flex:1;min-width:0}
.cmd-palette-item .cp-name{font-size:13px;color:var(--nz-text-strong);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmd-palette-item .cp-path{font-size:11px;color:var(--nz-text-dim);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:ui-monospace,SFMono-Regular,monospace}
.cmd-palette-item .cp-node{font-size:10px;padding:1px 5px;border-radius:3px;color:#fff;flex-shrink:0}
.cmd-palette-item .cp-icon{color:var(--nz-text-mute);font-size:14px;flex-shrink:0;width:16px;text-align:center}
.cmd-palette-item mark{background:transparent;color:#79c0ff;font-weight:600}
.cmd-palette-empty{padding:24px 16px;text-align:center;color:var(--nz-text-dim);font-size:13px}
.cmd-palette-footer{padding:8px 14px;border-top:1px solid var(--nz-bg-2);font-size:11px;color:var(--nz-text-dim);display:flex;gap:14px;flex-wrap:wrap;flex-shrink:0;background:var(--nz-bg-0)}
.cmd-palette-footer kbd{background:var(--nz-bg-2);border:1px solid var(--nz-border);border-radius:3px;padding:0 4px;font-size:10px;color:var(--nz-text-mute);font-family:inherit}

/* Toast variants */
.toast.warning{background:#9e6a03}
.toast.success{background:#238636}
.toast.error{background:#8e1519}

.node-badge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.3px;color:#fff;vertical-align:middle;margin-right:4px}
.node-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin:0 1px 0 6px;vertical-align:middle}
.node-dot:first-child{margin-left:0}
.node-dot.ok{background:var(--nz-green)}
.node-dot.error{background:var(--nz-red)}
.node-info{color:var(--nz-text-mute);font-size:13px}

.history-popover{position:absolute;top:100%;left:0;z-index:100;min-width:280px;max-width:360px;max-height:320px;overflow-y:auto;background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.5);padding:0;animation:pop-in .15s ease}
@keyframes pop-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.history-popover-header{padding:8px 12px;font-size:11px;color:var(--nz-text-mute);border-bottom:1px solid var(--nz-bg-2);font-weight:600;text-transform:uppercase;letter-spacing:.3px;background:var(--nz-bg-0);border-radius:8px 8px 0 0}
.history-popover-item{padding:8px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--nz-bg-2);position:relative}
.history-popover-item:last-child{border-bottom:none}
.history-popover-item:hover{background:#1c2129}
.history-popover-item .hp-prompt{font-size:13px;color:var(--nz-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-popover-item .hp-meta{font-size:11px;color:var(--nz-text-dim);margin-top:3px;display:flex;align-items:center;gap:6px}
.history-popover-item .hp-meta .hp-project{color:#d4a017;font-weight:500}
.history-popover-item .hp-meta .hp-tool{color:#a5d6ff}
.history-popover-item .hp-meta .hp-dot{color:var(--nz-border)}
.hp-day-header{padding:6px 12px 4px;font-size:10px;color:var(--nz-text-mute);font-weight:600;text-transform:uppercase;letter-spacing:.3px;background:var(--nz-bg-0);border-bottom:1px solid var(--nz-bg-2);position:sticky;top:0}
.history-popover-empty{padding:16px;text-align:center;color:var(--nz-text-dim);font-size:12px}

.workspace-path{font-size:12px;color:var(--nz-text-dim);margin-top:4px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'SF Mono',SFMono-Regular,Consolas,monospace}
.workspace-path:hover{color:var(--nz-text-mute);text-decoration:underline}

/* Markdown rendering */
.md-pre{background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:6px;padding:10px 12px;margin:8px 0;overflow-x:auto;font-size:13px;line-height:1.6;max-width:100%}
.md-pre code{color:#e6edf3;font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;white-space:pre}
.md-code-wrap{position:relative;max-width:100%}
.md-code-actions{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.md-code-wrap:hover .md-code-actions{opacity:1}
.md-code-btn{background:var(--nz-bg-2);border:1px solid var(--nz-border);border-radius:4px;color:var(--nz-text-mute);font-size:11px;padding:2px 8px;cursor:pointer;line-height:1.6;font-family:inherit;transition:color .15s,border-color .15s,background .15s}
.md-code-btn:hover{background:var(--nz-border);color:var(--nz-text);border-color:var(--nz-accent)}
.md-copy-btn.copied{color:var(--nz-green);border-color:var(--nz-green)}
.md-code{background:var(--nz-border);color:#e6edf3;padding:1px 5px;border-radius:4px;font-size:13px;font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace}
.md-h1,.md-h2,.md-h3,.md-h4{display:block;color:var(--nz-text-strong);margin:8px 0 4px}
.md-h1{font-size:16px}.md-h2{font-size:15px}.md-h3{font-size:14px}
.md-ul{margin:6px 0 6px 16px;padding:0;list-style:disc}
.md-ul li{margin:2px 0;line-height:1.6}
.md-ol{margin:6px 0 6px 16px;padding:0;list-style:decimal}
.md-ol li{margin:2px 0;line-height:1.6}
.md-link{color:var(--nz-accent);text-decoration:none}
.md-link:hover{text-decoration:underline}
.md-table-wrap{overflow-x:auto;max-width:100%;margin:8px 0}
.md-table{width:100%;border-collapse:collapse;font-size:14px}
.md-table th,.md-table td{border:1px solid var(--nz-border);padding:5px 10px;text-align:left}
.md-table th{background:var(--nz-bg-1);color:var(--nz-text-strong);font-weight:600;font-size:13px}
.md-table td{color:var(--nz-text)}
.md-table tr:hover td{background:rgba(88,166,255,.04)}
.mermaid-wrap{background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:6px;padding:12px;margin:8px 0;overflow-x:auto;text-align:center;max-width:100%}
.mermaid-wrap svg{max-width:100%;height:auto}
.md-math-display{margin:8px 0;overflow-x:auto;padding-left:1em;max-width:100%}
.md-math-display .katex-display{margin:0.5em 0}
.katex{font-size:1.1em}
.katex-html{overflow-wrap:break-word}
.ts-subagent{display:inline-block;background:#1f2937;color:#a5d6ff;padding:0 5px;border-radius:4px;font-size:11px;font-weight:600;margin-left:2px}



/* Header buttons */
.hdr-btns{display:flex;gap:4px;align-items:center}
.hdr-btn{background:none;border:1px solid var(--nz-border);border-radius:6px;color:var(--nz-text-mute);cursor:pointer;padding:0;position:relative;transition:all .15s;line-height:1;white-space:nowrap;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.hdr-btn:hover{background:var(--nz-bg-2);color:var(--nz-text);border-color:var(--nz-text-faint)}
.hdr-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr-badge{position:absolute;top:-5px;right:-5px;background:var(--nz-red);color:#fff;font-size:9px;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1}
/* Section header */
.section-header{padding:6px 12px 6px 16px;font-size:11px;font-weight:600;color:var(--nz-text-mute);text-transform:uppercase;letter-spacing:.4px;background:var(--nz-bg-1);border-top:1px solid var(--nz-border);border-bottom:1px solid var(--nz-bg-2);position:sticky;top:0;z-index:1;display:flex;align-items:center;gap:6px}
.section-header .sh-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.section-header .sh-btn{background:none;border:none;color:var(--nz-text-faint);cursor:pointer;padding:2px 4px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;line-height:1;transition:color .15s,background .15s;font-size:13px}
.section-header .sh-btn:hover{background:var(--nz-bg-2);color:var(--nz-text)}
.section-header .sh-btn.star-on{color:#e3b341}
.section-header .sh-btn.star-on:hover{color:#f7c744}
.section-header .sh-btn.github-on{color:#a5d6ff}
.section-header .sh-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.section-header .sh-btn.star-on svg{fill:currentColor}
.section-empty{padding:8px 16px;font-size:12px;color:var(--nz-text-dim);display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--nz-bg-2);cursor:pointer;background:transparent;border-top:none;border-left:none;border-right:none;width:100%;text-align:left;font-family:inherit}
.section-empty:hover{color:var(--nz-text);background:var(--nz-bg-1)}
.section-empty .se-plus{color:var(--nz-accent);font-weight:600}
/* Session card v2 (two-line flat, IM-style) */
.sc-cli-icon{width:36px;height:36px;flex-shrink:0;border-radius:8px}
.sc-body{flex:1;min-width:0}
.session-card .sc-header{display:flex;align-items:baseline;gap:8px}
.session-card .sc-prompt{font-size:15px;color:#e6edf3;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-card.new-card{border-left-style:dashed;border-left-color:var(--nz-accent)}
.session-card.active.dead-card{opacity:1}
.session-card .sc-meta{font-size:12px;color:var(--nz-text-mute);display:flex;align-items:center;gap:4px;margin-top:3px;overflow:hidden;white-space:nowrap}
.sc-dot{display:inline-block;width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-running{background:var(--nz-green)}
.dot-ready{background:var(--nz-blue)}
.dot-new{background:var(--nz-blue);border:1px dashed var(--nz-accent);width:5px;height:5px}
.sc-time{flex-shrink:0;font-size:12px;color:var(--nz-text-mute)}
.sc-node{display:inline-block;padding:0 4px;border-radius:3px;font-size:10px;font-weight:600;color:#fff;margin-left:2px}
.sc-type-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;color:var(--nz-text-mute);background:var(--nz-bg-2);letter-spacing:.2px;flex-shrink:0;margin-left:auto}
.sc-agents{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;color:#a5d6ff;background:rgba(56,139,253,.12);flex-shrink:0;margin-left:auto}
.sc-cron{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;color:#ffd9a8;background:rgba(249,115,22,.16);border:1px solid rgba(249,115,22,.35);flex-shrink:0}
.session-card.cron-card{border-left:3px solid #f97316}
.session-card.cron-card .sc-cli-icon{position:relative}
/* History bottom sheet (mobile) */
.history-sheet{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--nz-bg-1);border-top:1px solid var(--nz-border);border-radius:16px 16px 0 0;max-height:60vh;overflow-y:auto;animation:sheet-in .25s ease;padding-bottom:max(8px,env(safe-area-inset-bottom))}
.sheet-handle{width:36px;height:4px;background:var(--nz-text-faint);border-radius:2px;margin:8px auto}

/* ===== Tablet / narrow desktop (≤1024px) ===== */
@media(max-width:1024px) and (min-width:769px){
  .sidebar{width:300px!important}
  .event{padding:6px 16px}
}

/* ===== Mobile (≤768px) ===== */
.btn-mobile-back{display:none}
@media(max-width:768px){
  /* Container: block so each panel stacks */
  .container{display:block;height:100%;overflow:hidden}
  /* Sidebar: full-screen drawer, hidden off-left by default */
  .sidebar{position:fixed;inset:0;width:100%!important;min-width:0;max-width:none;z-index:10;background:var(--nz-bg-0);transform:translateX(-100%);transition:transform .25s ease;border-right:none;overflow:hidden}
  body.mobile-list-view .sidebar{transform:translateX(0)}
  .resizer{display:none}
  /* Main: full-screen flex column, sits behind sidebar. Uses visualViewport vars so iOS keyboard doesn't push main-header off-screen. */
  .main{position:fixed;top:var(--vv-top,0);left:0;right:0;height:var(--vv-height,100dvh);width:100%;display:flex;flex-direction:column;z-index:5;overflow:hidden}
  .sidebar{top:var(--vv-top,0);height:var(--vv-height,100%);bottom:auto}
  /* Back button: hidden on desktop, shown on mobile */
  .btn-mobile-back{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;width:36px;height:36px;background:none;border:none;color:var(--nz-text-mute);font-size:20px;cursor:pointer;padding:0;border-radius:6px;-webkit-tap-highlight-color:transparent}
  .btn-mobile-back:active{color:var(--nz-text)}
  /* Main header: single-line flex, safe area top+sides */
  .main-header{gap:0;padding:max(8px,env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) 8px max(12px,env(safe-area-inset-left));overflow:hidden}
  .main-header-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;overflow:hidden}
  /* Input area: safe area bottom+sides padding */
  .input-area{flex-shrink:0;padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right));padding-bottom:max(12px,env(safe-area-inset-bottom))}
  /* Dismiss button always visible on touch screens */
  .session-card .btn-dismiss{opacity:.6}
  /* Modal never wider than screen */
  .modal{width:min(360px,calc(100vw - 32px))}
  /* Toast at top so keyboard doesn't cover it */
  .toast{bottom:auto;top:max(16px,env(safe-area-inset-top));right:16px;left:16px;text-align:center}
  /* Remove tap flash on interactive elements */
  .session-card,.btn-icon,.btn-send{-webkit-tap-highlight-color:transparent}
  .sidebar-header{display:flex;flex-wrap:wrap;align-items:center;padding-top:max(16px,env(safe-area-inset-top));padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right))}
  .sidebar-header .header-row{width:100%}
  .input-hints{display:none}
  /* Voice mode: larger hold button on mobile */
  .btn-hold-talk{font-size:16px;min-height:42px}
  .vo-card{padding:24px 32px}
  .vo-timer{font-size:40px}
  .session-list{overflow-x:hidden;overflow-y:auto}
  .sidebar-status{padding-bottom:max(10px,env(safe-area-inset-bottom));padding-left:max(16px,env(safe-area-inset-left))}
  /* Compact session cards on mobile */
  .session-card{padding:10px max(12px,env(safe-area-inset-right)) 10px max(12px,env(safe-area-inset-left));border-left-width:2px;gap:10px}
  .session-card .sc-meta{font-size:11px;gap:3px}
  .session-card .sc-prompt{font-size:14px}
  .sc-cli-icon{width:32px;height:32px;border-radius:6px}
  .section-header{padding:5px 12px;font-size:10px}
  /* Compact "no sessions" on mobile */
  .no-sessions{padding:4px 16px!important;font-size:12px}
  .event{padding:4px max(12px,env(safe-area-inset-right)) 4px max(12px,env(safe-area-inset-left));max-width:100%}
  .event.user .event-content{max-width:85%}
  .event.text+.event.user{margin-top:16px}
  /* Cron detail: reduce padding to match mobile layout */
  .cron-detail{padding:12px}
  /* History popover: constrain to viewport */
  .history-popover{min-width:0;max-width:calc(100vw - 32px);left:auto;right:0}
  .session-card[data-key]{touch-action:pan-y}
  .session-card.swiping{transition:none!important;user-select:none}
  .modal-overlay{align-items:flex-end}
  .modal{width:100%;border-radius:16px 16px 0 0;padding-bottom:max(20px,env(safe-area-inset-bottom));animation:sheet-in .25s ease}
  .modal::before{content:'';display:block;width:36px;height:4px;background:var(--nz-text-faint);border-radius:2px;margin:0 auto 16px}
}
@keyframes sheet-in{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ===== Small phones (≤480px) ===== */
@media(max-width:480px){
  .main-header h2{font-size:15px}
  .main-header .detail{font-size:11px}
  .session-card .btn-dismiss{top:6px;right:8px;min-width:32px;min-height:32px;font-size:20px;display:flex;align-items:center;justify-content:center;opacity:.75}
  .btn-icon{width:40px;height:40px}
  .input-row #msg-input{font-size:16px} /* prevents iOS zoom on focus */
  .hdr-btn{width:36px;height:36px}
  .modal h3{font-size:14px}
  .cmd-palette{width:100vw;max-height:88vh;border-radius:14px 14px 0 0}
  .cmd-palette-overlay{padding-top:0;align-items:flex-end}
}

/* Mobile history popover gets a drag handle + rounded top. */
.history-sheet::before{content:'';display:block;width:36px;height:4px;background:var(--nz-text-faint);border-radius:2px;margin:8px auto}

/* On-screen keyboard open: collapse optional chrome so the input stays
   in the visible viewport (class toggled by initViewportTracking()). */
body.kbd-open .running-banner{display:none!important}
body.kbd-open .nav-pill{display:none!important}
body.kbd-open .sidebar-status{display:none}
body.kbd-open .input-hints{display:none}

/* ===== Cron tab ===== */
.cron-detail{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.cron-detail-body{padding:16px 20px;overflow-y:auto;flex:1;min-height:0}
.cron-detail h3{font-size:16px;color:var(--nz-text-strong);margin-bottom:12px}
.cron-detail .cd-field{margin-bottom:10px}
.cron-detail .cd-label{font-size:11px;color:var(--nz-text-mute);text-transform:uppercase;letter-spacing:.3px}
.cron-detail .cd-value{font-size:14px;color:var(--nz-text);margin-top:2px;word-break:break-word}
.cron-detail .cd-result{background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:6px;padding:10px;font-size:13px;color:var(--nz-text);max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;margin-top:4px}
/* Cron list header */
.cron-list-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
.cron-list-head h3{margin:0;font-size:16px;color:var(--nz-text-strong)}
.cron-new-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--nz-border);background:var(--nz-bg-2);color:var(--nz-text);cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:4px;min-height:36px;font-family:inherit}
.cron-new-btn:hover{background:var(--nz-border);color:var(--nz-text-strong)}
.cron-new-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* Cron card */
.cron-card{padding:12px;border:1px solid var(--nz-border);border-radius:8px;margin-bottom:10px;background:var(--nz-bg-1);cursor:pointer;transition:border-color .15s,background .15s}
.cron-card:hover{border-color:var(--nz-text-faint);background:#1c2129}
.cron-card .cc-prompt{font-size:14px;color:var(--nz-text-strong);font-weight:500;overflow-wrap:anywhere}
.cron-card .cc-prompt.placeholder{color:var(--nz-text-dim);font-weight:400;font-style:italic}
.cron-card .cc-schedule{font-size:12px;color:var(--nz-accent);margin-top:4px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
.cron-card .cc-meta{font-size:12px;color:var(--nz-text-mute);margin-top:6px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.cron-card .cc-meta .cc-ws{color:#a5d6ff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.cron-card .cc-result{margin-top:6px;font-size:12px;display:flex;gap:6px;align-items:flex-start;line-height:1.5;word-break:break-word}
.cron-card .cc-result .cc-icon{flex-shrink:0;margin-top:1px}
.cron-card .cc-result.ok{color:var(--nz-green)}
.cron-card .cc-result.ok .cc-text{color:var(--nz-text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cron-card .cc-result.err{color:var(--nz-red)}
.cron-card .cc-result.err .cc-text{color:var(--nz-red);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cron-card .cc-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.cron-card .cc-btn{min-height:36px;padding:0 14px;border-radius:6px;border:1px solid var(--nz-border);background:var(--nz-bg-2);color:var(--nz-text);cursor:pointer;font-size:12px;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.cron-card .cc-btn:hover{background:var(--nz-border);color:var(--nz-text-strong)}
.cron-card .cc-btn.danger{color:var(--nz-red);border-color:rgba(218,54,51,.45);background:transparent}
.cron-card .cc-btn.danger:hover{background:rgba(218,54,51,.12);color:var(--nz-red)}
.cron-empty{text-align:center;padding:40px 20px}
.cron-empty-icon{font-size:40px;opacity:.35;margin-bottom:12px}
.cron-empty-hint{color:var(--nz-text-mute);margin-bottom:16px}
.cron-empty-cta{padding:10px 22px;border-radius:6px;border:1px solid var(--nz-blue);background:rgba(31,111,235,.12);color:var(--nz-accent);cursor:pointer;font-size:13px;font-family:inherit;min-height:40px}
.cron-empty-cta:hover{background:rgba(31,111,235,.2)}
.cron-preview-hint{font-size:11px;color:var(--nz-text-mute);margin-top:4px;min-height:16px}
.cron-preview-hint.ok{color:var(--nz-green)}
.cron-preview-hint.err{color:var(--nz-red)}
.cron-tz-banner{font-size:11px;color:var(--nz-text-mute);margin:8px 0 12px;padding:6px 10px;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid var(--nz-border)}
.cron-tz-hint{font-size:11px;color:var(--nz-text-mute);margin-top:4px}
.cron-notify-section{padding:10px;border-radius:4px;background:rgba(255,255,255,.03);border:1px solid var(--nz-border)}
.cron-notify-opt{display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:13px;cursor:pointer}
.cron-notify-opt input{margin-right:2px}
.cc-notify{font-size:11px;padding:1px 6px;border-radius:3px}
.cc-notify.on{background:rgba(46,160,67,.15);color:var(--nz-green)}
.cc-notify.off{background:rgba(139,148,158,.15);color:var(--nz-text-mute)}

/* ===== Frequency picker (natural-language cron UI) ===== */
.freq-tabs{display:flex;gap:4px;background:var(--nz-bg-0);border:1px solid var(--nz-border);border-radius:8px;padding:3px;margin-bottom:10px}
.freq-tab{flex:1;padding:8px 6px;background:none;border:none;border-radius:5px;color:var(--nz-text-mute);font-size:13px;cursor:pointer;transition:background .15s,color .15s;font-family:inherit;min-height:36px}
.freq-tab:hover{color:var(--nz-text)}
.freq-tab.active{background:var(--nz-bg-2);color:var(--nz-text-strong);box-shadow:inset 0 0 0 1px var(--nz-border)}
.freq-body{background:var(--nz-bg-0);border:1px solid var(--nz-border);border-radius:8px;padding:12px}
.freq-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:14px;color:var(--nz-text)}
.freq-row + .freq-row{margin-top:10px}
.freq-row .freq-label{color:var(--nz-text-mute);font-size:13px}
.freq-num{width:64px;padding:6px 8px;background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:5px;color:var(--nz-text);font-size:14px;font-family:inherit;outline:none;text-align:center}
.freq-num:focus{border-color:var(--nz-accent)}
.freq-select{padding:6px 26px 6px 10px;background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:5px;color:var(--nz-text);font-size:14px;font-family:inherit;outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10' fill='none' stroke='%238b949e' stroke-width='1.5'><path d='M2 4 L5 7 L8 4'/></svg>");background-repeat:no-repeat;background-position:right 8px center}
.freq-select:focus{border-color:var(--nz-accent)}
.freq-time{padding:6px 8px;background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:5px;color:var(--nz-text);font-size:14px;font-family:inherit;outline:none}
.freq-time:focus{border-color:var(--nz-accent)}
.freq-dows{display:flex;gap:4px;flex-wrap:wrap}
.freq-dow{min-width:38px;height:34px;padding:0 10px;background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:6px;color:var(--nz-text-mute);font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;display:flex;align-items:center;justify-content:center}
.freq-dow:hover{color:var(--nz-text);border-color:var(--nz-text-faint)}
.freq-dow.on{background:rgba(31,111,235,.2);color:var(--nz-accent);border-color:var(--nz-blue)}
.freq-preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.freq-preset{padding:3px 10px;background:transparent;border:1px solid var(--nz-border);border-radius:12px;color:var(--nz-text-mute);font-size:12px;cursor:pointer;font-family:inherit;min-height:28px}
.freq-preset:hover{color:var(--nz-text);border-color:var(--nz-text-faint)}
/* Custom-mode advanced disclosure */
.freq-advanced-toggle{margin-top:10px;font-size:12px;color:var(--nz-text-mute);cursor:pointer;display:inline-flex;align-items:center;gap:6px;user-select:none;background:none;border:none;padding:4px 0;font-family:inherit}
.freq-advanced-toggle:hover{color:var(--nz-text)}
.freq-advanced-toggle .chev{display:inline-block;transition:transform .15s}
.freq-advanced-toggle.open .chev{transform:rotate(90deg)}
.freq-advanced-body{margin-top:6px;background:var(--nz-bg-0);border:1px solid var(--nz-border);border-radius:6px;padding:10px}
.freq-advanced-body input{width:100%;padding:6px 10px;background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:5px;color:var(--nz-text);font-size:13px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;outline:none}
.freq-advanced-body input:focus{border-color:var(--nz-accent)}
/* Preview list */
.freq-preview{margin-top:10px;padding:10px 12px;background:var(--nz-bg-0);border:1px solid var(--nz-border);border-radius:8px;font-size:13px}
.freq-preview-title{color:var(--nz-text-mute);font-size:11px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.freq-preview.err{border-color:rgba(218,54,51,.5)}
.freq-preview.err .freq-preview-title{color:var(--nz-red)}
.freq-preview-list{list-style:none;margin:0;padding:0}
.freq-preview-list li{display:flex;justify-content:space-between;gap:12px;padding:3px 0;color:var(--nz-text);font-variant-numeric:tabular-nums}
.freq-preview-list li .fp-rel{color:var(--nz-text-mute);font-size:12px}
.freq-preview-list li:first-child .fp-rel{color:var(--nz-accent)}
.freq-preview-tz{margin-top:6px;font-size:11px;color:var(--nz-text-faint)}
/* Card humanized label */
.cron-card .cc-human{font-size:13px;color:var(--nz-accent);margin-top:4px}
.cron-card .cc-expr{font-size:11px;color:var(--nz-text-faint);margin-top:2px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
@media(max-width:480px){
  .freq-tab{font-size:12px;padding:8px 4px}
  .freq-dow{min-width:36px;padding:0 6px;font-size:12px}
}

/* Mobile polish for Cron cards + modal */
@media(max-width:768px){
  .cron-detail-body{padding:12px}
  .cron-card .cc-btn{min-height:40px;padding:0 16px;font-size:13px;flex:1 1 auto}
  .cron-card .cc-actions{gap:8px}
  .cron-new-btn{min-height:40px}
  /* Bottom-sheet modal: cap height so textarea/lists stay scrollable above keyboard */
  .modal{max-height:85dvh;display:flex;flex-direction:column}
  .modal-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
  .modal .modal-btns{flex-shrink:0;background:var(--nz-bg-1);padding-top:8px;margin-top:8px;border-top:1px solid var(--nz-bg-2)}
  /* Hit-area boost inside modal on mobile */
  .proj-pick li{min-height:48px}
  /* Keep trailing space above iOS home indicator while keyboard open */
  body.kbd-open .modal{max-height:calc(100dvh - 16px)}
}

/* Onboarding modal — first-run introduction. Wider than auth/create modals
   to fit the feature list; dismiss persists in localStorage so it only
   appears once per browser profile. */
.modal.onboarding{width:480px;max-width:calc(100vw - 32px)}
.modal.onboarding h3{font-size:18px;margin-bottom:6px}
.modal.onboarding .ob-sub{font-size:13px;color:var(--nz-text-mute);margin-bottom:16px}
.modal.onboarding ul{list-style:none;margin:0 0 16px 0;padding:0;display:flex;flex-direction:column;gap:10px}
.modal.onboarding li{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--nz-text);line-height:1.5}
.modal.onboarding li .ob-icon{flex-shrink:0;width:22px;height:22px;border-radius:6px;background:rgba(31,111,235,.15);color:var(--nz-accent);display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:1px}
.modal.onboarding li b{color:var(--nz-text-strong);font-weight:600}

/* Keyboard cheatsheet — opened via "?" when no input is focused. Reuses
   the standard .modal scaffold so trapFocus / Esc / backdrop-dismiss all
   work without extra code. The ks- prefix namespaces internal classes so
   a future refactor of .modal defaults won't silently break the layout. */
.modal.cheatsheet{width:520px;max-width:calc(100vw - 32px)}
.modal.cheatsheet h3{font-size:16px;margin-bottom:6px}
.modal.cheatsheet .ks-sub{font-size:12px;color:var(--nz-text-mute);margin-bottom:14px}
.modal.cheatsheet .ks-grid{display:grid;grid-template-columns:max-content 1fr;row-gap:8px;column-gap:16px;align-items:center}
.modal.cheatsheet .ks-keys{display:inline-flex;gap:4px;align-items:center;flex-wrap:wrap;justify-self:start}
.modal.cheatsheet kbd{background:var(--nz-bg-2);border:1px solid var(--nz-border);border-radius:4px;padding:1px 6px;font-size:12px;color:var(--nz-text);font-family:inherit;min-width:18px;text-align:center}
.modal.cheatsheet .ks-desc{font-size:13px;color:var(--nz-text);line-height:1.45}
.modal.cheatsheet .ks-sep{grid-column:1/-1;height:1px;background:var(--nz-bg-2);margin:6px 0}
.modal.cheatsheet .ks-section{grid-column:1/-1;font-size:11px;color:var(--nz-text-mute);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

/* Sidebar footer: version + help trigger. Keeps the info at the very
   bottom, above the safe-area inset on iOS. Pointer-events isolation so
   the line itself doesn't steal taps meant for scrollable content above. */
.sidebar-footer{padding:6px 16px;border-top:1px solid var(--nz-border);font-size:11px;color:var(--nz-text-dim);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;min-height:28px}
.sidebar-footer .sf-version{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-variant-numeric:tabular-nums}
.sidebar-footer .sf-help{background:transparent;border:1px solid var(--nz-border);color:var(--nz-text-mute);cursor:pointer;border-radius:50%;width:20px;height:20px;line-height:1;padding:0;font-size:12px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.sidebar-footer .sf-help:hover{color:var(--nz-text-strong);border-color:var(--nz-accent)}
@media (pointer: coarse){
  .sidebar-footer .sf-help{width:32px;height:32px;font-size:14px}
}
body.kbd-open .sidebar-footer{display:none}

/* ==========================================================================
   UX sweep — non-functional polish (2026-04-27)
   Every rule below is additive: later declarations with equal specificity
   override earlier ones, so structure/behavior is untouched.
   ========================================================================== */

/* ---- Track A: touch-target sizing on coarse pointers (mobile + tablet) ---- */
/* WCAG 2.5.5 Target Size — minimum 44x44 on touch input.
   Uses (pointer:coarse) so mouse-driven desktops keep their compact sizes. */
@media (pointer: coarse){
  .btn-icon,.btn-send,.btn-stop{min-width:44px;min-height:44px}
  .hdr-btn{min-width:40px;min-height:40px}
  .section-header .sh-btn{min-width:32px;min-height:32px;padding:6px}
  .session-card .btn-dismiss{min-width:40px;min-height:40px;padding:6px;font-size:19px;opacity:.75}
  .btn-mobile-back{min-width:40px;min-height:40px}
  .section-empty{min-height:44px;padding-top:12px;padding-bottom:12px}
  .empty-cta-btn{min-height:44px}
  .fv-btn{min-width:40px;min-height:40px}
  /* Inline @file reference chips: keep the visual small but grow the tap area. */
  .file-ref .fr-btn{min-width:32px;min-height:32px;padding:4px 8px}
  /* "Load earlier" pagination button in event stream. */
  .earlier-events-btn{min-height:36px}
}

/* ---- Track B: font-size floors to prevent iOS Safari auto-zoom on focus ---- */
/* Any editable control needs >=16px computed font-size or Safari zooms in. */
.login-panel input[type="password"]{font-size:16px}
@media(max-width:768px){
  .freq-num,.freq-time,.freq-select{font-size:16px}
  /* Todo chips / task metadata shouldn't overpower the message body on narrow screens. */
  .md-task-chip,.todo-chip{font-size:12px;line-height:1.35}
}

/* ---- Track C: responsive breakpoints for landscape phones & small tablets ---- */
/* iPhone landscape (844x390) and similar touch devices with limited vertical space
   should use the same drawer UX as portrait phones. Adds to existing 768px rule,
   does not override it. */
@media (max-width: 950px) and (orientation: landscape) and (pointer: coarse){
  .container{display:block;height:100%;overflow:hidden}
  .sidebar{position:fixed;inset:0;width:100%!important;min-width:0;max-width:none;z-index:10;background:var(--nz-bg-0);transform:translateX(-100%);transition:transform .25s ease;border-right:none;overflow:hidden}
  body.mobile-list-view .sidebar{transform:translateX(0)}
  .resizer{display:none}
  .main{position:fixed;top:var(--vv-top,0);left:0;right:0;height:var(--vv-height,100dvh);width:100%;display:flex;flex-direction:column;z-index:5;overflow:hidden}
  .sidebar{top:var(--vv-top,0);height:var(--vv-height,100%);bottom:auto}
  .btn-mobile-back{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;width:40px;height:40px;background:none;border:none;color:var(--nz-text-mute);font-size:20px;cursor:pointer;padding:0;border-radius:6px;-webkit-tap-highlight-color:transparent}
}

/* ---- Track D: semantic badge colors — red only means "needs attention" ---- */
/* Default header badge becomes neutral; red is opt-in via .is-alert (JS can add
   the class later when there's an actual failure/unread signal). Pure visual
   change; badge textContent pipeline in dashboard.js is untouched. */
:root{
  --nz-badge-info:#30363d;       /* neutral count */
  --nz-badge-info-text:#c9d1d9;
  --nz-badge-warn:#d29922;       /* amber */
  --nz-badge-danger:#da3633;     /* unchanged red, opt-in */
}
.hdr-badge{background:var(--nz-badge-info);color:var(--nz-badge-info-text);border:1px solid var(--nz-border)}
.hdr-badge.is-alert{background:var(--nz-badge-danger);color:#fff;border-color:transparent}
.hdr-badge.is-warn{background:var(--nz-badge-warn);color:#1b1b1b;border-color:transparent}

/* ==========================================================================
   UX sweep vol.2 — high-resolution desktop layout (2026-04-27)
   Targets QHD (2560x1440), 4K, ultrawide. Leaves <=1440px untouched.
   All rules are min-width queries that stack progressively; the legacy
   1200px clamp on .event still applies below 1600px.
   ========================================================================== */

/* Reading column widens proportionally so wide screens don't feel empty. */
@media (min-width: 1600px){
  .event{max-width:min(1320px, 72vw)}
  .event.text .event-content{max-width:min(1240px, 68vw)}
  .event.todo .event-content{max-width:min(1000px, 58vw)}
  .event.user .event-content{max-width:min(80%, 640px)}
}
@media (min-width: 2200px){   /* QHD bracket — 2560x1440 lands here */
  .event{max-width:min(1560px, 62vw)}
  .event.text .event-content{max-width:min(1460px, 58vw)}
  .event.todo .event-content{max-width:min(1100px, 50vw)}
}
@media (min-width: 3200px){   /* 4K / 5K / ultrawide */
  .event{max-width:min(1800px, 52vw)}
  .event.text .event-content{max-width:min(1700px, 48vw)}
  .event.todo .event-content{max-width:min(1200px, 42vw)}
}

/* Main-header + composer align to the reading column so the "full-width shell
   + narrow content" feeling disappears at 2560+. */
@media (min-width: 1600px){
  .main-header{max-width:min(1380px, 75vw);margin-left:auto;margin-right:auto;width:100%}
  .input-area{max-width:min(1380px, 75vw);margin-left:auto;margin-right:auto;width:100%}
}
@media (min-width: 2200px){
  .main-header{max-width:min(1580px, 64vw)}
  .input-area{max-width:min(1580px, 64vw)}
}
@media (min-width: 3200px){
  .main-header{max-width:min(1820px, 54vw)}
  .input-area{max-width:min(1820px, 54vw)}
}

/* Sidebar widens gently so it's not a thin stripe. Inline style set by the
   .resizer JS uses element.style.width, which has higher specificity than
   these rules, so users who manually resized keep their choice. */
@media (min-width: 1920px){ .sidebar{width:400px} }
@media (min-width: 2560px){ .sidebar{width:420px} }
@media (min-width: 3200px){ .sidebar{width:460px} }

/* Aside (scratch) drawer — right-side preview pane for follow-up questions
   ("追问"). Independent of main transcript layout so quoting doesn't shift
   the reader. On phones the drawer goes full-width. */
.aside-drawer{position:fixed;top:0;right:0;bottom:0;width:min(420px,94vw);background:var(--nz-bg-0);border-left:1px solid var(--nz-border);display:flex;flex-direction:column;transform:translateX(105%);transition:transform .22s ease;z-index:60;box-shadow:-8px 0 24px rgba(0,0,0,.35)}
.aside-drawer.visible{transform:translateX(0)}
.aside-drawer .ad-header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;border-bottom:1px solid var(--nz-border);background:var(--nz-bg-0)}
.aside-drawer .ad-title{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--nz-text);font-weight:600;min-width:0}
.aside-drawer .ad-title .ad-agent{color:var(--nz-text-dim);font-weight:400;font-size:12px;margin-left:4px}
.aside-drawer .ad-close{background:none;border:none;color:var(--nz-text-mute);font-size:22px;cursor:pointer;padding:6px 10px;border-radius:4px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.aside-drawer .ad-close:hover{background:var(--nz-bg-1);color:var(--nz-text)}
.aside-drawer .ad-quote-chip{padding:6px 14px;font-size:11px;color:var(--nz-text-dim);background:var(--nz-bg-1);border-bottom:1px solid var(--nz-border);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none}
.aside-drawer .ad-quote-chip:hover{color:var(--nz-text-mute)}
.aside-drawer .ad-quote-chip .ad-arrow{color:var(--nz-text-faint)}
.aside-drawer .ad-quote-chip .ad-preview{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-style:italic}
.aside-drawer .ad-quote-chip.expanded .ad-preview{white-space:pre-wrap;font-style:normal}
.aside-drawer .ad-quote-chip .ad-trunc{color:var(--nz-red);font-size:10px;margin-left:4px}
.aside-drawer .ad-messages{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 0;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--nz-border) transparent}
.aside-drawer .ad-messages .event{max-width:100%;padding:4px 14px}
.aside-drawer .ad-messages .event.user .event-content,
.aside-drawer .ad-messages .event.text .event-content{max-width:95%}
.aside-drawer .ad-empty{padding:40px 20px;text-align:center;color:var(--nz-text-dim);font-size:13px;line-height:1.5}
.aside-drawer .ad-input-area{border-top:1px solid var(--nz-border);padding:10px 12px;flex-shrink:0}
.aside-drawer .ad-input-row{display:flex;gap:6px;align-items:flex-end}
.aside-drawer .ad-input{flex:1;background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:8px;color:var(--nz-text);padding:8px 10px;font-family:inherit;font-size:16px;min-height:40px;max-height:120px;outline:none;line-height:1.4;resize:none;overflow-y:auto;-webkit-user-select:text;user-select:text}
.aside-drawer .ad-input:focus{border-color:var(--nz-accent)}
.aside-drawer .ad-send{width:44px;height:44px;border:1px solid #238636;background:#238636;border-radius:8px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.aside-drawer .ad-send:hover{background:#2ea043}
.aside-drawer .ad-send:disabled{opacity:.5;cursor:default}
.aside-drawer .ad-save-btn{display:none;margin-top:8px;width:100%;background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:8px;color:var(--nz-text);padding:9px 10px;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;min-height:40px}
.aside-drawer .ad-save-btn.visible{display:block}
.aside-drawer .ad-save-btn:hover{background:var(--nz-bg-2);border-color:var(--nz-accent);color:var(--nz-accent)}
.aside-drawer .ad-loading{display:none;padding:6px 14px;font-size:11px;color:var(--nz-text-faint);font-style:italic;animation:pulse 1.5s ease-in-out infinite}
.aside-drawer .ad-loading.visible{display:block}
@media (max-width: 768px){
  .aside-drawer{width:100%;max-width:100vw;border-left:none}
  /* On phones the drawer fills the screen, so align event padding with the
     main transcript (6px 24px) rather than the narrow-drawer compression.
     Keeps body feel identical whether the user is reading the main window
     or the aside. */
  .aside-drawer .ad-messages .event{padding:6px 20px}
}
/* Ask-aside (↗ 追问) button on AI bubbles. Sits next to copy button; same
   visual weight so the bubble footer row stays balanced. Larger tap target
   on touch devices so mobile users can hit it reliably. */
.event-ask-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1px solid var(--nz-border);border-radius:4px;color:var(--nz-text-faint);font-size:11px;padding:1px 8px;cursor:pointer;transition:color .15s,border-color .15s;line-height:1.6;margin-top:8px;margin-left:6px}
.event-ask-btn:hover{color:var(--nz-accent);border-color:var(--nz-accent)}
@media (pointer: coarse){
  .event-ask-btn{font-size:12px;padding:4px 10px;min-height:32px}
  .event-copy-btn{font-size:12px;padding:4px 10px;min-height:32px}
}

</style>
</head>
<body>
<div class="container">
  <nav class="sidebar" aria-label="Sessions">
    <div class="sidebar-header">
      <div class="header-row">
        <h1>Dashboard</h1>
        <div class="hdr-btns">
          <button class="hdr-btn" id="btn-history" onclick="toggleHistory()" title="History" aria-label="Show session history" aria-haspopup="dialog"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg><span class="hdr-badge" id="history-badge" style="display:none" aria-label="unread history count"></span></button>
          <button class="hdr-btn" onclick="createNewSession()" title="New Session" aria-label="Create new session"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          <button class="hdr-btn" id="btn-cron" onclick="openCronPanel()" title="Cron Jobs" aria-label="Cron jobs"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 1.5"/><path d="M5 3L2 6"/><path d="M22 6l-3-3"/><path d="M6.38 18.7L4 21"/><path d="M17.64 18.67L20 21"/></svg><span class="hdr-badge" id="cron-badge" style="display:none" aria-label="cron job count"></span></button>
        </div>
      </div>
    </div>
    <div class="session-list" id="session-list" role="list">
      <div class="no-sessions">loading...</div>
    </div>
    <div class="sidebar-status" id="sidebar-status" role="status" aria-live="polite">
      <div class="status-row">
        <span class="status-dot off" aria-hidden="true"></span>
        <div class="status-info">
          <div class="status-ws">connecting...</div>
        </div>
      </div>
    </div>
    <div class="sidebar-footer" id="sidebar-footer">
      <span class="sf-version" id="sf-version" title="naozhi version">naozhi</span>
      <button type="button" class="sf-help" id="sf-help" title="Keyboard shortcuts (press ?)" aria-label="Keyboard shortcuts" aria-haspopup="dialog" onclick="showCheatsheet()">?</button>
    </div>
  </nav>
  <div class="resizer" id="resizer" role="separator" aria-orientation="vertical" aria-label="Resize sidebar" tabindex="0"></div>
  <main class="main" id="main" aria-label="Session content">
    <div class="empty-state empty-cta" style="flex-direction:column;gap:16px">
      <span style="font-size:40px;opacity:.35" aria-hidden="true">&gt;_</span>
      <div style="color:var(--nz-text);font-size:17px">Ready when you are</div>
      <button class="empty-cta-btn" type="button" onclick="createNewSession()" style="padding:10px 22px;border-radius:8px;border:1px solid var(--nz-blue);background:rgba(31,111,235,.12);color:var(--nz-accent);font-size:14px;cursor:pointer;font-family:inherit">+ New session</button>
      <div style="font-size:12px;color:var(--nz-text-dim)">or pick one from the sidebar</div>
    </div>
  </main>
</div>
<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
<aside class="fv-drawer hidden" id="fv-drawer" role="dialog" aria-modal="false" aria-label="File preview">
  <header class="fv-header">
    <div class="fv-title-wrap">
      <span class="fv-title" id="fv-title">file</span>
      <span class="fv-meta" id="fv-meta"></span>
    </div>
    <div class="fv-actions">
      <button type="button" class="fv-btn" id="fv-btn-copy" title="Copy path" aria-label="Copy path">copy</button>
      <button type="button" class="fv-btn" id="fv-btn-download" title="Download" aria-label="Download">download</button>
      <button type="button" class="fv-btn fv-close" id="fv-btn-close" title="Close" aria-label="Close preview">&times;</button>
    </div>
  </header>
  <div class="fv-body" id="fv-body"></div>
</aside>
<aside class="aside-drawer" id="aside-drawer" role="dialog" aria-modal="false" aria-label="追问抽屉">
  <header class="ad-header">
    <div class="ad-title">
      <span>↗ 追问</span>
      <span class="ad-agent" id="ad-agent"></span>
    </div>
    <button type="button" class="ad-close" id="ad-close" title="关闭" aria-label="关闭追问窗口">&times;</button>
  </header>
  <div class="ad-quote-chip" id="ad-quote-chip" title="点击展开/回到源消息">
    <span class="ad-arrow">↳</span>
    <span class="ad-preview" id="ad-quote-preview"></span>
    <span class="ad-trunc" id="ad-quote-trunc" style="display:none">(已截断)</span>
  </div>
  <div class="ad-messages" id="ad-messages">
    <div class="ad-empty" id="ad-empty">就这段内容问点什么？<br><span style="font-size:11px;color:var(--nz-text-faint)">此窗口的对话不会出现在主窗口</span></div>
  </div>
  <div class="ad-loading" id="ad-loading">正在思考…</div>
  <div class="ad-input-area">
    <div class="ad-input-row">
      <textarea class="ad-input" id="ad-input" rows="1" placeholder="问一下这段内容…"></textarea>
      <button type="button" class="ad-send" id="ad-send" title="发送" aria-label="发送">↵</button>
    </div>
    <button type="button" class="ad-save-btn" id="ad-save" title="保存为正式会话">💾 保存为正式会话</button>
  </div>
</aside>
<div class="voice-overlay" id="voice-overlay" role="dialog" aria-modal="true" aria-label="Voice recording">
  <div class="vo-card">
    <div class="vo-timer" id="vo-timer" aria-live="off">0s</div>
    <div class="vo-wave" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="vo-hint" id="vo-hint"></div>
  </div>
</div>
<script src="/static/dashboard.js"></script>
</body>
</html>
