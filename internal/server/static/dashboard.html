<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>naozhi dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace;background:#0d1117;color:#c9d1d9}
.container{display:flex;height:100vh}

.sidebar{width:320px;min-width:320px;border-right:1px solid #30363d;display:flex;flex-direction:column}
.sidebar-header{padding:16px;border-bottom:1px solid #30363d}
.sidebar-header h1{font-size:16px;color:#f0f6fc;font-weight:600}
.sidebar-header .stats{font-size:12px;color:#8b949e;margin-top:4px}
.session-list{flex:1;overflow-y:auto}

.session-card{padding:10px 16px;border-bottom:1px solid #21262d;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.session-card:hover{background:#161b22}
.session-card.active{background:#1f2937;border-left-color:#58a6ff}
.session-card.dead-card{opacity:.6}
.session-card .platform{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.session-card .agent{font-size:14px;color:#f0f6fc;margin:2px 0;font-weight:500}
.session-card.dead-card .agent{text-decoration:line-through;color:#8b949e}
.session-card .meta{font-size:11px;color:#8b949e;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.session-card .workspace-hint{font-size:10px;color:#484f58;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600}
.badge.running{background:#238636;color:#fff}
.badge.ready{background:#1f6feb;color:#fff}
.badge.dead{background:#484f58;color:#c9d1d9}
.badge.suspended{background:#9e6a03;color:#fff}
.badge.spawning{background:#d29922;color:#fff}
.death-tag{font-size:9px;color:#8b949e;background:#21262d;padding:1px 4px;border-radius:4px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:12px 20px;border-bottom:1px solid #30363d;flex-shrink:0}
.main-header h2{font-size:14px;color:#f0f6fc;font-weight:600;word-break:break-all}
.main-header .detail{font-size:12px;color:#8b949e;margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
.main-header .detail span{white-space:nowrap}
.main-header .workspace-path{font-size:11px;color:#58a6ff;margin-top:4px;cursor:pointer;word-break:break-all}
.main-header .workspace-path:hover{text-decoration:underline}

.events{flex:1;overflow-y:auto;padding:8px 0}
.event{display:flex;gap:10px;padding:5px 20px;transition:background .1s}
.event:hover{background:#161b22}
.event-time{font-size:11px;color:#484f58;min-width:72px;font-family:monospace;padding-top:2px}
.event-icon{width:18px;text-align:center;font-size:13px;padding-top:1px}
.event-content{flex:1;font-size:13px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.event.thinking .event-content{color:#a5d6ff}
.event.tool_use .event-content{color:#d2a8ff}
.event.result .event-content{color:#7ee787}
.event.system .event-content{color:#8b949e}
.event.text .event-content{color:#c9d1d9}
.event .cost{color:#8b949e;font-size:11px;margin-left:6px}

.empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:#484f58;font-size:14px}
.no-sessions{padding:40px 16px;text-align:center;color:#484f58;font-size:13px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease-in-out infinite}
.running-indicator{display:inline-block;width:6px;height:6px;border-radius:50%;background:#3fb950;margin-right:4px;animation:pulse 2s ease-in-out infinite}

/* Message input area */
.input-area{border-top:1px solid #30363d;padding:12px 20px;flex-shrink:0;background:#0d1117}
.input-area.disabled{opacity:.5;pointer-events:none}
.file-preview{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.file-thumb{position:relative;width:48px;height:48px;border-radius:6px;overflow:hidden;border:1px solid #30363d}
.file-thumb img{width:100%;height:100%;object-fit:cover}
.file-thumb .remove{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:#da3633;color:#fff;border:none;border-radius:50%;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#c9d1d9;padding:8px 12px;font-family:inherit;font-size:13px;resize:none;min-height:38px;max-height:120px;outline:none;line-height:1.4}
.input-row textarea:focus{border-color:#58a6ff}
.input-row textarea::placeholder{color:#484f58}
.btn-icon{width:36px;height:36px;border:1px solid #30363d;border-radius:8px;background:#161b22;color:#8b949e;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.btn-icon:hover{background:#1f2937;color:#c9d1d9;border-color:#484f58}
.btn-icon.sending{opacity:.5;pointer-events:none}
.btn-send{background:#238636;border-color:#238636;color:#fff}
.btn-send:hover{background:#2ea043}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#da3633;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;z-index:100;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* Auth modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;width:360px}
.modal h3{font-size:14px;color:#f0f6fc;margin-bottom:12px}
.modal input{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:13px;outline:none}
.modal input:focus{border-color:#58a6ff}
.modal .modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal .modal-btns button{padding:6px 16px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:13px}
.modal .modal-btns button.primary{background:#238636;border-color:#238636;color:#fff}
</style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>naozhi dashboard</h1>
      <div class="stats" id="stats">connecting...</div>
    </div>
    <div class="session-list" id="session-list">
      <div class="no-sessions">loading...</div>
    </div>
  </div>
  <div class="main" id="main">
    <div class="empty-state">select a session to view events and send messages</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let selectedKey = null;
let eventTimer = null;
let lastEventTime = 0;
let sessionsData = {};
let pendingFiles = [];
let sending = false;

function getToken() { return localStorage.getItem('naozhi_dashboard_token') || ''; }
function setToken(t) { localStorage.setItem('naozhi_dashboard_token', t); }

async function fetchSessions() {
  try {
    const r = await fetch('/api/sessions');
    const data = await r.json();
    (data.sessions || []).forEach(s => { sessionsData[s.key] = s; });
    renderSidebar(data);
  } catch (e) {
    document.getElementById('stats').textContent = 'error: ' + e.message;
  }
}

function renderSidebar(data) {
  const st = data.stats;
  document.getElementById('stats').textContent =
    st.active + ' active / ' + st.total + ' total \u00b7 ' + st.uptime + ' \u00b7 ' + st.backend;

  const list = document.getElementById('session-list');
  const sessions = data.sessions || [];

  const order = {running:0, spawning:1, ready:2, suspended:3, dead:4};
  sessions.sort((a, b) => {
    const d = (order[a.state]||5) - (order[b.state]||5);
    return d !== 0 ? d : b.last_active - a.last_active;
  });

  if (sessions.length === 0) {
    list.innerHTML = '<div class="no-sessions">no sessions</div>';
    return;
  }

  list.innerHTML = sessions.map(s => {
    const isDead = s.state === 'dead' || s.state === 'suspended';
    const cls = (selectedKey === s.key ? 'session-card active' : 'session-card') + (isDead ? ' dead-card' : '');
    const ago = timeAgo(s.last_active);
    const cost = s.total_cost > 0 ? '$' + s.total_cost.toFixed(3) : '';
    const proto = s.protocol || '\u2014';
    const ri = s.state === 'running' ? '<span class="running-indicator"></span>' : '';
    const deathTag = s.death_reason ? ' <span class="death-tag">' + esc(s.death_reason.replace(/_/g,' ')) + '</span>' : '';
    const ws = s.workspace ? shortPath(s.workspace) : '';
    return '<div class="' + cls + '" data-key="' + esc(s.key) + '" onclick="selectSession(this.dataset.key)">' +
      '<div class="platform">' + esc(s.platform) + ' \u00b7 ' + esc(proto) + '</div>' +
      '<div class="agent">' + ri + esc(s.agent || 'general') + '</div>' +
      '<div class="meta"><span class="badge ' + s.state + '">' + s.state + '</span>' + deathTag +
      '<span>' + ago + '</span>' +
      (cost ? '<span>' + cost + '</span>' : '') +
      '</div>' +
      (ws ? '<div class="workspace-hint">' + esc(ws) + '</div>' : '') +
      '</div>';
  }).join('');
}

function selectSession(key) {
  selectedKey = key;
  lastEventTime = 0;
  document.querySelectorAll('.session-card').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key);
  });
  renderMainShell();
  fetchEvents(true);
  if (eventTimer) clearInterval(eventTimer);
  eventTimer = setInterval(() => fetchEvents(false), 1000);
}

function renderMainShell() {
  const main = document.getElementById('main');
  const s = sessionsData[selectedKey] || {};
  const ws = s.workspace || '';
  const deathInfo = s.death_reason ? '<span class="death-tag">' + esc(s.death_reason.replace(/_/g,' ')) + '</span>' : '';
  const chatInfo = (s.chat_type && s.chat_id) ? esc(s.chat_type) + ':' + esc(s.chat_id).substring(0,12) : '';
  const cost = s.total_cost > 0 ? '$' + s.total_cost.toFixed(4) : '$0';

  main.innerHTML =
    '<div class="main-header">' +
      '<h2>' + esc(selectedKey) + '</h2>' +
      '<div class="detail">' +
        '<span class="badge ' + (s.state||'') + '">' + (s.state||'?') + '</span>' +
        deathInfo +
        (chatInfo ? '<span>' + chatInfo + '</span>' : '') +
        '<span>' + cost + '</span>' +
        '<span>' + (s.protocol || '') + '</span>' +
      '</div>' +
      (ws ? '<div class="workspace-path" onclick="copyText(\'' + esc(ws).replace(/'/g,"\\'") + '\')" title="click to copy">' + esc(ws) + '</div>' : '') +
    '</div>' +
    '<div class="events" id="events-scroll"></div>' +
    '<div class="input-area" id="input-area">' +
      '<div class="file-preview" id="file-preview"></div>' +
      '<div class="input-row">' +
        '<button class="btn-icon" onclick="openFilePicker()" title="upload image">&#x1f4ce;</button>' +
        '<textarea id="msg-input" rows="1" placeholder="send a message..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>' +
        '<button class="btn-icon btn-send" id="btn-send" onclick="sendMessage()" title="send">&#x27a4;</button>' +
      '</div>' +
      '<input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">' +
    '</div>';

  // Enable drag-drop
  const ia = document.getElementById('input-area');
  ia.addEventListener('dragover', e => { e.preventDefault(); ia.style.borderColor='#58a6ff'; });
  ia.addEventListener('dragleave', () => { ia.style.borderColor=''; });
  ia.addEventListener('drop', e => { e.preventDefault(); ia.style.borderColor=''; handleFiles(e.dataTransfer.files); });
}

async function fetchEvents(full) {
  if (!selectedKey) return;
  try {
    let url = '/api/sessions/events?key=' + encodeURIComponent(selectedKey);
    if (!full && lastEventTime > 0) url += '&after=' + lastEventTime;

    const r = await fetch(url);
    if (!r.ok) return;
    const events = await r.json();
    if (!events || events.length === 0) return;

    if (full) {
      renderEvents(events);
    } else {
      appendEvents(events);
    }

    const last = events[events.length - 1];
    if (last && last.time > lastEventTime) lastEventTime = last.time;
  } catch (e) { console.error('fetch events:', e); }
}

function renderEvents(events) {
  const el = document.getElementById('events-scroll');
  if (!el) return;
  el.innerHTML = events.map(eventHtml).join('') || '<div class="empty-state">no events yet</div>';
  el.scrollTop = el.scrollHeight;
}

function appendEvents(events) {
  const el = document.getElementById('events-scroll');
  if (!el) return;
  const empty = el.querySelector('.empty-state');
  if (empty) empty.remove();
  const wasBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
  events.forEach(e => { el.insertAdjacentHTML('beforeend', eventHtml(e)); });
  if (wasBottom) el.scrollTop = el.scrollHeight;
}

function eventHtml(e) {
  const icons = {init:'~',system:'\u2699',thinking:'\u{1f4ad}',tool_use:'\u{1f527}',text:'\u{1f4ac}',result:'\u2705'};
  const t = new Date(e.time).toLocaleTimeString('zh-CN',{hour12:false});
  const icon = icons[e.type] || '\u00b7';
  const costStr = e.cost > 0 ? '<span class="cost">$' + e.cost.toFixed(3) + '</span>' : '';
  return '<div class="event ' + (e.type||'') + '">' +
    '<span class="event-time">' + t + '</span>' +
    '<span class="event-icon">' + icon + '</span>' +
    '<div class="event-content">' + esc(e.summary || e.type) + costStr + '</div></div>';
}

// --- Send message ---

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  if (sending || !selectedKey) return;
  const input = document.getElementById('msg-input');
  const text = (input ? input.value.trim() : '');
  if (!text && pendingFiles.length === 0) return;

  sending = true;
  const btn = document.getElementById('btn-send');
  if (btn) btn.classList.add('sending');
  if (input) { input.value = ''; input.style.height = 'auto'; }

  try {
    const headers = {};
    const token = getToken();
    if (token) headers['Authorization'] = 'Bearer ' + token;

    let body, contentType;
    if (pendingFiles.length > 0) {
      const fd = new FormData();
      fd.append('key', selectedKey);
      if (text) fd.append('text', text);
      pendingFiles.forEach(f => fd.append('files', f));
      body = fd;
    } else {
      headers['Content-Type'] = 'application/json';
      body = JSON.stringify({key: selectedKey, text: text});
    }

    const r = await fetch('/api/sessions/send', {method:'POST', headers, body});

    if (r.status === 401 || r.status === 403) {
      showAuthModal();
      return;
    }
    if (r.status === 409) {
      showToast('session busy, please wait');
      return;
    }
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      showToast(d.error || 'send failed: ' + r.status);
      return;
    }

    pendingFiles = [];
    renderFilePreviews();

    // Speed up polling for quick feedback
    if (eventTimer) clearInterval(eventTimer);
    eventTimer = setInterval(() => fetchEvents(false), 500);
    setTimeout(() => {
      if (eventTimer) clearInterval(eventTimer);
      eventTimer = setInterval(() => fetchEvents(false), 1000);
    }, 15000);
  } catch (e) {
    showToast('send error: ' + e.message);
  } finally {
    sending = false;
    if (btn) btn.classList.remove('sending');
  }
}

// --- File handling ---

function openFilePicker() { document.getElementById('file-input').click(); }

function handleFiles(fileList) {
  for (const f of fileList) {
    if (!f.type.startsWith('image/')) continue;
    if (f.size > 10 * 1024 * 1024) { showToast('file too large (max 10MB)'); continue; }
    if (pendingFiles.length >= 5) { showToast('max 5 files'); break; }
    pendingFiles.push(f);
  }
  renderFilePreviews();
}

function removeFile(idx) {
  pendingFiles.splice(idx, 1);
  renderFilePreviews();
}

function renderFilePreviews() {
  const el = document.getElementById('file-preview');
  if (!el) return;
  el.innerHTML = pendingFiles.map((f, i) => {
    const url = URL.createObjectURL(f);
    return '<div class="file-thumb"><img src="' + url + '"><button class="remove" onclick="removeFile(' + i + ')">\u00d7</button></div>';
  }).join('');
}

// --- Auth modal ---

function showAuthModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML =
    '<div class="modal">' +
      '<h3>Dashboard API Token</h3>' +
      '<input id="token-input" type="password" placeholder="enter dashboard token...">' +
      '<div class="modal-btns">' +
        '<button onclick="this.closest(\'.modal-overlay\').remove()">cancel</button>' +
        '<button class="primary" onclick="saveToken()">save</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('token-input').focus(), 100);
}

function saveToken() {
  const input = document.getElementById('token-input');
  if (input && input.value) {
    setToken(input.value.trim());
    showToast('token saved, retry your message');
  }
  document.querySelector('.modal-overlay').remove();
}

// --- Utilities ---

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('copied'));
}

function shortPath(p) {
  const home = '/home/';
  const i = p.indexOf(home);
  if (i >= 0) {
    const rest = p.substring(i + home.length);
    const slash = rest.indexOf('/');
    if (slash >= 0) return '~' + rest.substring(slash);
  }
  return p.length > 40 ? '...' + p.substring(p.length - 37) : p;
}

function timeAgo(ms) {
  if (!ms) return '\u2014';
  const d = Date.now() - ms;
  if (d < 60000) return Math.floor(d/1000) + 's ago';
  if (d < 3600000) return Math.floor(d/60000) + 'm ago';
  if (d < 86400000) return Math.floor(d/3600000) + 'h ago';
  return Math.floor(d/86400000) + 'd ago';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

fetchSessions();
setInterval(fetchSessions, 3000);
</script>
</body>
</html>
