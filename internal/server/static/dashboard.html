<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>naozhi dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace;background:#0d1117;color:#c9d1d9;font-size:20px}
.container{display:flex;height:100vh}

.sidebar{width:320px;min-width:320px;border-right:1px solid #30363d;display:flex;flex-direction:column}
.sidebar-header{padding:16px;border-bottom:1px solid #30363d}
.sidebar-header h1{font-size:19px;color:#f0f6fc;font-weight:600}
.sidebar-header .stats{font-size:14px;color:#8b949e;margin-top:4px}
.session-list{flex:1;overflow-y:auto}

.session-card{padding:10px 16px;border-bottom:1px solid #21262d;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.session-card:hover{background:#161b22}
.session-card.active{background:#1f2937;border-left-color:#58a6ff}
.session-card.dead-card{opacity:.6}
.session-card .platform{font-size:13px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.session-card .agent{font-size:16px;color:#f0f6fc;margin:2px 0;font-weight:500}
.session-card.dead-card .agent{text-decoration:line-through;color:#8b949e}
.session-card .meta{font-size:13px;color:#8b949e;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.session-card .workspace-hint{font-size:12px;color:#484f58;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-card .session-prompt{font-size:13px;color:#a5d6ff;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-card .session-activity{font-size:12px;color:#8b949e;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}
.session-card .btn-dismiss{position:absolute;top:4px;right:6px;background:none;border:none;color:#484f58;font-size:17px;cursor:pointer;padding:0 4px;line-height:1;opacity:0;transition:opacity .15s}
.session-card:hover .btn-dismiss{opacity:1}
.session-card .btn-dismiss:hover{color:#da3633}
.session-card{position:relative}

.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:12px;font-weight:600}
.badge.running{background:#238636;color:#fff}
.badge.ready{background:#1f6feb;color:#fff}
.badge.dead{background:#484f58;color:#c9d1d9}
.badge.suspended{background:#9e6a03;color:#fff}
.badge.spawning{background:#d29922;color:#fff}
.badge.new{background:#1f6feb;color:#fff;border:1px dashed #58a6ff}
.death-tag{font-size:11px;color:#8b949e;background:#21262d;padding:1px 4px;border-radius:4px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:12px 20px;border-bottom:1px solid #30363d;flex-shrink:0}
.main-header h2{font-size:17px;color:#f0f6fc;font-weight:600;word-break:break-all}
.main-header .detail{font-size:14px;color:#8b949e;margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
.main-header .detail span{white-space:nowrap}
.main-header .workspace-path{font-size:13px;color:#58a6ff;margin-top:4px;cursor:pointer;word-break:break-all}
.main-header .workspace-path:hover{text-decoration:underline}

.events{flex:1;overflow-y:auto;padding:8px 0}
.event{display:flex;gap:10px;padding:5px 20px;transition:background .1s}
.event:hover{background:#161b22}
.event-time{font-size:13px;color:#484f58;min-width:72px;font-family:monospace;padding-top:2px}
.event-icon{width:18px;text-align:center;font-size:15px;padding-top:1px}
.event-content{flex:1;font-size:15px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.event.text .event-content,.event.result .event-content{white-space:normal}
.md-blank{display:block;height:0.35em}
.event.thinking .event-content{color:#a5d6ff;font-style:italic}
.event.tool_use .event-content{color:#d2a8ff}
.event.result .event-content{color:#7ee787}
.event.system .event-content{color:#8b949e;font-size:14px}
.event.text .event-content{color:#c9d1d9}
.event.user .event-content{color:#58a6ff;font-weight:500}
.event.user{background:rgba(88,166,255,.05)}
.event-detail{color:#8b949e;font-size:13px;margin-top:2px;white-space:pre-wrap;word-break:break-word}
.event .tool-name{display:inline-block;background:#30363d;color:#d2a8ff;padding:0 6px;border-radius:4px;font-size:12px;font-weight:600;margin-right:6px}
.event.result{margin:2px 0}
.event.result .event-content{background:rgba(126,231,135,.05);padding:4px 8px;border-radius:4px;border-left:2px solid #3fb950}

.event.tool-summary{background:rgba(210,168,255,.04)}
.event.tool-summary .event-content{color:#8b949e;font-size:13px}
.event.tool-summary .ts-name{color:#d2a8ff}
.event.tool-summary .ts-count{color:#8b949e;font-family:monospace}
.event.tool-summary.pulse .event-content{animation:pulse 2s ease-in-out infinite}

.empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:#484f58;font-size:15px}
.no-sessions{padding:40px 16px;text-align:center;color:#484f58;font-size:14px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease-in-out infinite}
.running-indicator{display:inline-block;width:6px;height:6px;border-radius:50%;background:#3fb950;margin-right:4px;animation:pulse 2s ease-in-out infinite}

/* Message input area */
.input-area{border-top:1px solid #30363d;padding:12px 20px;flex-shrink:0;background:#0d1117}
.input-area.disabled{opacity:.5;pointer-events:none}
.file-preview{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.file-thumb{position:relative;width:48px;height:48px;border-radius:6px;overflow:hidden;border:1px solid #30363d}
.file-thumb img{width:100%;height:100%;object-fit:cover}
.file-thumb .remove{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:#da3633;color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#c9d1d9;padding:8px 12px;font-family:inherit;font-size:15px;resize:none;min-height:38px;max-height:120px;outline:none;line-height:1.4}
.input-row textarea:focus{border-color:#58a6ff}
.input-row textarea::placeholder{color:#484f58}
.btn-icon{width:36px;height:36px;border:1px solid #30363d;border-radius:8px;background:#161b22;color:#8b949e;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s}
.btn-icon:hover{background:#1f2937;color:#c9d1d9;border-color:#484f58}
.btn-icon.sending{opacity:.5;pointer-events:none}
.btn-send{background:#238636;border-color:#238636;color:#fff}
.btn-send:hover{background:#2ea043}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#da3633;color:#fff;padding:8px 16px;border-radius:8px;font-size:14px;z-index:100;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* Auth modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;width:360px}
.modal h3{font-size:15px;color:#f0f6fc;margin-bottom:12px}
.modal input{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:14px;outline:none}
.modal input:focus{border-color:#58a6ff}
.modal .modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal .modal-btns button{padding:6px 16px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:14px}
.modal .modal-btns button.primary{background:#238636;border-color:#238636;color:#fff}

/* WS connection status */
.ws-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:2px 8px;border-radius:10px;background:#21262d;margin-top:6px}
.ws-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.ws-dot.green{background:#3fb950}
.ws-dot.yellow{background:#d29922;animation:pulse 1.5s ease-in-out infinite}
.ws-dot.red{background:#da3633}
.ws-dot.gray{background:#484f58}

/* WS history/live separator */
.ws-separator{text-align:center;padding:8px 20px;position:relative}
.ws-separator::before{content:'';position:absolute;left:20px;right:20px;top:50%;border-top:1px dashed #30363d}
.ws-separator span{position:relative;background:#0d1117;padding:0 8px;font-size:11px;color:#484f58;text-transform:uppercase;letter-spacing:1px}

/* Toast variants */
.toast.warning{background:#9e6a03}
.toast.success{background:#238636}

/* Session state indicator in main header */
.state-indicator{display:none;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.state-indicator.running,.state-indicator.dead{display:inline-block}
.state-indicator.running{background:#3fb950;animation:pulse 2s ease-in-out infinite}
.state-indicator.dead{background:#da3633}

.node-badge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.3px;color:#fff;vertical-align:middle;margin-right:4px}
.node-status{font-size:13px;color:#8b949e;margin-top:6px;line-height:1.8}
.node-status .node-name{margin-right:2px}
.node-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin:0 1px 0 6px;vertical-align:middle}
.node-dot:first-child{margin-left:0}
.node-dot.ok{background:#3fb950}
.node-dot.error{background:#da3633}
.node-info{color:#8b949e;font-size:13px}
.node-group{border-bottom:1px solid #21262d}
.node-group summary.node-group-header{display:flex;align-items:center;gap:6px;padding:7px 16px;cursor:pointer;color:#8b949e;font-size:12px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;list-style:none;user-select:none}
.node-group summary.node-group-header::-webkit-details-marker{display:none}
.node-group summary.node-group-header:hover{background:#161b22;color:#c9d1d9}
.ng-arrow{font-size:9px;color:#484f58;transition:transform .15s;display:inline-block}
.node-group[open] .ng-arrow{transform:rotate(90deg)}
.ng-name{flex:1}
.ng-count{color:#484f58;font-weight:400;font-size:11px}
.ng-running{color:#3fb950;font-weight:400;font-size:11px}
.new-session-btn{display:block;width:calc(100% - 32px);margin:8px 16px;padding:8px;border:1px dashed #30363d;border-radius:8px;background:transparent;color:#8b949e;font-size:14px;cursor:pointer;text-align:center;transition:all .15s}
.new-session-btn:hover{border-color:#58a6ff;color:#58a6ff;background:#161b22}

/* Markdown rendering */
.md-pre{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px 12px;margin:6px 0;overflow-x:auto;font-size:13px;line-height:1.5}
.md-pre code{color:#e6edf3;font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;white-space:pre}
.md-code{background:#30363d;color:#e6edf3;padding:1px 5px;border-radius:4px;font-size:13px;font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace}
.md-h1,.md-h2,.md-h3,.md-h4{display:block;color:#f0f6fc;margin:8px 0 4px}
.md-h1{font-size:16px}.md-h2{font-size:15px}.md-h3{font-size:14px}
.md-ul{margin:4px 0 4px 16px;padding:0;list-style:disc}
.md-ul li{margin:2px 0;line-height:1.5}
.md-link{color:#58a6ff;text-decoration:none}
.md-link:hover{text-decoration:underline}
.md-table{width:100%;border-collapse:collapse;margin:6px 0;font-size:14px}
.md-table th,.md-table td{border:1px solid #30363d;padding:5px 10px;text-align:left}
.md-table th{background:#161b22;color:#f0f6fc;font-weight:600;font-size:13px}
.md-table td{color:#c9d1d9}
.md-table tr:hover td{background:rgba(88,166,255,.04)}
.mermaid-wrap{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;margin:6px 0;overflow-x:auto;text-align:center}
.mermaid-wrap svg{max-width:100%;height:auto}
.ts-subagent{display:inline-block;background:#1f2937;color:#a5d6ff;padding:0 5px;border-radius:4px;font-size:11px;font-weight:600;margin-left:2px}

/* Discovered sessions */
.discovered-section{border-bottom:1px solid #30363d;padding:8px 0}
.discovered-header{display:flex;align-items:center;justify-content:space-between;padding:4px 16px}
.discovered-header span{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.btn-scan{font-size:12px;padding:2px 8px;border:1px solid #30363d;border-radius:6px;background:#161b22;color:#8b949e;cursor:pointer}
.btn-scan:hover{border-color:#58a6ff;color:#58a6ff}
.discovered-card{padding:8px 16px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:8px}
.discovered-card .dc-info{flex:1;min-width:0}
.discovered-card .dc-cwd{font-size:13px;color:#f0f6fc;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.discovered-card .dc-summary{font-size:12px;color:#a5d6ff;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.discovered-card .dc-prompt{font-size:12px;color:#8b949e;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}
.discovered-card .dc-meta{font-size:11px;color:#8b949e;display:flex;gap:6px;margin-top:2px}
.discovered-card .dc-tag{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;background:#21262d;color:#8b949e}
.btn-takeover{font-size:11px;padding:4px 10px;border:1px solid #d29922;border-radius:6px;background:transparent;color:#d29922;cursor:pointer;white-space:nowrap}
.btn-takeover:hover{background:#d29922;color:#fff}
.btn-takeover.taking{opacity:.5;pointer-events:none}
.discovered-card.active{background:#1f2937;border-left:3px solid #d29922}
</style>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>naozhi dashboard</h1>
      <div class="stats" id="stats">connecting...</div>
      <div class="ws-badge" id="ws-status"><span class="ws-dot gray"></span>WS Off</div>
      <button class="new-session-btn" onclick="createNewSession()">+ new session</button>
    </div>
    <div class="discovered-section" id="discovered-section">
      <div class="discovered-header">
        <span>Discovered Processes</span>
      </div>
      <div id="discovered-list"><div style="padding:4px 16px;font-size:11px;color:#484f58">scanning...</div></div>
    </div>
    <div class="session-list" id="session-list">
      <div class="no-sessions">loading...</div>
    </div>
  </div>
  <div class="main" id="main">
    <div class="empty-state">select a session to view events and send messages</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let selectedKey = null;
let eventTimer = null;
let lastEventTime = 0;
let sessionsData = {};
let pendingFiles = [];
let sending = false;
let selectedNode = 'local';
let nodesData = {};
let lastSessionsJSON = '';
let sessionPollTimer = null;
let discoveredPollTimer = null;
let previewTimer = null;
let previewEventCount = 0;
let sessionCounter = 0;
let availableAgents = ['general'];
let defaultWorkspace = '';
const sessionWorkspaces = {};

function getToken() { return localStorage.getItem('naozhi_dashboard_token') || ''; }
function setToken(t) { localStorage.setItem('naozhi_dashboard_token', t); }

// Pending dashboard sessions — persisted in localStorage so they survive refresh/restart
function loadPendingSessions() {
  try {
    const raw = localStorage.getItem('naozhi_pending_sessions');
    if (!raw) return;
    const entries = JSON.parse(raw);
    for (const e of entries) {
      if (e.key && !sessionWorkspaces[e.key]) sessionWorkspaces[e.key] = e.workspace || '';
    }
  } catch (_) {}
}

function savePendingSessions() {
  const entries = Object.entries(sessionWorkspaces).map(([key, ws]) => ({ key, workspace: ws }));
  if (entries.length > 0) {
    localStorage.setItem('naozhi_pending_sessions', JSON.stringify(entries));
  } else {
    localStorage.removeItem('naozhi_pending_sessions');
  }
}

function removePendingSession(key) {
  delete sessionWorkspaces[key];
  savePendingSessions();
}

async function fetchSessions() {
  try {
    const headers = {};
    const t = getToken();
    if (t) headers['Authorization'] = 'Bearer ' + t;
    const r = await fetch('/api/sessions', { headers });
    if (!r.ok) return;
    const data = await r.json();
    const json = JSON.stringify(data);
    if (json === lastSessionsJSON) return;
    lastSessionsJSON = json;
    if (data.nodes) nodesData = data.nodes;
    if (data.stats.agents) availableAgents = data.stats.agents;
    if (data.stats.default_workspace) defaultWorkspace = data.stats.default_workspace;

    // Track which keys the backend knows about
    const backendKeys = new Set();
    (data.sessions || []).forEach(s => {
      const n = s.node || 'local';
      sessionsData[sid(s.key, n)] = s;
      backendKeys.add(s.key);
    });

    // Remove pending sessions that now exist in backend
    let pendingChanged = false;
    for (const key of Object.keys(sessionWorkspaces)) {
      if (backendKeys.has(key)) {
        delete sessionWorkspaces[key];
        pendingChanged = true;
      }
    }
    if (pendingChanged) savePendingSessions();

    // Merge pending dashboard sessions into data for sidebar rendering
    const pendingKeys = Object.keys(sessionWorkspaces);
    if (pendingKeys.length > 0) {
      if (!data.sessions) data.sessions = [];
      for (const key of pendingKeys) {
        if (!backendKeys.has(key)) {
          const parts = key.split(':');
          data.sessions.push({
            key: key,
            state: 'new',
            platform: parts[0] || 'dashboard',
            agent: parts[3] || 'general',
            workspace: sessionWorkspaces[key],
            last_active: 0,
            node: 'local',
          });
        }
      }
    }

    renderSidebar(data);
  } catch (e) {
    document.getElementById('stats').textContent = 'error: ' + e.message;
  }
}

function renderSidebar(data) {
  const st = data.stats;
  document.getElementById('stats').textContent =
    st.active + '/' + (st.max_procs || '?') + ' active \u00b7 ' + st.total + ' total \u00b7 ' + st.uptime + ' \u00b7 ' + st.backend;

  // Remove legacy node-status line (node info now lives in sidebar groups)
  const nodeEl = document.getElementById('node-status');
  if (nodeEl) nodeEl.remove();

  const list = document.getElementById('session-list');
  const sessions = data.sessions || [];

  const order = {running:0, spawning:1, ready:2, new:3, suspended:4, dead:5};
  sessions.sort((a, b) => {
    const d = (order[a.state]||5) - (order[b.state]||5);
    return d !== 0 ? d : b.last_active - a.last_active;
  });

  if (sessions.length === 0 && Object.keys(sessionWorkspaces).length === 0) {
    list.innerHTML = '<div class="no-sessions">no sessions</div>';
    return;
  }

  if (!isMultiNode()) {
    list.innerHTML = sessions.map(sessionCardHtml).join('');
  } else {
    const groups = {};
    sessions.forEach(s => {
      const n = s.node || 'local';
      if (!groups[n]) groups[n] = [];
      groups[n].push(s);
    });
    const collapsed = getCollapsedNodes();
    list.innerHTML = Object.keys(groups).map(nid => {
      const nd = nodesData[nid] || {};
      const dotCls = nd.status === 'ok' ? 'ok' : 'error';
      const displayName = nd.display_name || nid;
      const grp = groups[nid];
      const running = grp.filter(s => s.state === 'running' || s.state === 'spawning').length;
      const countHtml = running > 0
        ? '<span class="ng-running">' + running + ' running</span>'
        : '<span class="ng-count">' + grp.length + '</span>';
      return '<details class="node-group"' + (collapsed.has(nid) ? '' : ' open') +
        ' data-node="' + esc(nid) + '" ontoggle="saveNodeToggle(this)">' +
        '<summary class="node-group-header">' +
        '<span class="ng-arrow">&#9658;</span>' +
        '<span class="node-dot ' + dotCls + '"></span>' +
        '<span class="ng-name">' + esc(displayName) + '</span>' +
        countHtml + '</summary>' +
        grp.map(sessionCardHtml).join('') +
        '</details>';
    }).join('');
  }
}

function sessionCardHtml(s) {
  const sNode = s.node || 'local';
  const isDead = s.state === 'dead' || s.state === 'suspended';
  const isActive = selectedKey === s.key && selectedNode === sNode;
  const cls = (isActive ? 'session-card active' : 'session-card') + (isDead ? ' dead-card' : '');
  const ago = timeAgo(s.last_active);
  const proto = s.protocol || '\u2014';
  const ri = s.state === 'running' ? '<span class="running-indicator"></span>' : '';
  const deathTag = s.death_reason ? ' <span class="death-tag">' + esc(s.death_reason.replace(/_/g,' ')) + '</span>' : '';
  const ws = s.workspace ? shortPath(s.workspace) : '';
  const prompt = s.last_prompt || '';
  const activity = s.last_activity || '';
  return '<div class="' + cls + '" data-key="' + esc(s.key) + '" data-node="' + esc(sNode) + '" onclick="selectSession(this.dataset.key,this.dataset.node)">' +
    '<button class="btn-dismiss" onclick="event.stopPropagation();dismissSession(\'' + esc(s.key).replace(/'/g,"\\'") + '\',\'' + esc(sNode).replace(/'/g,"\\'") + '\')" title="remove">&times;</button>' +
    '<div class="platform">' + esc(s.platform) + ' \u00b7 ' + esc(proto) + '</div>' +
    '<div class="agent">' + ri + esc(s.agent || 'general') + '</div>' +
    (prompt ? '<div class="session-prompt" title="' + esc(prompt) + '">' + esc(prompt) + '</div>' : '') +
    (activity ? '<div class="session-activity">' + esc(activity) + '</div>' : '') +
    '<div class="meta"><span class="badge ' + s.state + '">' + s.state + '</span>' + deathTag +
    '<span>' + ago + '</span>' +
    '</div>' +
    (ws ? '<div class="workspace-hint">' + esc(ws) + '</div>' : '') +
    '</div>';
}

function selectSession(key, node) {
  node = node || 'local';
  const prevKey = selectedKey;
  const prevNode = selectedNode;
  selectedKey = key;
  selectedNode = node;
  lastEventTime = 0;
  turnToolAccum = {};
  stopPreviewPolling();
  document.querySelectorAll('.session-card').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key && (el.dataset.node || 'local') === node);
  });
  renderMainShell();

  const changed = prevKey !== key || prevNode !== node;
  if (wsm.isConnected()) {
    if (changed) wsm.unsubscribe();
    wsm.lastEventTimeWs = 0;
    wsm.subscribe(key, node);
    if (eventTimer) { clearInterval(eventTimer); eventTimer = null; }
  } else {
    fetchEvents(true);
    if (eventTimer) clearInterval(eventTimer);
    eventTimer = setInterval(() => fetchEvents(false), 1000);
  }
}

async function dismissSession(key, node) {
  node = node || 'local';
  if (!confirm('确定删除此会话？此操作不可撤回。')) return;

  // If it's a pending (never-sent) session, just remove from localStorage
  if (sessionWorkspaces[key] !== undefined) {
    removePendingSession(key);
    delete sessionsData[sid(key, node)];
    if (selectedKey === key) {
      selectedKey = null;
      document.getElementById('main').innerHTML = '<div class="empty-state">select a session</div>';
    }
    lastSessionsJSON = '';
    fetchSessions();
    return;
  }

  try {
    const headers = {'Content-Type': 'application/json'};
    const token = getToken();
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const r = await fetch('/api/sessions', {method: 'DELETE', headers, body: JSON.stringify({key: key})});
    if (!r.ok && r.status !== 404) {
      const text = await r.text().catch(() => r.status);
      showToast('remove failed: ' + text);
      return;
    }
    delete sessionsData[sid(key, node)];
    if (selectedKey === key) {
      selectedKey = null;
      if (wsm.subscribedKey === key) wsm.unsubscribe();
      document.getElementById('main').innerHTML = '<div class="empty-state">select a session</div>';
    }
    lastSessionsJSON = '';
    fetchSessions();
  } catch (e) { showToast('remove error: ' + e.message); }
}

function renderMainShell() {
  const main = document.getElementById('main');
  const s = sessionsData[sid(selectedKey, selectedNode)] || {};
  const ws = s.workspace || '';
  const deathInfo = s.death_reason ? '<span class="death-tag">' + esc(s.death_reason.replace(/_/g,' ')) + '</span>' : '';
  const chatInfo = (s.chat_type && s.chat_id) ? esc(s.chat_type) + ':' + esc(s.chat_id).substring(0,12) : '';
  const nodeDisplay = isMultiNode() && selectedNode ? (function() {
    const nd = nodesData[selectedNode];
    const label = nd && nd.display_name ? esc(selectedNode) + ' (' + esc(nd.display_name) + ')' : esc(selectedNode);
    return '<span class="node-info">' + label + '</span>';
  })() : '';

  main.innerHTML =
    '<div class="main-header">' +
      '<h2>' + esc(selectedKey) + '</h2>' +
      '<div class="detail">' +
        '<span class="state-indicator ' + (s.state||'') + '"></span>' +
        '<span class="badge ' + (s.state||'') + '">' + (s.state||'?') + '</span>' +
        deathInfo +
        nodeDisplay +
        (chatInfo ? '<span>' + chatInfo + '</span>' : '') +
        '<span>' + (s.protocol || '') + '</span>' +
      '</div>' +
      (ws ? '<div class="workspace-path" onclick="copyText(\'' + esc(ws).replace(/'/g,"\\'") + '\')" title="click to copy">' + esc(ws) + '</div>' : '') +
    '</div>' +
    '<div class="events" id="events-scroll"></div>' +
    '<div class="input-area" id="input-area">' +
      '<div class="file-preview" id="file-preview"></div>' +
      '<div class="input-row">' +
        '<button class="btn-icon" onclick="openFilePicker()" title="upload image">&#x1f4ce;</button>' +
        '<textarea id="msg-input" rows="1" placeholder="send a message..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>' +
        '<button class="btn-icon btn-send" id="btn-send" onclick="sendMessage()" title="send">&#x27a4;</button>' +
      '</div>' +
      '<input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">' +
    '</div>';

  // Enable drag-drop
  const ia = document.getElementById('input-area');
  ia.addEventListener('dragover', e => { e.preventDefault(); ia.style.borderColor='#58a6ff'; });
  ia.addEventListener('dragleave', () => { ia.style.borderColor=''; });
  ia.addEventListener('drop', e => { e.preventDefault(); ia.style.borderColor=''; handleFiles(e.dataTransfer.files); });
}

async function fetchEvents(full) {
  if (!selectedKey) return;
  try {
    let url = '/api/sessions/events?key=' + encodeURIComponent(selectedKey);
    if (selectedNode && selectedNode !== 'local') url += '&node=' + encodeURIComponent(selectedNode);
    if (!full && lastEventTime > 0) url += '&after=' + lastEventTime;

    const headers = {};
    const t = getToken();
    if (t) headers['Authorization'] = 'Bearer ' + t;
    const r = await fetch(url, { headers });
    const events = await r.json();
    if (!events || events.length === 0) return;

    if (full) {
      renderEvents(events);
    } else {
      appendEvents(events);
    }

    const last = events[events.length - 1];
    if (last && last.time > lastEventTime) lastEventTime = last.time;
  } catch (e) { console.error('fetch events:', e); }
}

function renderEvents(events) {
  const el = document.getElementById('events-scroll');
  if (!el) return;
  turnToolAccum = {};
  const display = processEventsForDisplay(events);
  el.innerHTML = display.map(eventHtml).filter(Boolean).join('') || '<div class="empty-state">no events yet</div>';
  el.scrollTop = el.scrollHeight;
  runMermaid();
}

function appendEvents(events) {
  const el = document.getElementById('events-scroll');
  if (!el) return;
  const empty = el.querySelector('.empty-state');
  if (empty) empty.remove();
  const wasBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
  events.forEach(e => {
    if (e.type === 'tool_use') { if (e.tool) turnToolAccum[toolKey(e)] = (turnToolAccum[toolKey(e)] || 0) + 1; updatePendingSummary(); return; }
    if (e.type === 'result') return;
    if (Object.keys(turnToolAccum).length > 0) finalizePendingSummary();
    const h = eventHtml(e); if (h) el.insertAdjacentHTML('beforeend', h);
  });
  if (wasBottom) el.scrollTop = el.scrollHeight;
  runMermaid();
}

function eventHtml(e) {
  if (e.type === 'tool_use' || e.type === 'result' || e.type === 'thinking') return '';
  if (e.type === 'tool_summary') return toolSummaryHtml(e.tools);
  const icons = {init:'~',system:'\u2699',user:'\u{1f464}'};
  const t = new Date(e.time).toLocaleTimeString('zh-CN',{hour12:false});
  const icon = icons[e.type] || '';

  let content = '';
  if (e.type === 'tool_use') {
    const toolTag = e.tool ? '<span class="tool-name">' + esc(e.tool) + '</span>' : '';
    content = toolTag + esc(e.summary || e.type);
    if (e.detail && e.detail !== e.summary) {
      content += '<div class="event-detail">' + esc(e.detail) + '</div>';
    }
  } else if (e.type === 'system') {
    content = esc(e.summary || e.type);
  } else if (e.type === 'text' || e.type === 'result') {
    content = renderMd(e.detail || e.summary || e.type);
  } else {
    content = esc(e.detail || e.summary || e.type);
  }

  return '<div class="event ' + esc(e.type||'') + '">' +
    '<span class="event-time">' + t + '</span>' +
    '<span class="event-icon">' + icon + '</span>' +
    '<div class="event-content">' + content + '</div></div>';
}

// --- Send message ---

function handleKey(e) {
  if (e.key === 'Escape') { e.preventDefault(); interruptSession(); return; }
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendMessage(); }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  if (sending || !selectedKey) return;
  const input = document.getElementById('msg-input');
  const text = (input ? input.value.trim() : '');
  if (!text && pendingFiles.length === 0) return;

  sending = true;
  const btn = document.getElementById('btn-send');
  if (btn) btn.classList.add('sending');
  if (input) { input.value = ''; input.style.height = 'auto'; }

  // WS path: send via WebSocket when connected and no files
  if (wsm.isConnected() && pendingFiles.length === 0) {
    const id = 'r' + (++wsm.sendCounter);
    const sendMsg = { type: 'send', key: selectedKey, text: text, id: id };
    if (selectedNode && selectedNode !== 'local') sendMsg.node = selectedNode;
    if (sessionWorkspaces[selectedKey]) {
      sendMsg.workspace = sessionWorkspaces[selectedKey];
      delete sessionWorkspaces[selectedKey];
    }
    wsm.send(sendMsg);
    sending = false;
    if (btn) btn.classList.remove('sending');
    return;
  }

  // HTTP POST fallback
  try {
    const headers = {};
    const token = getToken();
    if (token) headers['Authorization'] = 'Bearer ' + token;

    let body;
    if (pendingFiles.length > 0) {
      const fd = new FormData();
      fd.append('key', selectedKey);
      if (selectedNode && selectedNode !== 'local') fd.append('node', selectedNode);
      if (text) fd.append('text', text);
      if (sessionWorkspaces[selectedKey]) {
        fd.append('workspace', sessionWorkspaces[selectedKey]);
        delete sessionWorkspaces[selectedKey];
      }
      pendingFiles.forEach(f => fd.append('files', f));
      body = fd;
    } else {
      headers['Content-Type'] = 'application/json';
      const payload = {key: selectedKey, text: text};
      if (selectedNode && selectedNode !== 'local') payload.node = selectedNode;
      if (sessionWorkspaces[selectedKey]) {
        payload.workspace = sessionWorkspaces[selectedKey];
        delete sessionWorkspaces[selectedKey];
      }
      body = JSON.stringify(payload);
    }

    const r = await fetch('/api/sessions/send', {method:'POST', headers, body});

    if (r.status === 401 || r.status === 403) {
      showAuthModal();
      return;
    }
    if (r.status === 409) {
      showToast('session busy, please wait');
      return;
    }
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      showToast(d.error || 'send failed: ' + r.status);
      return;
    }

    pendingFiles = [];
    renderFilePreviews();

    // Speed up polling when WS not connected
    if (!wsm.isConnected()) {
      if (eventTimer) clearInterval(eventTimer);
      eventTimer = setInterval(() => fetchEvents(false), 500);
      setTimeout(() => {
        if (eventTimer) clearInterval(eventTimer);
        if (!wsm.isConnected()) {
          eventTimer = setInterval(() => fetchEvents(false), 1000);
        }
      }, 15000);
    }
  } catch (e) {
    showToast('send error: ' + e.message);
  } finally {
    sending = false;
    if (btn) btn.classList.remove('sending');
  }
}

function interruptSession() {
  if (!selectedKey) return;
  const sd = sessionsData[sid(selectedKey, selectedNode || 'local')];
  if (!sd || sd.state !== 'running') return;
  if (wsm.isConnected()) {
    wsm.send({ type: 'interrupt', key: selectedKey, id: 'int' + Date.now() });
    showToast('interrupt sent');
  }
}

// --- File handling ---

function openFilePicker() { document.getElementById('file-input').click(); }

function handleFiles(fileList) {
  for (const f of fileList) {
    if (!f.type.startsWith('image/')) continue;
    if (f.size > 10 * 1024 * 1024) { showToast('file too large (max 10MB)'); continue; }
    if (pendingFiles.length >= 5) { showToast('max 5 files'); break; }
    pendingFiles.push(f);
  }
  renderFilePreviews();
}

function removeFile(idx) {
  pendingFiles.splice(idx, 1);
  renderFilePreviews();
}

function renderFilePreviews() {
  const el = document.getElementById('file-preview');
  if (!el) return;
  // Revoke old blob URLs to prevent memory leaks
  el.querySelectorAll('img[src^="blob:"]').forEach(img => URL.revokeObjectURL(img.src));
  el.innerHTML = pendingFiles.map((f, i) => {
    const url = URL.createObjectURL(f);
    return '<div class="file-thumb"><img src="' + url + '"><button class="remove" onclick="removeFile(' + i + ')">\u00d7</button></div>';
  }).join('');
}

// --- Auth modal ---

function showAuthModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML =
    '<div class="modal">' +
      '<h3>Dashboard API Token</h3>' +
      '<input id="token-input" type="password" placeholder="enter dashboard token...">' +
      '<div class="modal-btns">' +
        '<button onclick="this.closest(\'.modal-overlay\').remove()">cancel</button>' +
        '<button class="primary" onclick="saveToken()">save</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('token-input').focus(), 100);
}

function saveToken() {
  const input = document.getElementById('token-input');
  if (input && input.value) {
    setToken(input.value.trim());
    showToast('token saved, retry your message');
    wsm.disconnect();
    wsm.connect();
  }
  document.querySelector('.modal-overlay').remove();
}

function createNewSession() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const ws = defaultWorkspace || '/home/ec2-user/workspace';
  overlay.innerHTML =
    '<div class="modal">' +
      '<h3>New Session</h3>' +
      '<div style="margin-bottom:12px">' +
        '<label style="font-size:12px;color:#8b949e;display:block;margin-bottom:4px">Workspace</label>' +
        '<input id="new-workspace" style="width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:13px;outline:none" placeholder="' + esc(ws) + '" value="' + esc(ws) + '" onkeydown="if(event.key===\'Enter\'){doCreateSession()}">' +
      '</div>' +
      '<div class="modal-btns">' +
        '<button onclick="this.closest(\'.modal-overlay\').remove()">cancel</button>' +
        '<button class="primary" onclick="doCreateSession()">create</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('new-workspace').focus(), 100);
}

function doCreateSession() {
  const workspace = document.getElementById('new-workspace').value.trim();
  const folderName = workspace ? (workspace.replace(/\/+$/, '').split('/').pop() || 'session') : 'session';
  document.querySelector('.modal-overlay').remove();

  sessionCounter++;
  const now = new Date();
  const ts = now.toISOString().slice(0,10) + '-' +
    now.toTimeString().slice(0,8).replace(/:/g, '') + '-' + sessionCounter;
  const key = 'dashboard:direct:' + ts + ':' + folderName;

  if (workspace) sessionWorkspaces[key] = workspace;
  savePendingSessions();

  stopPreviewPolling();
  selectedKey = key;
  selectedNode = 'local';
  lastEventTime = 0;
  turnToolAccum = {};
  document.querySelectorAll('.session-card').forEach(el => el.classList.remove('active'));
  renderMainShell();
  lastSessionsJSON = '';
  fetchSessions();
  setTimeout(() => { const input = document.getElementById('msg-input'); if (input) input.focus(); }, 100);
}

// --- Utilities ---

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('copied'));
}

function shortPath(p) {
  const home = '/home/';
  const i = p.indexOf(home);
  if (i >= 0) {
    const rest = p.substring(i + home.length);
    const slash = rest.indexOf('/');
    if (slash >= 0) return '~' + rest.substring(slash);
  }
  return p.length > 40 ? '...' + p.substring(p.length - 37) : p;
}

function timeAgo(ms) {
  if (!ms) return '\u2014';
  const d = Date.now() - ms;
  if (d < 60000) return Math.floor(d/1000) + 's ago';
  if (d < 3600000) return Math.floor(d/60000) + 'm ago';
  if (d < 86400000) return Math.floor(d/3600000) + 'h ago';
  return Math.floor(d/86400000) + 'd ago';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function runMermaid() {
  if (!window.mermaid) return;
  let hasNew = false;
  Object.entries(mermaidPending).forEach(([id, code]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = code;
    el.className = 'mermaid';
    delete mermaidPending[id];
    hasNew = true;
  });
  if (hasNew) mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
}

if (window.mermaid) mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'strict' });

let mermaidCounter = 0;
const mermaidPending = {};

/* Lightweight Markdown renderer for text/result events */
function renderMd(s) {
  if (!s) return '';
  // Split by fenced code blocks first to avoid processing inside them
  const parts = s.split(/(```[\s\S]*?```)/g);
  return parts.map(part => {
    if (part.startsWith('```')) {
      const m = part.match(/^```(\w*)\n?([\s\S]*?)```$/);
      const lang = m ? m[1] : '';
      const code = m ? m[2].replace(/\n$/, '') : part.slice(3, -3);
      if (lang === 'mermaid') {
        const id = 'mmd-' + (++mermaidCounter);
        mermaidPending[id] = code;
        return '<div class="mermaid-wrap"><pre id="' + id + '" class="mermaid-pending"></pre></div>';
      }
      const langAttr = lang ? ' data-lang="' + esc(lang) + '"' : '';
      return '<pre class="md-pre"><code' + langAttr + '>' + esc(code) + '</code></pre>';
    }
    // Process line by line for block elements
    const lines = part.split('\n');
    let html = '';
    let inList = false;
    for (let i = 0; i < lines.length; i++) {
      let line = lines[i];
      // Headings
      const hm = line.match(/^(#{1,4})\s+(.+)$/);
      if (hm) {
        if (inList) { html += '</ul>'; inList = false; }
        const level = hm[1].length;
        html += '<strong class="md-h' + level + '">' + inlineMd(hm[2]) + '</strong>\n';
        continue;
      }
      // Unordered list
      if (/^\s*[-*]\s+/.test(line)) {
        if (!inList) { html += '<ul class="md-ul">'; inList = true; }
        html += '<li>' + inlineMd(line.replace(/^\s*[-*]\s+/, '')) + '</li>';
        continue;
      }
      // Ordered list
      if (/^\s*\d+\.\s+/.test(line)) {
        if (!inList) { html += '<ul class="md-ul">'; inList = true; }
        html += '<li>' + inlineMd(line.replace(/^\s*\d+\.\s+/, '')) + '</li>';
        continue;
      }
      if (inList) { html += '</ul>'; inList = false; }
      if (line === '') {
        html += '<div class="md-blank"></div>';
        continue;
      }
      if (/^\|.+\|$/.test(line.trim())) {
        let tbl = [line];
        while (i + 1 < lines.length && /^\|.+\|$/.test(lines[i + 1].trim())) { tbl.push(lines[++i]); }
        html += renderTable(tbl);
        continue;
      }
      html += inlineMd(line) + '<br>';
    }
    if (inList) html += '</ul>';
    return html;
  }).join('');
}

/* Inline markdown: bold, italic, code, links */
function inlineMd(s) {
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, '<code class="md-code">$1</code>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, text, url) {
    if (/^https?:\/\//i.test(url) || /^mailto:/i.test(url)) {
      return '<a href="' + url + '" class="md-link" target="_blank" rel="noopener noreferrer">' + text + '</a>';
    }
    return text;
  });
  return s;
}

function renderTable(lines) {
  if (lines.length < 2) return lines.map(l => inlineMd(l) + '\n').join('');
  if (!/^\|[\s\-:]+(\|[\s\-:]+)+\|$/.test(lines[1].trim())) return lines.map(l => inlineMd(l) + '\n').join('');
  const cells = l => l.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
  let h = '<table class="md-table"><thead><tr>' + cells(lines[0]).map(c => '<th>' + inlineMd(c) + '</th>').join('') + '</tr></thead><tbody>';
  for (let i = 2; i < lines.length; i++) h += '<tr>' + cells(lines[i]).map(c => '<td>' + inlineMd(c) + '</td>').join('') + '</tr>';
  return h + '</tbody></table>';
}

let turnToolAccum = {};

function processEventsForDisplay(events) {
  const out = [];
  let accum = {};
  for (const e of events) {
    if (e.type === 'tool_use') { if (e.tool) accum[toolKey(e)] = (accum[toolKey(e)] || 0) + 1; continue; }
    if (e.type === 'result') continue;
    if (Object.keys(accum).length > 0) { out.push({ type: 'tool_summary', tools: accum }); accum = {}; }
    out.push(e);
  }
  if (Object.keys(accum).length > 0) out.push({ type: 'tool_summary', tools: accum });
  return out;
}

function toolKey(e) {
  return (e.tool === 'Agent' && e.subagent) ? 'Agent\x00' + e.subagent : (e.tool || 'unknown');
}

function toolKeyDisplay(key) {
  const sep = key.indexOf('\x00');
  if (sep < 0) return { name: key, sub: '' };
  return { name: key.slice(0, sep), sub: key.slice(sep + 1) };
}

function toolSummaryHtml(tools) {
  const entries = Object.entries(tools).sort((a,b) => b[1] - a[1]);
  const total = entries.reduce((s, t) => s + t[1], 0);
  const items = entries.map(([key, count]) => {
    const {name, sub} = toolKeyDisplay(key);
    const subHtml = sub ? ' <span class="ts-subagent">' + esc(sub) + '</span>' : '';
    return '<span class="ts-name">' + esc(name) + '</span>' + subHtml + ' <span class="ts-count">\u00d7' + count + '</span>';
  }).join('\u2002');
  return '<div class="event tool-summary"><span class="event-time"></span><span class="event-icon">\u{1f527}</span>' +
    '<div class="event-content">' + total + ' calls\u2002' + items + '</div></div>';
}

function updatePendingSummary() {
  const scroll = document.getElementById('events-scroll');
  if (!scroll) return;
  let el = document.getElementById('pending-tool-summary');
  if (!el) {
    const empty = scroll.querySelector('.empty-state');
    if (empty) empty.remove();
    scroll.insertAdjacentHTML('beforeend', '<div id="pending-tool-summary" class="event tool-summary pulse"></div>');
    el = document.getElementById('pending-tool-summary');
  }
  const entries = Object.entries(turnToolAccum).sort((a,b) => b[1] - a[1]);
  const total = entries.reduce((s, t) => s + t[1], 0);
  const items = entries.map(([key, count]) => {
    const {name, sub} = toolKeyDisplay(key);
    const subHtml = sub ? ' <span class="ts-subagent">' + esc(sub) + '</span>' : '';
    return '<span class="ts-name">' + esc(name) + '</span>' + subHtml + ' <span class="ts-count">\u00d7' + count + '</span>';
  }).join('\u2002');
  el.innerHTML = '<span class="event-time"></span><span class="event-icon">\u{1f527}</span>' +
    '<div class="event-content">' + total + ' calls\u2002' + items + '</div>';
  const wasBottom = scroll.scrollTop + scroll.clientHeight >= scroll.scrollHeight - 30;
  if (wasBottom) scroll.scrollTop = scroll.scrollHeight;
}

function finalizePendingSummary() {
  const el = document.getElementById('pending-tool-summary');
  if (el) { el.removeAttribute('id'); el.classList.remove('pulse'); }
  turnToolAccum = {};
}

function sid(key, node) { return key + '\t' + (node || 'local'); }

function isMultiNode() {
  const keys = Object.keys(nodesData);
  return keys.length > 1 || (keys.length === 1 && keys[0] !== 'local');
}

function getCollapsedNodes() {
  try { return new Set(JSON.parse(localStorage.getItem('naozhi_collapsed_nodes') || '[]')); }
  catch(_) { return new Set(); }
}

function saveNodeToggle(el) {
  const nid = el.dataset.node;
  if (!nid) return;
  const collapsed = getCollapsedNodes();
  if (el.open) collapsed.delete(nid); else collapsed.add(nid);
  localStorage.setItem('naozhi_collapsed_nodes', JSON.stringify([...collapsed]));
}

/* ===== WebSocket Connection Manager ===== */

const WS_STATES = { OFF: 'off', CONNECTING: 'connecting', AUTH: 'authenticating', CONNECTED: 'connected', DISCONNECTED: 'disconnected' };

const wsm = {
  conn: null,
  state: WS_STATES.OFF,
  backoff: 1000,
  maxBackoff: 30000,
  reconnectTimer: null,
  pingTimer: null,
  subscribedKey: null,
  subscribedNode: null,
  lastEventTimeWs: 0,
  sendCounter: 0,
  _initialSubscribe: false,

  connect() {
    if (this.conn && (this.conn.readyState === WebSocket.OPEN || this.conn.readyState === WebSocket.CONNECTING)) return;

    this.setState(WS_STATES.CONNECTING);
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    this.conn = new WebSocket(proto + '//' + location.host + '/ws');

    this.conn.onopen = () => {
      this.setState(WS_STATES.AUTH);
      const token = getToken();
      this.conn.send(JSON.stringify({ type: 'auth', token: token }));
    };

    this.conn.onmessage = (evt) => {
      try { this.onMessage(JSON.parse(evt.data)); }
      catch (err) { console.error('ws parse error:', err); }
    };

    this.conn.onclose = () => {
      this.cleanup();
      this.setState(WS_STATES.DISCONNECTED);
      this.scheduleReconnect();
    };

    this.conn.onerror = () => {};
  },

  cleanup() {
    if (this.pingTimer) { clearInterval(this.pingTimer); this.pingTimer = null; }
  },

  disconnect() {
    if (this.reconnectTimer) { clearTimeout(this.reconnectTimer); this.reconnectTimer = null; }
    this.cleanup();
    if (this.conn) { this.conn.close(); this.conn = null; }
    this.subscribedKey = null;
    this.subscribedNode = null;
    this._pendingSubscribeKey = null;
    this._pendingSubscribeNode = null;
    this.setState(WS_STATES.OFF);
  },

  scheduleReconnect() {
    if (this.reconnectTimer) return;
    this.reconnectTimer = setTimeout(() => {
      this.reconnectTimer = null;
      this.connect();
    }, this.backoff);
    this.backoff = Math.min(this.backoff * 2, this.maxBackoff);
  },

  onMessage(msg) {
    switch (msg.type) {
      case 'auth_ok':
        this.setState(WS_STATES.CONNECTED);
        this.backoff = 1000;
        this.startPing();
        this.onConnected();
        break;
      case 'auth_fail':
        showToast('WS auth failed: ' + (msg.error || 'invalid token'));
        this.conn.close();
        break;
      case 'subscribed':
        // Server confirmed subscription
        this.subscribedKey = this._pendingSubscribeKey || msg.key;
        this.subscribedNode = this._pendingSubscribeNode || 'local';
        this._pendingSubscribeKey = null;
        this._pendingSubscribeNode = null;
        break;
      case 'error':
        // Subscribe failed (e.g. session not found yet) — reset pending
        this._pendingSubscribeKey = null;
        this._pendingSubscribeNode = null;
        break;
      case 'history':
        this.onHistory(msg);
        break;
      case 'event':
        this.onEvent(msg);
        break;
      case 'send_ack':
        this.onSendAck(msg);
        break;
      case 'interrupt_ack':
        break;
      case 'session_state':
        this.onSessionState(msg);
        break;
      case 'sessions_update':
        fetchSessions().then(() => {
          // Auto-subscribe to newly created session (only if no active or pending subscription)
          if (selectedKey && !wsm.subscribedKey && !wsm._pendingSubscribeKey && sessionsData[sid(selectedKey, selectedNode)]) {
            wsm.subscribe(selectedKey, selectedNode);
          }
        });
        break;
      case 'pong':
        break;
    }
  },

  startPing() {
    if (this.pingTimer) clearInterval(this.pingTimer);
    this.pingTimer = setInterval(() => {
      if (this.conn && this.conn.readyState === WebSocket.OPEN) {
        this.conn.send(JSON.stringify({ type: 'ping' }));
      }
    }, 30000);
  },

  send(msg) {
    if (this.conn && this.conn.readyState === WebSocket.OPEN) {
      this.conn.send(JSON.stringify(msg));
      return true;
    }
    return false;
  },

  subscribe(key, node) {
    node = node || 'local';
    this._pendingSubscribeKey = key;
    this._pendingSubscribeNode = node;
    const msg = { type: 'subscribe', key: key };
    if (node && node !== 'local') msg.node = node;
    this._initialSubscribe = (this.lastEventTimeWs === 0);
    if (this.lastEventTimeWs > 0) msg.after = this.lastEventTimeWs;
    this.send(msg);
  },

  unsubscribe() {
    if (this.subscribedKey) {
      const msg = { type: 'unsubscribe', key: this.subscribedKey };
      if (this.subscribedNode && this.subscribedNode !== 'local') msg.node = this.subscribedNode;
      this.send(msg);
    }
    this.subscribedKey = null;
    this.subscribedNode = null;
    this._pendingSubscribeKey = null;
    this._pendingSubscribeNode = null;
    this.lastEventTimeWs = 0;
  },

  /* -- WS event handlers -- */

  onConnected() {
    if (eventTimer) { clearInterval(eventTimer); eventTimer = null; }
    if (selectedKey) {
      if (lastEventTime > 0 && this.lastEventTimeWs === 0) {
        this.lastEventTimeWs = lastEventTime;
      }
      this.subscribe(selectedKey, selectedNode);
    }
  },

  onHistory(msg) {
    if (msg.key !== selectedKey || (msg.node || 'local') !== selectedNode) return;
    const el = document.getElementById('events-scroll');
    if (!el) return;
    const events = msg.events || [];
    const isInitial = this._initialSubscribe;
    this._initialSubscribe = false;

    const display = processEventsForDisplay(events);

    if (isInitial) {
      turnToolAccum = {};
      el.innerHTML = display.map(eventHtml).filter(Boolean).join('') || '<div class="empty-state">no events yet</div>';
      if (events.length > 0) {
        el.insertAdjacentHTML('beforeend', '<div class="ws-separator"><span>live</span></div>');
      }
      el.scrollTop = el.scrollHeight;
      runMermaid();
    } else {
      const wasBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
      display.forEach(e => { const h = eventHtml(e); if (h) el.insertAdjacentHTML('beforeend', h); });
      if (wasBottom) el.scrollTop = el.scrollHeight;
      runMermaid();
    }

    if (events.length > 0) {
      const last = events[events.length - 1];
      if (last.time > this.lastEventTimeWs) this.lastEventTimeWs = last.time;
    }
  },

  onEvent(msg) {
    if (msg.key !== selectedKey || (msg.node || 'local') !== selectedNode) return;
    const ev = msg.event;
    if (!ev) return;
    if (ev.time > this.lastEventTimeWs) this.lastEventTimeWs = ev.time;
    if (ev.type === 'tool_use') {
      if (ev.tool) turnToolAccum[toolKey(ev)] = (turnToolAccum[toolKey(ev)] || 0) + 1;
      updatePendingSummary();
      return;
    }
    if (ev.type === 'result') return;
    if (Object.keys(turnToolAccum).length > 0) finalizePendingSummary();
    const html = eventHtml(ev);
    if (!html) return;
    const el = document.getElementById('events-scroll');
    if (!el) return;
    const empty = el.querySelector('.empty-state');
    if (empty) empty.remove();
    const wasBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
    el.insertAdjacentHTML('beforeend', html);
    if (wasBottom) el.scrollTop = el.scrollHeight;
    runMermaid();
  },

  onSendAck(msg) {
    if (msg.status === 'accepted') {
      flashSendBtn();
      // For new sessions: backend needs time to spawn the process before
      // the session appears in the API. Retry subscribe after a short delay.
      const ackKey = msg.key || selectedKey;
      if (ackKey && !wsm.subscribedKey && !wsm._pendingSubscribeKey) {
        setTimeout(() => {
          if (selectedKey === ackKey && !wsm.subscribedKey && !wsm._pendingSubscribeKey) {
            wsm.lastEventTimeWs = 0;
            wsm.subscribe(ackKey, selectedNode);
          }
        }, 1500);
      }
    } else if (msg.status === 'busy') {
      showToastVariant('session busy, please wait', 'warning');
    } else if (msg.status === 'error') {
      showToastVariant('send error: ' + (msg.error || 'unknown'), 'error');
    }
  },

  onSessionState(msg) {
    const msgNode = msg.node || 'local';
    const sKey = sid(msg.key, msgNode);
    if (sessionsData[sKey]) {
      sessionsData[sKey].state = msg.state;
      if (msg.reason) sessionsData[sKey].death_reason = msg.reason;
    }
    let card = null;
    document.querySelectorAll('.session-card').forEach(c => {
      if (c.dataset.key === msg.key && (c.dataset.node || 'local') === msgNode) card = c;
    });
    if (card) {
      const badge = card.querySelector('.badge');
      if (badge) { badge.className = 'badge ' + msg.state; badge.textContent = msg.state; }
      card.classList.toggle('dead-card', msg.state === 'dead' || msg.state === 'suspended');
    }
    if (msg.key === selectedKey && msgNode === selectedNode) updateMainState(msg.state, msg.reason);
  },

  setState(s) {
    this.state = s;
    renderWsStatus();
    if (s === WS_STATES.CONNECTED) {
      // WS connected: stop session polling, rely on push
      if (sessionPollTimer) { clearInterval(sessionPollTimer); sessionPollTimer = null; }
      // Reduce discovered scan frequency
      if (discoveredPollTimer) { clearInterval(discoveredPollTimer); discoveredPollTimer = null; }
      discoveredPollTimer = setInterval(scanDiscovered, 30000);
    } else if (s === WS_STATES.DISCONNECTED) {
      // WS lost: start fallback polling
      if (!sessionPollTimer) sessionPollTimer = setInterval(fetchSessions, 5000);
      if (discoveredPollTimer) { clearInterval(discoveredPollTimer); discoveredPollTimer = null; }
      discoveredPollTimer = setInterval(scanDiscovered, 5000);
      if (selectedKey && !eventTimer) {
        lastEventTime = this.lastEventTimeWs;
        eventTimer = setInterval(() => fetchEvents(false), 1000);
      }
    }
  },

  isConnected() { return this.state === WS_STATES.CONNECTED; }
};

/* ===== WS Helper Functions ===== */

function renderWsStatus() {
  const el = document.getElementById('ws-status');
  if (!el) return;
  const map = {
    off: ['gray', 'WS Off'],
    connecting: ['yellow', 'Connecting...'],
    authenticating: ['yellow', 'Authenticating...'],
    connected: ['green', 'WS Connected'],
    disconnected: ['red', 'Reconnecting...']
  };
  const [color, label] = map[wsm.state] || ['gray', wsm.state];
  el.innerHTML = '<span class="ws-dot ' + color + '"></span>' + label;
}

function updateMainState(state, reason) {
  const header = document.querySelector('.main-header');
  if (!header) return;
  const badge = header.querySelector('.badge');
  if (badge) { badge.className = 'badge ' + state; badge.textContent = state; }
  const indicator = header.querySelector('.state-indicator');
  if (indicator) { indicator.className = 'state-indicator ' + state; }
  if (reason) {
    let dt = header.querySelector('.death-tag');
    if (!dt) {
      dt = document.createElement('span');
      dt.className = 'death-tag';
      if (badge) badge.insertAdjacentElement('afterend', dt);
    }
    dt.textContent = reason.replace(/_/g, ' ');
  }
}

function flashSendBtn() {
  const btn = document.getElementById('btn-send');
  if (!btn) return;
  btn.style.boxShadow = '0 0 8px #3fb950';
  setTimeout(() => { btn.style.boxShadow = ''; }, 600);
}

function showToastVariant(msg, variant) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (variant ? ' ' + variant : '');
  setTimeout(() => { el.className = 'toast'; }, 3000);
}

function stopPreviewPolling() {
  if (previewTimer) { clearInterval(previewTimer); previewTimer = null; }
  previewEventCount = 0;
}

/* ===== Discovery & Takeover ===== */

async function scanDiscovered() {
  try {
    const headers = {};
    const t = getToken();
    if (t) headers['Authorization'] = 'Bearer ' + t;
    const r = await fetch('/api/discovered', { headers });
    const sessions = await r.json();
    renderDiscovered(sessions || []);
  } catch (e) {
    showToast('scan error: ' + e.message);
  }
}

function renderDiscovered(sessions) {
  const section = document.getElementById('discovered-section');
  const list = document.getElementById('discovered-list');
  if (sessions.length === 0) {
    list.innerHTML = '<div style="padding:4px 16px;font-size:11px;color:#484f58">no external processes</div>';
    return;
  }
  section.style.display = '';
  list.innerHTML = sessions.map(s => {
    const cwd = s.cwd || 'unknown';
    const base = cwd.split('/').pop() || cwd;
    const ago = timeAgo(s.last_active || s.started_at);
    const pst = s.proc_start_time || 0;
    const state = s.state || 'ready';
    const ri = state === 'running' ? '<span class="running-indicator"></span>' : '';
    return '<div class="discovered-card" data-pid="' + s.pid + '" onclick="previewDiscovered(\'' + esc(s.session_id) + '\',\'' + esc(cwd).replace(/'/g, "\\'") + '\',' + s.pid + ',' + pst + ')" style="cursor:pointer">' +
      '<div class="dc-info">' +
        '<div class="dc-cwd" title="' + esc(cwd) + '">' + esc(base) + '</div>' +
        (s.summary ? '<div class="dc-summary">' + esc(s.summary) + '</div>' : '') +
        (s.last_prompt ? '<div class="dc-prompt" title="' + esc(s.last_prompt) + '">' + esc(s.last_prompt) + '</div>' : '') +
        '<div class="dc-meta">' +
          ri + '<span class="badge ' + state + '">' + state + '</span>' +
          '<span>PID ' + s.pid + '</span>' +
          '<span>' + ago + '</span>' +
        '</div>' +
      '</div>' +
      '<button class="btn-takeover" onclick="event.stopPropagation();takeover(' + s.pid + ',\'' + esc(s.session_id) + '\',\'' + esc(cwd).replace(/'/g, "\\'") + '\',' + pst + ')">takeover</button>' +
    '</div>';
  }).join('');
}

async function previewDiscovered(sessionId, cwd, pid, procStartTime) {
  stopPreviewPolling();
  // Deselect any managed session
  selectedKey = null;
  selectedNode = null;
  if (wsm.subscribedKey) wsm.unsubscribe();
  if (eventTimer) { clearInterval(eventTimer); eventTimer = null; }
  document.querySelectorAll('.session-card').forEach(el => el.classList.remove('active'));

  // Highlight the discovered card
  document.querySelectorAll('.discovered-card').forEach(el => el.classList.remove('active'));
  const card = document.querySelector('.discovered-card[data-pid="' + pid + '"]');
  if (card) card.classList.add('active');

  const base = cwd.split('/').pop() || cwd;
  const main = document.getElementById('main');
  main.innerHTML =
    '<div class="main-header">' +
      '<h2>' + esc(base) + ' <span class="badge" style="background:#9e6a03;color:#fff">external</span></h2>' +
      '<div class="detail"><span>PID ' + pid + '</span><span>' + esc(sessionId.substring(0,8)) + '</span></div>' +
      '<div class="workspace-path" onclick="copyText(\'' + esc(cwd).replace(/'/g,"\\'") + '\')" title="click to copy">' + esc(cwd) + '</div>' +
    '</div>' +
    '<div class="events" id="events-scroll"><div class="empty-state">loading...</div></div>' +
    '<div class="input-area" style="padding:8px 20px;text-align:center">' +
      '<button class="btn-takeover" style="width:100%;padding:10px;font-size:14px" onclick="takeover(' + pid + ',\'' + esc(sessionId) + '\',\'' + esc(cwd).replace(/'/g,"\\'") + '\',' + (procStartTime||0) + ')">Takeover this session</button>' +
    '</div>';

  try {
    const r = await fetch('/api/discovered/preview?session_id=' + encodeURIComponent(sessionId));
    if (!r.ok) { showToast('preview failed'); return; }
    const events = await r.json();
    const el = document.getElementById('events-scroll');
    if (!el) return;
    turnToolAccum = {};
    const display = processEventsForDisplay(events);
    if (events.length === 0) {
      el.innerHTML = '<div class="empty-state">no conversation history</div>';
    } else {
      el.innerHTML = display.map(eventHtml).filter(Boolean).join('');
      el.scrollTop = el.scrollHeight;
    }
    previewEventCount = events.length;
    const capturedSid = sessionId;
    previewTimer = setInterval(async () => {
      try {
        const r2 = await fetch('/api/discovered/preview?session_id=' + encodeURIComponent(capturedSid));
        if (!r2.ok) return;
        const all = await r2.json();
        if (all.length <= previewEventCount) return;
        const fresh = all.slice(previewEventCount);
        previewEventCount = all.length;
        const el2 = document.getElementById('events-scroll');
        if (!el2) { stopPreviewPolling(); return; }
        const empty = el2.querySelector('.empty-state');
        if (empty) empty.remove();
        const wasBottom = el2.scrollTop + el2.clientHeight >= el2.scrollHeight - 30;
        fresh.forEach(e => {
          if (e.type === 'tool_use') { if (e.tool) turnToolAccum[toolKey(e)] = (turnToolAccum[toolKey(e)] || 0) + 1; updatePendingSummary(); return; }
          if (e.type === 'result') return;
          if (Object.keys(turnToolAccum).length > 0) finalizePendingSummary();
          const h = eventHtml(e); if (h) el2.insertAdjacentHTML('beforeend', h);
        });
        if (wasBottom) el2.scrollTop = el2.scrollHeight;
      } catch (_) {}
    }, 2000);
  } catch (e) {
    showToast('preview error: ' + e.message);
  }
}

async function takeover(pid, sessionId, cwd, procStartTime) {
  const btn = event.target;
  btn.classList.add('taking');
  btn.textContent = 'taking over...';
  try {
    const headers = {'Content-Type': 'application/json'};
    const token = getToken();
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const r = await fetch('/api/discovered/takeover', {
      method: 'POST', headers,
      body: JSON.stringify({pid: pid, session_id: sessionId, cwd: cwd, proc_start_time: procStartTime || 0})
    });
    if (!r.ok) {
      const text = await r.text();
      showToast('takeover failed: ' + text);
      btn.classList.remove('taking');
      btn.textContent = 'takeover';
      return;
    }
    const data = await r.json();
    showToastVariant('session taken over', 'success');
    // Immediately remove the discovered card from DOM
    const card = document.querySelector('.discovered-card[data-pid="' + pid + '"]');
    if (card) card.remove();
    // Force refresh (clear cache so renderSidebar runs)
    lastSessionsJSON = '';
    await fetchSessions();
    if (data.key) {
      selectSession(data.key, 'local');
    }
  } catch (e) {
    showToast('takeover error: ' + e.message);
    btn.classList.remove('taking');
    btn.textContent = 'takeover';
  }
}

/* ===== Initialization ===== */

loadPendingSessions();
fetchSessions();
sessionPollTimer = setInterval(fetchSessions, 5000);
scanDiscovered();
discoveredPollTimer = setInterval(scanDiscovered, 5000);
wsm.connect();
</script>
