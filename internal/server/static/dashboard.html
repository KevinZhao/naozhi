<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>naozhi dashboard</title>
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0d1117">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" integrity="sha384-zh0CIslj+VczCZtlzBcjt5ppRcsAmDnRem7ESsYwWwg3m/OaJ2l4x7YBZl9Kxxib" crossorigin="anonymous">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;max-width:100vw}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace;background:#0d1117;color:#c9d1d9;font-size:20px}
.container{display:flex;height:100vh;overflow:hidden}

.sidebar{width:320px;min-width:320px;border-right:1px solid #30363d;display:flex;flex-direction:column}
.sidebar-header{padding:16px;border-bottom:1px solid #30363d}
.sidebar-header h1{font-size:19px;color:#f0f6fc;font-weight:600}
.sidebar-header .stats{font-size:14px;color:#8b949e;margin-top:4px}
.session-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#30363d transparent}

.session-card{padding:10px 16px;border-bottom:1px solid #21262d;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.session-card:hover{background:#161b22}
.session-card.active{background:#1f2937;border-left-color:#58a6ff}
.session-card.dead-card{opacity:.6}
.session-card .platform{font-size:13px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.session-card .agent{font-size:16px;color:#f0f6fc;margin:2px 0;font-weight:500}
.session-card.dead-card .agent{text-decoration:line-through;color:#8b949e}
.session-card .meta{font-size:13px;color:#8b949e;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.session-card .session-prompt{font-size:13px;color:#a5d6ff;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-card .btn-dismiss{position:absolute;top:4px;right:6px;background:none;border:none;color:#484f58;font-size:17px;cursor:pointer;padding:0 4px;line-height:1;opacity:0;transition:opacity .15s}
.session-card:hover .btn-dismiss{opacity:1}
.session-card .btn-dismiss:hover{color:#da3633}
.session-card{position:relative}

.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:12px;font-weight:600}
.badge.running{background:#238636;color:#fff}
.badge.ready{background:#1f6feb;color:#fff}
.badge.suspended{background:#9e6a03;color:#fff}
.badge.new{background:#1f6feb;color:#fff;border:1px dashed #58a6ff}
.death-tag{font-size:11px;color:#8b949e;background:#21262d;padding:1px 4px;border-radius:4px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.main-header{padding:12px 20px;border-bottom:1px solid #30363d;flex-shrink:0}
.main-header h2{font-size:17px;color:#f0f6fc;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-header .detail{font-size:14px;color:#8b949e;margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
.main-header .detail span{white-space:nowrap}
.main-header .header-prompt{font-size:13px;color:#8b949e;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.events{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0;scrollbar-width:thin;scrollbar-color:#30363d transparent;min-width:0}
.event{display:flex;gap:10px;padding:5px 20px;transition:background .1s;max-width:100%}
.event:hover{background:#161b22}
.event-icon{width:18px;text-align:center;font-size:15px;padding-top:1px}
.event-content{flex:1;font-size:15px;line-height:1.5;word-break:break-word;white-space:pre-wrap;overflow-wrap:anywhere;min-width:0}
.event.text .event-content,.event.result .event-content{white-space:normal}
.md-blank{display:block;height:0.35em}
.event.thinking .event-content{color:#a5d6ff;font-style:italic}
.event.result .event-content{color:#7ee787}
.event.system .event-content{color:#8b949e;font-size:14px}
.event.text .event-content{color:#c9d1d9}
.event.user .event-content{color:#58a6ff;font-weight:500}
.event.user{background:rgba(88,166,255,.05)}
.event.result{margin:2px 0}
.event.result .event-content{background:rgba(126,231,135,.05);padding:4px 8px;border-radius:4px;border-left:2px solid #3fb950}
.event.agent .event-content{color:#a5d6ff}
.event.agent{background:rgba(56,139,253,.05);border-left:2px solid #388bfd}
.empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:#6e7681;font-size:15px}
.no-sessions{padding:40px 16px;text-align:center;color:#484f58;font-size:14px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease-in-out infinite}

/* Message input area */
.input-area{border-top:1px solid #30363d;padding:12px 20px;flex-shrink:0;background:#0d1117}
.input-area.disabled{opacity:.5;pointer-events:none}
.file-preview{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.file-thumb{position:relative;width:48px;height:48px;border-radius:6px;overflow:hidden;border:1px solid #30363d}
.file-thumb img{width:100%;height:100%;object-fit:cover}
.file-thumb .remove{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:#da3633;color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#c9d1d9;padding:8px 12px;font-family:inherit;font-size:15px;resize:none;min-height:38px;max-height:120px;outline:none;line-height:1.4}
.input-row textarea:focus{border-color:#58a6ff}
.input-row textarea::placeholder{color:#484f58}
.btn-icon{width:36px;height:36px;border:1px solid #30363d;border-radius:8px;background:#161b22;color:#8b949e;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s}
.btn-icon:hover{background:#1f2937;color:#c9d1d9;border-color:#484f58}
.btn-icon.sending{opacity:.5;pointer-events:none}
.btn-send{background:#238636;border-color:#238636;color:#fff}
.btn-send:hover{background:#2ea043}
.btn-stop{background:#da3633;border-color:#da3633;color:#fff;font-size:14px}
.btn-stop:hover{background:#f85149}
.btn-mic{font-size:16px}
.btn-mic.recording{background:#da3633;border-color:#da3633;color:#fff;animation:pulse 1.5s ease-in-out infinite}
.btn-mic.transcribing{opacity:.5;pointer-events:none}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#da3633;color:#fff;padding:8px 16px;border-radius:8px;font-size:14px;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.toast.show{opacity:1;pointer-events:auto}
.toast.success{background:#238636}

/* Auth modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;width:360px}
.modal h3{font-size:15px;color:#f0f6fc;margin-bottom:12px}
.modal input{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:14px;outline:none}
.modal input:focus{border-color:#58a6ff}
.modal .modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal .modal-btns button{padding:6px 16px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:14px}
.modal .modal-btns button.primary{background:#238636;border-color:#238636;color:#fff}

/* WS connection status — inline dot in stats row */
.ws-badge{display:inline-flex;align-items:center;gap:3px;font-size:12px;margin-left:6px;vertical-align:middle}
.ws-badge .ws-label{display:none;color:#da3633}
.ws-badge.disconnected .ws-label{display:inline}
.ws-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.ws-dot.green{background:#3fb950}
.ws-dot.yellow{background:#d29922;animation:pulse 1.5s ease-in-out infinite}
.ws-dot.red{background:#da3633}
.ws-dot.gray{background:#484f58}

/* Toast variants */
.toast.warning{background:#9e6a03}
.toast.success{background:#238636}

.node-badge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.3px;color:#fff;vertical-align:middle;margin-right:4px}
.node-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin:0 1px 0 6px;vertical-align:middle}
.node-dot:first-child{margin-left:0}
.node-dot.ok{background:#3fb950}
.node-dot.error{background:#da3633}
.node-info{color:#8b949e;font-size:13px}
.node-group{border-bottom:none}
.node-group summary.node-group-header{display:flex;align-items:center;gap:6px;padding:8px 16px;cursor:pointer;color:#c9d1d9;font-size:12px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;list-style:none;user-select:none;background:#161b22;border-top:1px solid #30363d;border-bottom:1px solid #21262d;position:sticky;top:0;z-index:1}
.node-group summary.node-group-header::-webkit-details-marker{display:none}
.node-group summary.node-group-header:hover{background:#1c2129;color:#f0f6fc}
.ng-arrow{font-size:11px;color:#8b949e;transition:transform .15s;display:inline-block}
.node-group[open] .ng-arrow{transform:rotate(90deg)}
.ng-name{flex:1;color:#e6edf3}
.ng-count{color:#8b949e;font-weight:400;font-size:11px}
.ng-running{color:#3fb950;font-weight:400;font-size:11px}
.ng-sys{color:#6e7681;font-weight:400;font-size:10px;margin-left:auto;padding-right:4px;white-space:nowrap}
.new-session-btn{display:block;width:calc(100% - 32px);margin:8px 16px;padding:8px;border:1px dashed #30363d;border-radius:8px;background:transparent;color:#8b949e;font-size:14px;cursor:pointer;text-align:center;transition:all .15s}
.new-session-btn:hover{border-color:#58a6ff;color:#58a6ff;background:#161b22}
.sidebar-actions{display:flex;gap:8px;margin-top:8px}
.sidebar-actions .new-session-btn{width:auto;margin:0;flex:1}
/* History popover */
.ng-history-btn{background:none;border:none;color:#7a5c00;font-size:11px;cursor:pointer;padding:1px 5px;margin-left:2px;border-radius:4px;line-height:1;transition:all .15s;flex-shrink:0;display:inline-flex;align-items:center;gap:3px}
.ng-history-btn:hover{color:#d29922;background:#1a1500}
.ng-history-btn svg{width:12px;height:12px;fill:currentColor}
.ng-history-btn .history-badge{display:inline-block;background:#3d2e00;color:#d29922;padding:0 5px;border-radius:8px;font-size:10px;font-weight:600;min-width:14px;text-align:center;line-height:16px}
.history-popover{position:absolute;top:100%;left:0;z-index:100;min-width:280px;max-width:360px;max-height:320px;overflow-y:auto;background:#161b22;border:1px solid #30363d;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.5);padding:0;animation:pop-in .15s ease}
@keyframes pop-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.history-popover-header{padding:8px 12px;font-size:11px;color:#8b949e;border-bottom:1px solid #21262d;font-weight:600;text-transform:uppercase;letter-spacing:.3px;background:#0d1117;border-radius:8px 8px 0 0}
.history-popover-item{padding:8px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid #21262d;position:relative}
.history-popover-item:last-child{border-bottom:none}
.history-popover-item:hover{background:#1c2129}
.history-popover-item .hp-dismiss{position:absolute;top:6px;right:6px;background:none;border:none;color:#6e7681;font-size:14px;cursor:pointer;padding:0 4px;border-radius:4px;line-height:1;opacity:0;transition:all .15s}
.history-popover-item:hover .hp-dismiss{opacity:1}
.history-popover-item .hp-dismiss:hover{color:#f85149;background:#3d0e0e}
.history-popover-item .hp-prompt{font-size:13px;color:#c9d1d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-popover-item .hp-meta{font-size:11px;color:#6e7681;margin-top:3px;display:flex;align-items:center;gap:6px}
.history-popover-item .hp-meta .hp-agent-tag{color:#7a5c00;font-weight:500}
.history-popover-item .hp-meta .hp-dot{color:#30363d}
.history-popover-empty{padding:16px;text-align:center;color:#6e7681;font-size:12px}
/* More projects group */
.more-projects-group{border-top:1px solid #21262d;margin-top:4px}
.more-projects-group>summary.node-group-header{background:transparent;border-top-color:#21262d;border-bottom:none;color:#6e7681;font-size:11px;padding:6px 16px}
.more-projects-group>summary.node-group-header:hover{background:#0d1117;color:#8b949e}
.more-projects-group .ng-arrow{color:#484f58;font-size:10px}
.more-projects-group .ng-name{color:#6e7681}
.more-projects-group .ng-count{color:#484f58}
.ng-new-btn{background:none;border:none;color:#484f58;font-size:14px;cursor:pointer;padding:2px 6px;margin-left:4px;border-radius:4px;line-height:1;transition:all .15s;flex-shrink:0}
.ng-new-btn:hover{color:#58a6ff;background:#161b22}

/* Project group styles — golden color scheme */
.project-group>summary.node-group-header{background:#1a1500;border-top-color:#3d2e00;border-bottom-color:#2a1f00;color:#b8860b}
.project-group>summary.node-group-header:hover{background:#221c00;color:#d4a017}
.project-group>summary.node-group-header .ng-arrow{color:#7a5c00}
.project-group>summary.node-group-header .ng-name{color:#d4a017}
.project-group>summary.node-group-header .ng-count{color:#7a5c00}
.project-group>summary.node-group-header .ng-running{color:#d4a017}
.project-group>summary.node-group-header .ng-new-btn{color:#7a5c00}
.project-group>summary.node-group-header .ng-new-btn:hover{color:#d4a017;background:#2a1f00}
.node-group .project-group>summary.node-group-header{padding-left:28px}
.node-group .project-group>.session-card{padding-left:28px}
.node-group .project-group>.session-card.cli-card{padding-left:28px}
.planner-indicator{display:inline-block;width:8px;height:8px;border-radius:50%;background:#a371f7;margin-right:4px}
.session-card.planner-card{border-left-color:#a371f7}
.session-card.planner-card .agent{color:#a371f7}
.project-settings-btn{background:none;border:none;color:#484f58;font-size:13px;cursor:pointer;padding:2px 4px;margin-left:auto}
.project-settings-btn:hover{color:#c9d1d9}
/* CLI (discovered) sessions in folder groups */
.session-card.cli-card{border-left-color:#4a3000}
.session-card.cli-card.active{border-left-color:#d29922}

/* Markdown rendering */
.md-pre{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px 12px;margin:6px 0;overflow-x:auto;font-size:13px;line-height:1.5;max-width:100%}
.md-pre code{color:#e6edf3;font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;white-space:pre}
.md-code-wrap{position:relative;max-width:100%}
.md-copy-btn{position:absolute;top:6px;right:6px;background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e;font-size:11px;padding:2px 8px;cursor:pointer;opacity:0;transition:opacity .15s,color .15s,border-color .15s;line-height:1.6}
.md-code-wrap:hover .md-copy-btn{opacity:1}
.md-copy-btn:hover{background:#30363d;color:#c9d1d9}
.md-copy-btn.copied{color:#3fb950;border-color:#3fb950}
.md-code{background:#30363d;color:#e6edf3;padding:1px 5px;border-radius:4px;font-size:13px;font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace}
.md-h1,.md-h2,.md-h3,.md-h4{display:block;color:#f0f6fc;margin:8px 0 4px}
.md-h1{font-size:16px}.md-h2{font-size:15px}.md-h3{font-size:14px}
.md-ul{margin:4px 0 4px 16px;padding:0;list-style:disc}
.md-ul li{margin:2px 0;line-height:1.5}
.md-ol{margin:4px 0 4px 16px;padding:0;list-style:decimal}
.md-ol li{margin:2px 0;line-height:1.5}
.md-link{color:#58a6ff;text-decoration:none}
.md-link:hover{text-decoration:underline}
.md-table-wrap{overflow-x:auto;max-width:100%;margin:6px 0}
.md-table{width:100%;border-collapse:collapse;font-size:14px}
.md-table th,.md-table td{border:1px solid #30363d;padding:5px 10px;text-align:left}
.md-table th{background:#161b22;color:#f0f6fc;font-weight:600;font-size:13px}
.md-table td{color:#c9d1d9}
.md-table tr:hover td{background:rgba(88,166,255,.04)}
.mermaid-wrap{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;margin:6px 0;overflow-x:auto;text-align:center;max-width:100%}
.mermaid-wrap svg{max-width:100%;height:auto}
.md-math-display{margin:8px 0;overflow-x:auto;text-align:center;max-width:100%}
.md-math-display .katex-display{margin:0.5em 0}
.katex{font-size:1.1em}
.katex-html{overflow-wrap:break-word}
.ts-subagent{display:inline-block;background:#1f2937;color:#a5d6ff;padding:0 5px;border-radius:4px;font-size:11px;font-weight:600;margin-left:2px}
.sa-badge{display:inline-flex;align-items:center;gap:3px;background:#1a2332;border:1px solid #1f6feb44;color:#58a6ff;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;margin-left:4px;white-space:nowrap}
.sa-badge .sa-icon{font-size:12px}
.sa-list{border-top:1px solid #21262d;margin-top:6px;padding-top:2px}
.sa-row{display:flex;align-items:center;gap:5px;padding:3px 8px 3px 20px;font-size:11px;color:#8b949e;cursor:pointer;border-left:2px solid transparent;transition:background .1s}
.sa-row:hover{background:#161b22;color:#c9d1d9}
.sa-running-dot{width:5px;height:5px;border-radius:50%;background:#3fb950;flex-shrink:0;animation:pulse 2s ease-in-out infinite}
.sa-bg-badge{background:#2a1f00;color:#d29922;border-radius:3px;padding:0 3px;font-size:9px;letter-spacing:.3px;flex-shrink:0}
.sa-name{color:#a5d6ff;font-weight:600;white-space:nowrap;flex-shrink:0}
.sa-activity{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#6e7681;flex:1;min-width:0}

/* Discovered sessions */
.discovered-section{border-bottom:1px solid #30363d;padding:8px 0}
.discovered-header{display:flex;align-items:center;justify-content:space-between;padding:4px 16px}
.discovered-header span{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.btn-scan{font-size:12px;padding:2px 8px;border:1px solid #30363d;border-radius:6px;background:#161b22;color:#8b949e;cursor:pointer}
.btn-scan:hover{border-color:#58a6ff;color:#58a6ff}
.discovered-card{padding:8px 16px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:8px}
.discovered-card .dc-info{flex:1;min-width:0}
.discovered-card .dc-cwd{font-size:13px;color:#f0f6fc;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.discovered-card .dc-summary{font-size:12px;color:#a5d6ff;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.discovered-card .dc-prompt{font-size:12px;color:#8b949e;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}
.discovered-card .dc-meta{font-size:11px;color:#8b949e;display:flex;gap:6px;margin-top:2px}
.discovered-card .dc-tag{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;background:#21262d;color:#8b949e}
.btn-takeover{font-size:11px;padding:4px 10px;border:1px solid #d29922;border-radius:6px;background:transparent;color:#d29922;cursor:pointer;white-space:nowrap}
.btn-takeover:hover{background:#d29922;color:#fff}
.btn-takeover.taking{opacity:.5;pointer-events:none}
.discovered-card.active{background:#1f2937;border-left:3px solid #d29922}

/* ===== Mobile (≤768px) ===== */
.btn-mobile-back{display:none}
@media(max-width:768px){
  /* Container: block so each panel stacks */
  .container{display:block;height:100vh;overflow:hidden}
  /* Sidebar: full-screen drawer, hidden off-left by default */
  .sidebar{position:fixed;inset:0;width:100%;min-width:0;z-index:10;background:#0d1117;transform:translateX(-100%);transition:transform .25s ease;border-right:none;overflow-y:auto}
  body.mobile-list-view .sidebar{transform:translateX(0)}
  /* Main: full-screen flex column, sits behind sidebar */
  .main{position:fixed;inset:0;display:flex;flex-direction:column;z-index:5}
  /* Back button: hidden on desktop, shown on mobile */
  .btn-mobile-back{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;width:36px;height:36px;background:none;border:none;color:#8b949e;font-size:20px;cursor:pointer;padding:0;border-radius:6px;-webkit-tap-highlight-color:transparent}
  .btn-mobile-back:active{color:#c9d1d9}
  /* Main header: flex row so back button sits left of content */
  .main-header{display:flex;align-items:flex-start;gap:0;padding:10px 12px}
  .main-header-content{flex:1;min-width:0}
  /* Input area: safe area bottom padding */
  .input-area{flex-shrink:0;padding-left:12px;padding-right:12px;padding-bottom:max(12px,env(safe-area-inset-bottom))}
  /* Dismiss button always visible on touch screens */
  .session-card .btn-dismiss{opacity:.6}
  /* Modal never wider than screen */
  .modal{width:min(360px,calc(100vw - 32px))}
  /* Toast at top so keyboard doesn't cover it */
  .toast{bottom:auto;top:16px;right:16px;left:16px;text-align:center}
  /* Remove tap flash on interactive elements */
  .session-card,.btn-icon,.btn-send,.new-session-btn{-webkit-tap-highlight-color:transparent}
  .sidebar-header{display:flex;flex-wrap:wrap;align-items:center}
  .session-list{overflow-x:hidden}
  .session-card[data-key]{touch-action:pan-y}
  .session-card.swiping{transition:none!important;user-select:none}
  .modal-overlay{align-items:flex-end}
  .modal{width:100%;border-radius:16px 16px 0 0;padding-bottom:max(20px,env(safe-area-inset-bottom));animation:sheet-in .25s ease}
  .modal::before{content:'';display:block;width:36px;height:4px;background:#484f58;border-radius:2px;margin:0 auto 16px}
}
@keyframes sheet-in{from{transform:translateY(100%)}to{transform:translateY(0)}}

</style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>naozhi dashboard</h1>
      <div class="stats" id="stats">connecting...</div>
      <div class="sidebar-actions">
        <button class="new-session-btn" onclick="createNewSession()">+ new session</button>
      </div>
      <div class="sidebar-tabs">
        <button class="active" onclick="switchTab('sessions')">Sessions</button>
        <button onclick="switchTab('cron')">Cron</button>
      </div>
    </div>
    <div class="discovered-section" id="discovered-section" style="display:none">
      <div class="discovered-header">
        <span>Discovered Processes</span>
      </div>
      <div id="discovered-list"></div>
    </div>
    <div class="session-list" id="session-list">
      <div class="no-sessions">loading...</div>
    </div>
    <div class="cron-list" id="cron-list" style="display:none"></div>
  </div>
  <div class="main" id="main">
    <div class="empty-state">select a session to view events and send messages</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let selectedKey = null;
let eventTimer = null;
let lastEventTime = 0;
let lastCompositionEnd = 0;
let sessionsData = {};
let allSessionsCache = [];
let pendingFiles = [];
let sending = false;
let selectedNode = 'local';
let nodesData = {};
let lastSessionsJSON = '';
let sessionPollTimer = null;
let discoveredPollTimer = null;
let discoveredItems = []; // discovered sessions, merged into sidebar
let previewTimer = null;
let previewEventCount = 0;
let pendingDiscovered = null; // {pid, sessionId, cwd, procStartTime, node} when previewing a discovered session
let sessionCounter = 0;
let availableAgents = ['general'];
let defaultWorkspace = '';
const clockSvg = '<svg viewBox="0 0 16 16"><path d="M8 0a8 8 0 110 16A8 8 0 018 0zm0 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM8 3a.75.75 0 01.75.75v3.69l2.28 2.28a.75.75 0 01-1.06 1.06l-2.5-2.5A.75.75 0 017.25 8V3.75A.75.75 0 018 3z"/></svg>';
let projectsData = []; // [{name, path, node}] from API
let localWsInfo = { name: '', sys: '' };
const sessionWorkspaces = {};
const sessionNodes = {};

function getToken() { return localStorage.getItem('naozhi_dashboard_token') || ''; }
function setToken(t) { localStorage.setItem('naozhi_dashboard_token', t); }

// Pending dashboard sessions — persisted in localStorage so they survive refresh/restart
function loadPendingSessions() {
  try {
    const raw = localStorage.getItem('naozhi_pending_sessions');
    if (!raw) return;
    const entries = JSON.parse(raw);
    for (const e of entries) {
      if (e.key && !sessionWorkspaces[e.key]) {
        sessionWorkspaces[e.key] = e.workspace || '';
        if (e.node) sessionNodes[e.key] = e.node;
      }
    }
  } catch (_) {}
}

function savePendingSessions() {
  const entries = Object.entries(sessionWorkspaces).map(([key, ws]) => ({ key, workspace: ws, node: sessionNodes[key] || '' }));
  if (entries.length > 0) {
    localStorage.setItem('naozhi_pending_sessions', JSON.stringify(entries));
  } else {
    localStorage.removeItem('naozhi_pending_sessions');
  }
}

function removePendingSession(key) {
  delete sessionWorkspaces[key];
  delete sessionNodes[key];
  savePendingSessions();
}

async function fetchSessions() {
  try {
    const headers = {};
    const t = getToken();
    if (t) headers['Authorization'] = 'Bearer ' + t;
    const r = await fetch('/api/sessions', { headers });
    if (!r.ok) return;
    const data = await r.json();
    const json = JSON.stringify(data);
    if (json === lastSessionsJSON) return;
    lastSessionsJSON = json;
    if (data.nodes) nodesData = data.nodes;
    if (data.stats.agents) availableAgents = data.stats.agents;
    if (data.stats.default_workspace) defaultWorkspace = data.stats.default_workspace;
    if (data.stats.projects) projectsData = data.stats.projects;

    // Track which keys the backend knows about
    const backendKeys = new Set();
    (data.sessions || []).forEach(s => {
      const n = s.node || 'local';
      sessionsData[sid(s.key, n)] = s;
      backendKeys.add(s.key);
    });

    // Remove pending sessions that now exist in backend
    let pendingChanged = false;
    for (const key of Object.keys(sessionWorkspaces)) {
      if (backendKeys.has(key)) {
        delete sessionWorkspaces[key];
        delete sessionNodes[key];
        pendingChanged = true;
      }
    }
    if (pendingChanged) savePendingSessions();

    // Merge pending dashboard sessions into data for sidebar rendering
    const pendingKeys = Object.keys(sessionWorkspaces);
    if (pendingKeys.length > 0) {
      if (!data.sessions) data.sessions = [];
      for (const key of pendingKeys) {
        if (!backendKeys.has(key)) {
          const parts = key.split(':');
          data.sessions.push({
            key: key,
            state: 'new',
            platform: parts[0] || 'dashboard',
            agent: 'general',
            workspace: sessionWorkspaces[key],
            last_active: 0,
            node: sessionNodes[key] || 'local',
            project: matchProject(sessionWorkspaces[key]),
          });
        }
      }
    }

    renderSidebar(data);
  } catch (e) {
    document.getElementById('stats').textContent = 'error: ' + e.message;
  }
}

function renderSidebar(data) {
  const st = data.stats;
  const statsEl = document.getElementById('stats');
  statsEl.textContent = st.total + ' sessions \u00b7 ' + st.active + ' active \u00b7 ' + st.uptime + ' ';
  const badge = document.createElement('span');
  badge.className = 'ws-badge';
  badge.id = 'ws-status';
  badge.innerHTML = '<span class="ws-dot gray"></span><span class="ws-label"></span>';
  statsEl.appendChild(badge);
  renderWsStatus();

  // Update workspace info for node-group header
  const wsName = st.workspace_name || st.workspace_id || '';
  let sysStr = '';
  const sys = st.system;
  if (sys) {
    let memStr = sys.memory_mb > 0 ? (sys.memory_mb >= 1024 ? (sys.memory_mb / 1024).toFixed(1) + 'G' : sys.memory_mb + 'M') : '';
    const ipStr = sys.ips && sys.ips.length > 0 ? sys.ips.join(', ') : '';
    sysStr = sys.os + '/' + sys.arch + ' \u00b7 ' + sys.cpus + 'C' + (memStr ? '/' + memStr : '') + (ipStr ? ' \u00b7 ' + ipStr : '');
  }
  localWsInfo = { name: wsName, sys: sysStr };

  const list = document.getElementById('session-list');
  const sessions = data.sessions || [];

  const order = {running:0, ready:1, new:2, suspended:3};
  sessions.sort((a, b) => {
    const d = (order[a.state]||5) - (order[b.state]||5);
    return d !== 0 ? d : b.last_active - a.last_active;
  });
  allSessionsCache = sessions;

  list.innerHTML = renderUnified(sessions, discoveredItems);
}

// Match a workspace path to a project from projectsData (longest prefix wins)
function matchProject(workspace) {
  if (!workspace || !projectsData || projectsData.length === 0) return '';
  const ws = workspace.endsWith('/') ? workspace : workspace + '/';
  let best = '', bestLen = 0;
  for (const p of projectsData) {
    const prefix = p.path.endsWith('/') ? p.path : p.path + '/';
    if (ws.startsWith(prefix) && p.path.length > bestLen) {
      best = p.name; bestLen = p.path.length;
    }
  }
  return best;
}

// Build project groups driven by a projects list. Unmatched sessions go to _unmatched.
function buildProjectGroups(sessions, discovered, projects) {
  projects = projects || projectsData;
  const projectGroups = {};
  for (const p of projects) {
    if (!projectGroups[p.name]) projectGroups[p.name] = { managed: [], discovered: [], path: p.path };
  }

  const unmatched = { managed: [], discovered: [], path: '' };

  sessions.forEach(s => {
    if (s.project && projectGroups[s.project]) {
      projectGroups[s.project].managed.push(s);
    } else {
      unmatched.managed.push(s);
    }
  });

  discovered.forEach(d => {
    if (d.project && projectGroups[d.project]) {
      projectGroups[d.project].discovered.push(d);
    } else {
      unmatched.discovered.push(d);
    }
  });

  return { projectGroups, unmatched };
}

function renderProjectGroupHtml(pname, grp, collapsed, nodeId) {
  const activeSessions = grp.managed.filter(s => s.state !== 'suspended');
  const suspendedSessions = grp.managed.filter(s => s.state === 'suspended');
  activeSessions.sort((a, b) => {
    if (a.is_planner && !b.is_planner) return -1;
    if (!a.is_planner && b.is_planner) return 1;
    return 0;
  });
  const activeCount = activeSessions.length + grp.discovered.length;
  const countHtml = activeCount > 0 ? '<span class="ng-count" title="' + activeCount + ' sessions">' + activeCount + '</span>' : '';
  const historyBtnHtml = suspendedSessions.length > 0
    ? '<button class="ng-history-btn" data-project="' + esc(pname) + '" onclick="event.stopPropagation();event.preventDefault();toggleHistoryPopover(this,this.dataset.project)" title="history">' + clockSvg + '<span class="history-badge">' + suspendedSessions.length + '</span></button>'
    : '';
  const path = grp.path || '';
  return '<details class="node-group project-group"' + (collapsed.has('proj:'+pname) ? '' : ' open') +
    ' data-node="proj:' + esc(pname) + '" ontoggle="saveNodeToggle(this)">' +
    '<summary class="node-group-header">' +
    '<span class="ng-arrow">&#9658;</span>' +
    '<span class="ng-name">' + esc(pname) + '</span>' +
    countHtml +
    historyBtnHtml +
    '<button class="ng-new-btn" data-path="' + esc(path) + '" data-project="' + esc(pname) + '" data-node="' + esc(nodeId || 'local') + '" onclick="event.stopPropagation();event.preventDefault();createSessionInProject(this.dataset.path,this.dataset.project,this.dataset.node)" title="new session">+</button>' +
    '</summary>' +
    activeSessions.map(sessionCardHtml).join('') +
    grp.discovered.map(discoveredInlineHtml).join('') +
    '</details>';
}

// Unified workspace-first renderer: workspace → [project →] session
function renderUnified(sessions, discovered) {
  const nodeItems = {};
  sessions.forEach(s => {
    const n = s.node || 'local';
    if (!nodeItems[n]) nodeItems[n] = { sessions: [], discovered: [] };
    nodeItems[n].sessions.push(s);
  });
  discovered.forEach(d => {
    const n = d.node || 'local';
    if (!nodeItems[n]) nodeItems[n] = { sessions: [], discovered: [] };
    nodeItems[n].discovered.push(d);
  });

  const allRemote = [...new Set([
    ...Object.keys(nodeItems).filter(n => n !== 'local'),
    ...Object.keys(nodesData).filter(n => n !== 'local'),
  ])].sort();
  const nodeIds = ['local', ...allRemote];
  const collapsed = getCollapsedNodes();

  return nodeIds.map(nid => {
    const ni = nodeItems[nid] || { sessions: [], discovered: [] };
    const nd = nodesData[nid] || {};
    const dotCls = nd.status === 'ok' || nid === 'local' ? 'ok' : 'error';
    const displayName = nid === 'local'
      ? (localWsInfo.name || 'Local')
      : (nd.display_name || nid);
    const nodeProjects = projectsData.filter(p => (p.node || 'local') === nid);
    const totalCount = ni.sessions.filter(s => s.state !== 'suspended').length + ni.discovered.length;
    const countHtml = '<span class="ng-count" title="' + totalCount + ' sessions">' + totalCount + '</span>';
    let sysHint = '';
    if (nid === 'local' && localWsInfo.sys) {
      sysHint = '<span class="ng-sys">' + esc(localWsInfo.sys) + '</span>';
    } else if (nid !== 'local' && nd.remote_addr) {
      sysHint = '<span class="ng-sys">' + esc(nd.remote_addr) + '</span>';
    }

    let innerHtml;
    if (nodeProjects.length === 0) {
      const activeSessions = ni.sessions.filter(s => s.state !== 'suspended');
      innerHtml = activeSessions.map(sessionCardHtml).join('') +
                  ni.discovered.map(discoveredInlineHtml).join('');
    } else {
      const { projectGroups, unmatched } = buildProjectGroups(ni.sessions, ni.discovered, nodeProjects);
      // Split into active projects (have non-suspended sessions or discovered) and empty
      const activeProjects = [];
      const emptyProjects = [];
      Object.keys(projectGroups).sort().forEach(pname => {
        const grp = projectGroups[pname];
        const hasActive = grp.managed.some(s => s.state !== 'suspended') || grp.discovered.length > 0;
        if (hasActive) activeProjects.push(pname);
        else emptyProjects.push(pname);
      });
      innerHtml = activeProjects
        .map(pname => renderProjectGroupHtml(pname, projectGroups[pname], collapsed, nid)).join('');
      if (unmatched.managed.length > 0 || unmatched.discovered.length > 0) {
        innerHtml += renderUnmatchedHtml(unmatched, collapsed);
      }
      // "More projects" collapsible group for projects without active sessions
      if (emptyProjects.length > 0) {
        const moreInner = emptyProjects
          .map(pname => renderProjectGroupHtml(pname, projectGroups[pname], collapsed, nid)).join('');
        innerHtml += '<details class="node-group more-projects-group"' + (collapsed.has('_more_projects') ? '' : ' open') +
          ' data-node="_more_projects" ontoggle="saveNodeToggle(this)">' +
          '<summary class="node-group-header">' +
          '<span class="ng-arrow">&#9658;</span>' +
          '<span class="ng-name">More projects</span>' +
          '<span class="ng-count">' + emptyProjects.length + '</span></summary>' +
          moreInner + '</details>';
      }
    }

    if (!innerHtml) innerHtml = '<div class="no-sessions" style="padding:6px 16px">no sessions</div>';

    return '<details class="node-group"' + (collapsed.has(nid) ? '' : ' open') +
      ' data-node="' + esc(nid) + '" ontoggle="saveNodeToggle(this)">' +
      '<summary class="node-group-header">' +
      '<span class="ng-arrow">&#9658;</span>' +
      '<span class="node-dot ' + dotCls + '"></span>' +
      '<span class="ng-name">' + esc(displayName) + '</span>' +
      sysHint +
      countHtml + '</summary>' +
      innerHtml +
      '</details>';
  }).join('');
}

function renderUnmatchedHtml(grp, collapsed) {
  const active = grp.managed.filter(s => s.state !== 'suspended');
  const suspended = grp.managed.filter(s => s.state === 'suspended');
  const total = active.length + grp.discovered.length;
  const historyBtnHtml = suspended.length > 0
    ? '<button class="ng-history-btn" data-project="_other" onclick="event.stopPropagation();event.preventDefault();toggleHistoryPopover(this,this.dataset.project)" title="history">' + clockSvg + '<span class="history-badge">' + suspended.length + '</span></button>'
    : '';
  return '<details class="node-group project-group"' + (collapsed.has('_other') ? '' : ' open') +
    ' data-node="_other" ontoggle="saveNodeToggle(this)">' +
    '<summary class="node-group-header">' +
    '<span class="ng-arrow">&#9658;</span>' +
    '<span class="ng-name">\u5176\u4ed6</span>' +
    '<span class="ng-count" title="' + total + ' sessions">' + total + '</span>' +
    historyBtnHtml + '</summary>' +
    active.map(sessionCardHtml).join('') +
    grp.discovered.map(discoveredInlineHtml).join('') +
    '</details>';
}

// --- History Popover ---

let activePopover = null;

function closeHistoryPopover() {
  if (activePopover) { activePopover.remove(); activePopover = null; }
}

async function dismissHistoryItem(btn) {
  const key = btn.dataset.key;
  const node = btn.dataset.node || 'local';
  const item = btn.closest('.history-popover-item');
  try {
    const headers = {'Content-Type': 'application/json'};
    const token = getToken();
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const r = await fetch('/api/sessions', {method: 'DELETE', headers, body: JSON.stringify({key: key})});
    if (!r.ok && r.status !== 404) { showToast('delete failed'); return; }
    delete sessionsData[sid(key, node)];
    if (selectedKey === key) {
      selectedKey = null;
      if (wsm.subscribedKey === key) wsm.unsubscribe();
      document.getElementById('main').innerHTML = '<div class="empty-state">select a session</div>';
    }
    if (item) item.remove();
    // If popover is now empty, show placeholder
    if (activePopover && !activePopover.querySelector('.history-popover-item')) {
      const body = activePopover.querySelector('.history-popover-empty');
      if (!body) {
        activePopover.insertAdjacentHTML('beforeend', '<div class="history-popover-empty">no history</div>');
      }
    }
    lastSessionsJSON = '';
    fetchSessions();
  } catch (e) { showToast('delete error: ' + e.message); }
}

document.addEventListener('click', function(e) {
  if (activePopover && !activePopover.contains(e.target) && !e.target.closest('.ng-history-btn')) {
    closeHistoryPopover();
  }
});

function toggleHistoryPopover(btn, projectName) {
  if (activePopover && activePopover.dataset.project === projectName) {
    closeHistoryPopover();
    return;
  }
  closeHistoryPopover();

  const suspended = allSessionsCache.filter(s => {
    if (s.state !== 'suspended') return false;
    if (projectName === '_other') return !s.project;
    return s.project === projectName;
  });
  suspended.sort((a, b) => b.last_active - a.last_active);

  let itemsHtml;
  if (suspended.length === 0) {
    itemsHtml = '<div class="history-popover-empty">no history</div>';
  } else {
    itemsHtml = suspended.map(s => {
      const sNode = s.node || 'local';
      const ago = s.last_active ? timeAgo(s.last_active) : '';
      const agentLabel = s.is_planner ? 'planner' : (s.platform === 'dashboard' ? 'general' : (s.agent || 'general'));
      const prompt = s.last_prompt || '';
      return '<div class="history-popover-item" data-key="' + esc(s.key) + '" data-node="' + esc(sNode) + '" onclick="selectSession(this.dataset.key,this.dataset.node);closeHistoryPopover()">' +
        '<button class="hp-dismiss" data-key="' + esc(s.key) + '" data-node="' + esc(sNode) + '" onclick="event.stopPropagation();dismissHistoryItem(this)" title="delete">&times;</button>' +
        (prompt ? '<div class="hp-prompt" title="' + esc(prompt) + '">' + esc(prompt) + '</div>' : '<div class="hp-prompt" style="color:#6e7681">(no prompt)</div>') +
        '<div class="hp-meta"><span class="hp-agent-tag">' + esc(agentLabel) + '</span>' + (ago ? '<span class="hp-dot">\u00b7</span><span>' + ago + '</span>' : '') + '</div>' +
        '</div>';
    }).join('');
  }

  const popover = document.createElement('div');
  popover.className = 'history-popover';
  popover.dataset.project = projectName;
  popover.innerHTML = '<div class="history-popover-header">' + esc(projectName === '_other' ? '\u5176\u4ed6' : projectName) + ' \u00b7 history</div>' + itemsHtml;
  activePopover = popover;

  // Position relative to button
  const btnRect = btn.getBoundingClientRect();
  const sidebar = document.querySelector('.sidebar');
  const sidebarRect = sidebar.getBoundingClientRect();
  popover.style.position = 'fixed';
  popover.style.left = Math.max(sidebarRect.left + 8, btnRect.left - 100) + 'px';
  popover.style.top = (btnRect.bottom + 4) + 'px';
  popover.style.maxHeight = Math.min(320, window.innerHeight - btnRect.bottom - 16) + 'px';
  document.body.appendChild(popover);

  // Adjust if overflowing right edge
  const popRect = popover.getBoundingClientRect();
  if (popRect.right > window.innerWidth - 8) {
    popover.style.left = (window.innerWidth - popRect.width - 8) + 'px';
  }
}

function sessionCardHtml(s) {
  const sNode = s.node || 'local';
  const isDead = s.state === 'suspended';
  const isActive = selectedKey === s.key && selectedNode === sNode;
  const isPlanner = s.is_planner;
  const cls = (isActive ? 'session-card active' : 'session-card') + (isDead ? ' dead-card' : '') + (isPlanner ? ' planner-card' : '');
  const ago = s.last_active ? timeAgo(s.last_active) : sessionTimeHint(s.key);
  const pi = isPlanner ? '<span class="planner-indicator"></span>' : '';
  const deathTag = s.death_reason ? ' <span class="death-tag">' + esc(s.death_reason.replace(/_/g,' ')) + '</span>' : '';
  const ws = s.workspace ? shortPath(s.workspace) : '';
  const prompt = s.last_prompt || '';
  const agentLabel = isPlanner ? 'planner' : (s.platform === 'dashboard' ? 'general' : (s.agent || 'general'));
  const showPlatform = isPlanner ? 'project' : (s.platform || '');
  const platformLabel = showPlatform.toLowerCase() === 'local' && !isMultiNode() ? '' : showPlatform;
  const nodeBadge = isMultiNode() && sNode !== 'local'
    ? '<span class="node-badge" style="background:' + nodeColor(sNode) + '">' + esc(sNode) + '</span>'
    : '';
  const saBadge = s.subagents && s.subagents.length > 0
    ? '<span class="sa-badge"><span class="sa-icon">\u{1f916}</span>\u00d7' + s.subagents.length + '</span>'
    : '';
  const saRows = s.subagents && s.subagents.length > 0
    ? '<div class="sa-list">' + s.subagents.map(sa =>
        '<div class="sa-row" onclick="event.stopPropagation();selectSession(\'' + esc(s.key) + '\',\'' + esc(sNode) + '\')" title="' + esc(sa.activity || sa.name) + '">' +
        '<span class="sa-running-dot"></span>' +
        (sa.background ? '<span class="sa-bg-badge">bg</span>' : '') +
        '<span class="sa-name">' + esc(sa.name) + '</span>' +
        (sa.activity ? '<span class="sa-activity">' + esc(sa.activity) + '</span>' : '') +
        '</div>'
      ).join('') + '</div>'
    : '';
  return '<div class="' + cls + '" data-key="' + esc(s.key) + '" data-node="' + esc(sNode) + '" onclick="selectSession(this.dataset.key,this.dataset.node)">' +
    '<button class="btn-dismiss" data-key="' + esc(s.key) + '" data-node="' + esc(sNode) + '" onclick="event.stopPropagation();dismissSession(this.dataset.key,this.dataset.node)" title="remove">&times;</button>' +
    '<div class="platform">' + esc(platformLabel) + '</div>' +
    (agentLabel !== 'general' ? '<div class="agent">' + pi + esc(agentLabel) + '</div>' : '') +
    (prompt ? '<div class="session-prompt" title="' + esc(prompt) + '">' + esc(prompt) + '</div>' : '') +
    '<div class="meta">' + '<span class="badge ' + s.state + '">' + s.state + '</span>' + deathTag +
    saBadge + nodeBadge + '<span>' + ago + '</span>' +
    '</div>' +
    saRows +
    '</div>';
}

function selectSession(key, node) {
  node = node || 'local';
  pendingDiscovered = null;
  const prevKey = selectedKey;
  const prevNode = selectedNode;
  selectedKey = key;
  selectedNode = node;
  lastEventTime = 0;
  mobileEnterChat();
  stopPreviewPolling();
  document.querySelectorAll('.session-card').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key && (el.dataset.node || 'local') === node);
  });
  renderMainShell();

  const changed = prevKey !== key || prevNode !== node;
  if (wsm.isConnected()) {
    if (changed) wsm.unsubscribe();
    wsm.lastEventTimeWs = 0;
    wsm.subscribe(key, node);
    if (eventTimer) { clearInterval(eventTimer); eventTimer = null; }
  } else {
    fetchEvents(true);
    if (eventTimer) clearInterval(eventTimer);
    eventTimer = setInterval(() => fetchEvents(false), 1000);
  }
}

async function dismissSession(key, node) {
  node = node || 'local';

  // If it's a pending (never-sent) session, just remove from localStorage
  if (sessionWorkspaces[key] !== undefined) {
    removePendingSession(key);
    delete sessionsData[sid(key, node)];
    if (selectedKey === key) {
      selectedKey = null;
      document.getElementById('main').innerHTML = '<div class="empty-state">select a session</div>';
    }
    lastSessionsJSON = '';
    fetchSessions();
    return;
  }

  try {
    const headers = {'Content-Type': 'application/json'};
    const token = getToken();
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const r = await fetch('/api/sessions', {method: 'DELETE', headers, body: JSON.stringify({key: key})});
    if (!r.ok && r.status !== 404) {
      const text = await r.text().catch(() => r.status);
      showToast('remove failed: ' + text);
      return;
    }
    delete sessionsData[sid(key, node)];
    if (selectedKey === key) {
      selectedKey = null;
      if (wsm.subscribedKey === key) wsm.unsubscribe();
      document.getElementById('main').innerHTML = '<div class="empty-state">select a session</div>';
    }
    lastSessionsJSON = '';
    fetchSessions();
  } catch (e) { showToast('remove error: ' + e.message); }
}

function renderMainShell() {
  const main = document.getElementById('main');
  const s = sessionsData[sid(selectedKey, selectedNode)] || {};
  const deathInfo = s.death_reason ? '<span class="death-tag">' + esc(s.death_reason.replace(/_/g,' ')) + '</span>' : '';
  const chatInfo = (s.chat_type && s.chat_id) ? esc(s.chat_type) + ':' + esc(s.chat_id).substring(0,12) : '';
  const prompt = s.last_prompt || '';
  const nodeDisplay = isMultiNode() && selectedNode && selectedNode !== 'local' ? (function() {
    const nd = nodesData[selectedNode];
    const label = nd && nd.display_name ? esc(selectedNode) + ' (' + esc(nd.display_name) + ')' : esc(selectedNode);
    return '<span class="node-info">' + label + '</span>';
  })() : '';

  const keyParts = (selectedKey || '').split(':');
  const agentIsGeneric = !s.agent || s.agent === 'general';
  // Primary title: user's latest prompt. Fallback to agent name or key tail.
  const displayName = s.last_prompt || (agentIsGeneric ? '' : s.agent) || keyParts[keyParts.length - 1] || selectedKey || '';
  // Only show chat info for non-dashboard platforms (feishu, slack, etc.)
  const platform = s.platform || keyParts[0] || '';
  const showChatInfo = platform !== 'dashboard' && platform !== 'local' && chatInfo;

  main.innerHTML =
    '<div class="main-header">' +
      '<button class="btn-mobile-back" onclick="mobileBack()" title="back">&#8592;</button>' +
      '<div class="main-header-content">' +
      '<h2>' + esc(displayName) + '</h2>' +
      '<div class="detail">' +
        (s.state ? '<span class="badge ' + s.state + '">' + s.state + '</span>' : '') +
        deathInfo +
        nodeDisplay +
        (showChatInfo ? '<span>' + chatInfo + '</span>' : '') +
      '</div>' +
      '</div>' +
    '</div>' +
    '<div class="events" id="events-scroll"></div>' +
    '<div class="input-area" id="input-area">' +
      '<div class="file-preview" id="file-preview"></div>' +
      '<div class="input-row">' +
        '<button class="btn-icon" onclick="openFilePicker()" title="upload image">&#x1f4ce;</button>' +
        '<button class="btn-icon btn-mic" id="btn-mic" onclick="toggleRecording()" title="voice input">&#x1f3a4;</button>' +
        '<textarea id="msg-input" rows="1" placeholder="send a message..." onkeydown="handleKey(event)" oncompositionend="lastCompositionEnd=Date.now()" oninput="autoGrow(this)"></textarea>' +
        '<button class="btn-icon btn-send" id="btn-send" onclick="sendMessage()" title="send">&#x27a4;</button>' +
      '</div>' +
      '<input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">' +
    '</div>';

  // Enable drag-drop
  const ia = document.getElementById('input-area');
  ia.addEventListener('dragover', e => { e.preventDefault(); ia.style.borderColor='#58a6ff'; });
  ia.addEventListener('dragleave', () => { ia.style.borderColor=''; });
  ia.addEventListener('drop', e => { e.preventDefault(); ia.style.borderColor=''; handleFiles(e.dataTransfer.files); });
  updateSendButton(s.state || '');
  // Suspended sessions can be resumed by sending a new message
  // Double-tap events feed → focus input (mobile)
  let lastTapMs = 0;
  document.getElementById('events-scroll').addEventListener('touchend', e => {
    if (!isMobile() || e.target.closest('a,button,code,pre')) return;
    const now = Date.now();
    if (now - lastTapMs < 300) { document.getElementById('msg-input')?.focus(); lastTapMs = 0; }
    else lastTapMs = now;
  }, {passive:true});
}

async function fetchEvents(full) {
  if (!selectedKey) return;
  try {
    let url = '/api/sessions/events?key=' + encodeURIComponent(selectedKey);
    if (selectedNode && selectedNode !== 'local') url += '&node=' + encodeURIComponent(selectedNode);
    if (!full && lastEventTime > 0) url += '&after=' + lastEventTime;

    const headers = {};
    const t = getToken();
    if (t) headers['Authorization'] = 'Bearer ' + t;
    const r = await fetch(url, { headers });
    const events = await r.json();
    if (!events || events.length === 0) return;

    if (full) {
      renderEvents(events);
    } else {
      appendEvents(events);
    }

    const last = events[events.length - 1];
    if (last && last.time > lastEventTime) lastEventTime = last.time;
  } catch (e) { console.error('fetch events:', e); }
}

function renderEvents(events) {
  const el = document.getElementById('events-scroll');
  if (!el) return;
  const display = processEventsForDisplay(events);
  el.innerHTML = display.map(eventHtml).filter(Boolean).join('') || '<div class="empty-state">no events yet</div>';
  el.scrollTop = el.scrollHeight;
  runMermaid();
  runKatex();
}

function appendEvents(events) {
  const el = document.getElementById('events-scroll');
  if (!el) return;
  const empty = el.querySelector('.empty-state');
  if (empty) empty.remove();
  const wasBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
  events.forEach(e => {
    if (e.type === 'tool_use' || e.type === 'result') return;
    const h = eventHtml(e); if (h) el.insertAdjacentHTML('beforeend', h);
  });
  if (wasBottom) el.scrollTop = el.scrollHeight;
  runMermaid();
  runKatex();
}

function eventHtml(e) {
  if (e.type === 'tool_use' || e.type === 'result' || e.type === 'thinking') return '';
  // Filter out Claude Code system XML injected as user messages
  const raw = e.detail || e.summary || '';
  if (e.type === 'user' && /^<(task-notification|system-reminder|local-command|command-name|available-deferred-tools)[\s>]/.test(raw)) return '';
  const icons = {init:'~',system:'\u2699',user:'\u{1f464}',agent:'\u26a1'};
  const icon = icons[e.type] || '';

  let content = '';
  if (e.type === 'system') {
    content = esc(e.summary || e.type);
  } else if (e.type === 'text' || e.type === 'result' || e.type === 'user') {
    content = renderMd(e.detail || e.summary || e.type);
  } else if (e.type === 'agent') {
    const badge = e.subagent ? '<span class="ts-subagent">' + esc(e.subagent) + '</span> ' : '';
    content = badge + esc(e.summary || '');
  } else {
    content = esc(e.detail || e.summary || e.type);
  }

  return '<div class="event ' + esc(e.type||'') + '">' +
    '<span class="event-icon">' + icon + '</span>' +
    '<div class="event-content">' + content + '</div></div>';
}

// --- Send message ---

function handleKey(e) {
  if (e.key === 'Escape') { e.preventDefault(); interruptSession(); return; }
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && Date.now() - lastCompositionEnd > 30) { e.preventDefault(); sendMessage(); }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  if (sending) return;

  // Auto-takeover: if viewing a discovered session, takeover first then send
  if (pendingDiscovered && !selectedKey) {
    const input = document.getElementById('msg-input');
    const text = (input ? input.value.trim() : '');
    if (!text) return;
    sending = true;
    const btn = document.getElementById('btn-send');
    if (btn) btn.classList.add('sending');
    if (input) input.placeholder = 'taking over session...';
    if (input) input.disabled = true;
    const pd = pendingDiscovered;
    try {
      const headers = {'Content-Type': 'application/json'};
      const token = getToken();
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const r = await fetch('/api/discovered/takeover', {
        method: 'POST', headers,
        body: JSON.stringify({pid: pd.pid, session_id: pd.sessionId, cwd: pd.cwd, proc_start_time: pd.procStartTime || 0, node: pd.node || ''})
      });
      if (!r.ok) {
        const errText = await r.text();
        showToast('takeover failed: ' + errText);
        if (input) { input.placeholder = 'send a message to take over...'; input.disabled = false; }
        sending = false;
        if (btn) btn.classList.remove('sending');
        return;
      }
      const data = await r.json();
      if (!data.key) {
        showToast('takeover failed: no session key returned');
        if (input) { input.placeholder = 'send a message to take over...'; input.disabled = false; }
        sending = false;
        if (btn) btn.classList.remove('sending');
        return;
      }
      // Remove the discovered card from sidebar
      const card = document.querySelector('.cli-card[data-pid="' + pd.pid + '"]');
      if (card) card.remove();
      pendingDiscovered = null;
      // Poll until the session appears in managed sessions (up to 10s)
      const takenKey = data.key;
      const takenNode = pd.node || 'local';
      let ready = false;
      for (let i = 0; i < 20; i++) {
        await new Promise(resolve => setTimeout(resolve, 500));
        lastSessionsJSON = '';
        await fetchSessions();
        if (sessionsData[sid(takenKey, takenNode)]) { ready = true; break; }
      }
      if (!ready) {
        showToast('takeover timed out — session not ready');
        if (input) { input.placeholder = 'send a message...'; input.disabled = false; }
        sending = false;
        if (btn) btn.classList.remove('sending');
        return;
      }
      // Session is ready — switch to it and send the message
      sending = false;
      selectSession(takenKey, takenNode);
      // Restore the message text and send
      const newInput = document.getElementById('msg-input');
      if (newInput) newInput.value = text;
      await sendMessage();
      return;
    } catch (e) {
      showToast('takeover error: ' + e.message);
      if (input) { input.placeholder = 'send a message to take over...'; input.disabled = false; }
      sending = false;
      if (btn) btn.classList.remove('sending');
      return;
    }
  }

  if (!selectedKey) return;
  const input = document.getElementById('msg-input');
  const text = (input ? input.value.trim() : '');
  if (!text && pendingFiles.length === 0) return;

  sending = true;
  const btn = document.getElementById('btn-send');
  if (btn) btn.classList.add('sending');

  // WS path: send via WebSocket when connected and no files
  if (wsm.isConnected() && pendingFiles.length === 0) {
    const id = 'r' + (++wsm.sendCounter);
    const sendMsg = { type: 'send', key: selectedKey, text: text, id: id };
    if (selectedNode && selectedNode !== 'local') sendMsg.node = selectedNode;
    if (sessionWorkspaces[selectedKey]) {
      sendMsg.workspace = sessionWorkspaces[selectedKey];
      delete sessionWorkspaces[selectedKey];
      delete sessionNodes[selectedKey];
    }
    wsm.send(sendMsg);
    if (input) { input.value = ''; input.style.height = 'auto'; }
    sending = false;
    if (btn) btn.classList.remove('sending');
    return;
  }

  // HTTP POST fallback
  try {
    const headers = {};
    const token = getToken();
    if (token) headers['Authorization'] = 'Bearer ' + token;

    let body;
    if (pendingFiles.length > 0) {
      const fd = new FormData();
      fd.append('key', selectedKey);
      if (selectedNode && selectedNode !== 'local') fd.append('node', selectedNode);
      if (text) fd.append('text', text);
      if (sessionWorkspaces[selectedKey]) {
        fd.append('workspace', sessionWorkspaces[selectedKey]);
        delete sessionWorkspaces[selectedKey];
        delete sessionNodes[selectedKey];
      }
      pendingFiles.forEach(f => fd.append('files', f));
      body = fd;
    } else {
      headers['Content-Type'] = 'application/json';
      const payload = {key: selectedKey, text: text};
      if (selectedNode && selectedNode !== 'local') payload.node = selectedNode;
      if (sessionWorkspaces[selectedKey]) {
        payload.workspace = sessionWorkspaces[selectedKey];
        delete sessionWorkspaces[selectedKey];
        delete sessionNodes[selectedKey];
      }
      body = JSON.stringify(payload);
    }

    const r = await fetch('/api/sessions/send', {method:'POST', headers, body});

    if (r.status === 401 || r.status === 403) {
      if (input) input.value = text;
      showAuthModal();
      return;
    }
    if (r.status === 429) {
      if (input) input.value = text;
      showToast('message queue full, please wait');
      return;
    }
    if (!r.ok) {
      if (input) input.value = text;
      const d = await r.json().catch(() => ({}));
      showToast(d.error || 'send failed: ' + r.status);
      return;
    }

    // Clear input only after confirmed success
    if (input) { input.value = ''; input.style.height = 'auto'; }
    pendingFiles = [];
    renderFilePreviews();

    // Speed up polling when WS not connected
    if (!wsm.isConnected()) {
      if (eventTimer) clearInterval(eventTimer);
      eventTimer = setInterval(() => fetchEvents(false), 500);
      setTimeout(() => {
        if (eventTimer) clearInterval(eventTimer);
        if (!wsm.isConnected()) {
          eventTimer = setInterval(() => fetchEvents(false), 1000);
        }
      }, 15000);
    }
  } catch (e) {
    if (input) input.value = text;
    showToast('send error: ' + e.message);
  } finally {
    sending = false;
    if (btn) btn.classList.remove('sending');
  }
}

function interruptSession() {
  if (!selectedKey) return;
  const sd = sessionsData[sid(selectedKey, selectedNode || 'local')];
  if (!sd || sd.state !== 'running') return;
  if (wsm.isConnected()) {
    wsm.send({ type: 'interrupt', key: selectedKey, id: 'int' + Date.now() });
    showToastVariant('interrupt sent', 'warning');
  } else {
    showToastVariant('interrupt requires WebSocket', 'warning');
  }
}

function updateSendButton(state) {
  const btn = document.getElementById('btn-send');
  if (!btn) return;
  if (state === 'running') {
    btn.className = 'btn-icon btn-stop';
    btn.setAttribute('onclick', 'interruptSession()');
    btn.title = 'stop';
    btn.innerHTML = '&#x25A0;';
  } else {
    btn.className = 'btn-icon btn-send';
    btn.setAttribute('onclick', 'sendMessage()');
    btn.title = 'send';
    btn.innerHTML = '&#x27a4;';
  }
}

// --- File handling ---

function openFilePicker() { document.getElementById('file-input').click(); }

function handleFiles(fileList) {
  for (const f of fileList) {
    if (!f.type.startsWith('image/')) continue;
    if (f.size > 10 * 1024 * 1024) { showToast('file too large (max 10MB)'); continue; }
    if (pendingFiles.length >= 5) { showToast('max 5 files'); break; }
    pendingFiles.push(f);
  }
  renderFilePreviews();
}

function removeFile(idx) {
  pendingFiles.splice(idx, 1);
  renderFilePreviews();
}

function renderFilePreviews() {
  const el = document.getElementById('file-preview');
  if (!el) return;
  // Revoke old blob URLs to prevent memory leaks
  el.querySelectorAll('img[src^="blob:"]').forEach(img => URL.revokeObjectURL(img.src));
  el.innerHTML = pendingFiles.map((f, i) => {
    const url = URL.createObjectURL(f);
    return '<div class="file-thumb"><img src="' + url + '"><button class="remove" onclick="removeFile(' + i + ')">\u00d7</button></div>';
  }).join('');
}

// --- Voice recording ---

let mediaRecorder = null;
let audioChunks = [];
let isUnloading = false;
window.addEventListener('pagehide', () => {
  isUnloading = true;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
});

let pendingMic = false;

function toggleRecording() {
  if (pendingMic) return;
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('browser does not support audio recording');
    return;
  }
  pendingMic = true;
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    pendingMic = false;
    audioChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/ogg;codecs=opus') ? 'audio/ogg;codecs=opus'
      : '';
    mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      if (isUnloading) return;
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
      audioChunks = [];
      transcribeAudio(blob);
    };
    mediaRecorder.start();
    const btn = document.getElementById('btn-mic');
    if (btn) { btn.classList.add('recording'); btn.title = 'stop recording'; }
  }).catch(err => {
    pendingMic = false;
    showToast('microphone access denied');
    console.warn('getUserMedia error:', err);
  });
}

function transcribeAudio(blob) {
  const btn = document.getElementById('btn-mic');
  if (btn) { btn.classList.remove('recording'); btn.classList.add('transcribing'); btn.title = 'transcribing...'; }
  const fd = new FormData();
  fd.append('audio', blob, 'recording.' + (blob.type.includes('webm') ? 'webm' : blob.type.includes('ogg') ? 'ogg' : 'mp4'));
  const headers = {};
  const token = getToken();
  if (token) headers['Authorization'] = 'Bearer ' + token;
  fetch('/api/transcribe', {
    method: 'POST',
    headers: headers,
    body: fd
  }).then(r => {
    if (!r.ok) return r.text().then(t => { throw new Error(t); });
    return r.json();
  }).then(data => {
    const input = document.getElementById('msg-input');
    if (input && data.text) {
      input.value = input.value ? input.value + ' ' + data.text : data.text;
      autoGrow(input);
      input.focus();
    }
  }).catch(err => {
    showToast('transcription failed: ' + err.message);
  }).finally(() => {
    if (btn) { btn.classList.remove('transcribing'); btn.title = 'voice input'; }
  });
}

// --- Auth modal ---

function showAuthModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML =
    '<div class="modal">' +
      '<h3>Dashboard API Token</h3>' +

// --- Utilities ---

function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type === 'success' ? ' success' : '');
  setTimeout(() => { el.className = 'toast'; }, 3000);
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToastVariant('copied', 'success')).catch(() => { fallbackCopy(text); showToastVariant('copied', 'success'); });
  } else {
    fallbackCopy(text);
    showToastVariant('copied', 'success');
  }
}

function copyCodeBlock(btn) {
  const code = btn.closest('.md-code-wrap').querySelector('code').textContent;
  const done = () => { btn.textContent = 'copied!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500); };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(done).catch(() => { fallbackCopy(code); done(); });
  } else {
    fallbackCopy(code);
    done();
  }
}

function shortPath(p) {
  const home = '/home/';
  const i = p.indexOf(home);
  if (i >= 0) {
    const rest = p.substring(i + home.length);
    const slash = rest.indexOf('/');
    if (slash >= 0) return '~' + rest.substring(slash);
  }
  return p.length > 40 ? '...' + p.substring(p.length - 37) : p;
}

function timeAgo(ms, future) {
  if (!ms) return '\u2014';
  const d = future ? ms - Date.now() : Date.now() - ms;
  if (d < 0) return future ? 'now' : 'just now';
  const suffix = future ? '' : ' ago';
  if (d < 60000) return Math.floor(d/1000) + 's' + suffix;
  if (d < 3600000) return Math.floor(d/60000) + 'm' + suffix;
  if (d < 86400000) return Math.floor(d/3600000) + 'h' + suffix;
  return Math.floor(d/86400000) + 'd' + suffix;
}

function sessionTimeHint(key) {
  const m = (key || '').match(/:(\d{4})-(\d{2})-(\d{2})-(\d{2})(\d{2})(\d{2})/);
  if (m) return m[2] + '/' + m[3] + ' ' + m[4] + ':' + m[5];
  return '\u2014';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

let mermaidLoading = false;
let mermaidReady = false;

function loadMermaid() {
  if (mermaidReady || mermaidLoading) return;
  mermaidLoading = true;
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js';
  s.integrity = 'sha384-tI0sDqjGJcqrQ8e/XKiQGS+ee11v5knTNWx2goxMBxe4DO9U0uKlfxJtYB9ILZ4j';
  s.crossOrigin = 'anonymous';
  s.onload = () => {
    mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'strict' });
    mermaidReady = true;
    mermaidLoading = false;
    runMermaid();
  };
  s.onerror = () => { mermaidLoading = false; };
  document.head.appendChild(s);
}

function runMermaid() {
  if (Object.keys(mermaidPending).length === 0) return;
  if (!mermaidReady) { loadMermaid(); return; }
  let hasNew = false;
  Object.entries(mermaidPending).forEach(([id, code]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = code;
    el.className = 'mermaid';
    delete mermaidPending[id];
    hasNew = true;
  });
  if (hasNew) mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
}

let mermaidCounter = 0;
const mermaidPending = {};

let katexLoading = false;
let katexReady = false;
let katexCounter = 0;
const katexPending = {};

function loadKatex() {
  if (katexReady || katexLoading) return;
  katexLoading = true;
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js';
  s.integrity = 'sha384-Rma6DA2IPUwhNxmrB/7S3Tno0YY7sFu9WSYMCuulLhIqYSGZ2gKCJWIqhBWqMQfh';
  s.crossOrigin = 'anonymous';
  s.onload = () => {
    katexReady = true;
    katexLoading = false;
    runKatex();
  };
  s.onerror = (e) => { katexLoading = false; console.error('[KaTeX] failed to load:', e); };
  document.head.appendChild(s);
}

function runKatex() {
  if (Object.keys(katexPending).length === 0) return;
  if (!katexReady) { loadKatex(); return; }
  Object.entries(katexPending).forEach(([id, info]) => {
    const el = document.getElementById(id);
    if (!el) { delete katexPending[id]; return; }
    try {
      katex.render(info.tex, el, { displayMode: info.display, throwOnError: false });
    } catch(_) {
      el.textContent = (info.display ? '$$' : '$') + info.tex + (info.display ? '$$' : '$');
    }
    delete katexPending[id];
  });
}

function renderKatex(tex, displayMode) {
  if (katexReady) {
    try { return katex.renderToString(tex, { displayMode: displayMode, throwOnError: false }); }
    catch(_) { return esc(tex); }
  }
  const id = 'ktx-' + (++katexCounter);
  katexPending[id] = { tex: tex, display: displayMode };
  loadKatex();
  return '<span id="' + id + '" class="katex-pending">' + esc(tex) + '</span>';
}

/* Lightweight Markdown renderer for text/result events */

function renderMd(s) {
  if (!s) return '';
  // Split by fenced code blocks and display math blocks
  const parts = s.split(/(```[\s\S]*?```|\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\])/g);
  return parts.map(part => {
    if (part.startsWith('```')) {
      const m = part.match(/^```(\w*)\n?([\s\S]*?)```$/);
      const lang = m ? m[1] : '';
      const code = m ? m[2].replace(/\n$/, '') : part.slice(3, -3);
      if (lang === 'mermaid') {
        const id = 'mmd-' + (++mermaidCounter);
        mermaidPending[id] = code;
        return '<div class="mermaid-wrap"><pre id="' + id + '" class="mermaid-pending"></pre></div>';
      }
      const langAttr = lang ? ' data-lang="' + esc(lang) + '"' : '';
      return '<div class="md-code-wrap"><pre class="md-pre"><code' + langAttr + '>' + esc(code) + '</code></pre><button class="md-copy-btn" onclick="copyCodeBlock(this)">copy</button></div>';
    }
    if (part.startsWith('$$') && part.endsWith('$$')) {
      return '<div class="md-math-display">' + renderKatex(part.slice(2, -2).trim(), true) + '</div>';
    }
    if (part.startsWith('\\[') && part.endsWith('\\]')) {
      return '<div class="md-math-display">' + renderKatex(part.slice(2, -2).trim(), true) + '</div>';
    }
    // Process line by line for block elements
    const lines = part.split('\n');
    let html = '';
    let inList = '';
    for (let i = 0; i < lines.length; i++) {
      let line = lines[i];
      // Headings
      const hm = line.match(/^(#{1,4})\s+(.+)$/);
      if (hm) {
        if (inList) { html += '</' + inList + '>'; inList = ''; }
        const level = hm[1].length;
        html += '<strong class="md-h' + level + '">' + inlineMd(hm[2]) + '</strong>\n';
        continue;
      }
      // Unordered list
      if (/^\s*[-*]\s+/.test(line)) {
        if (inList === 'ol') { html += '</ol>'; inList = ''; }
        if (!inList) { html += '<ul class="md-ul">'; inList = 'ul'; }
        html += '<li>' + inlineMd(line.replace(/^\s*[-*]\s+/, '')) + '</li>';
        continue;
      }
      // Ordered list
      if (/^\s*\d+\.\s+/.test(line)) {
        if (inList === 'ul') { html += '</ul>'; inList = ''; }
        if (!inList) { html += '<ol class="md-ol">'; inList = 'ol'; }
        html += '<li>' + inlineMd(line.replace(/^\s*\d+\.\s+/, '')) + '</li>';
        continue;
      }
      if (inList) { html += '</' + inList + '>'; inList = ''; }
      if (line === '') {
        html += '<div class="md-blank"></div>';
        continue;
      }
      if (/^\|.+\|$/.test(line.trim())) {
        let tbl = [line];
        while (i + 1 < lines.length && /^\|.+\|$/.test(lines[i + 1].trim())) { tbl.push(lines[++i]); }
        html += renderTable(tbl);
        continue;
      }
      html += inlineMd(line) + '<br>';
    }
    if (inList) html += '</' + inList + '>';
    return html;
  }).join('');
}

/* Inline markdown: bold, italic, code, links, math */
function inlineMd(s) {
  // Extract inline math before HTML escaping. Use \x00 delimiters to avoid collisions with user content.
  const mathTokens = [];
  s = s.replace(/\$([^\$\n]+?)\$/g, function(_, tex) {
    const idx = mathTokens.length;
    mathTokens.push(renderKatex(tex, false));
    return '\x00KTX' + idx + '\x00';
  });
  s = s.replace(/\\\((.+?)\\\)/g, function(_, tex) {
    const idx = mathTokens.length;
    mathTokens.push(renderKatex(tex, false));
    return '\x00KTX' + idx + '\x00';
  });
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, '<code class="md-code">$1</code>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, text, url) {
    if (/^https?:\/\//i.test(url) || /^mailto:/i.test(url)) {
      return '<a href="' + url + '" class="md-link" target="_blank" rel="noopener noreferrer">' + text + '</a>';
    }
    return text;
  });
  // Restore math tokens after escaping
  if (mathTokens.length > 0) {
    s = s.replace(/\x00KTX(\d+)\x00/g, function(_, idx) { return mathTokens[+idx]; });
  }
  return s;
}

function renderTable(lines) {
  if (lines.length < 2) return lines.map(l => inlineMd(l) + '\n').join('');
  if (!/^\|[\s\-:]+(\|[\s\-:]+)+\|$/.test(lines[1].trim())) return lines.map(l => inlineMd(l) + '\n').join('');
  const cells = l => l.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
  let h = '<table class="md-table"><thead><tr>' + cells(lines[0]).map(c => '<th>' + inlineMd(c) + '</th>').join('') + '</tr></thead><tbody>';
  for (let i = 2; i < lines.length; i++) h += '<tr>' + cells(lines[i]).map(c => '<td>' + inlineMd(c) + '</td>').join('') + '</tr>';
  return '<div class="md-table-wrap">' + h + '</tbody></table></div>';
}

function processEventsForDisplay(events) {
  return events.filter(e => e.type !== 'tool_use' && e.type !== 'result');
