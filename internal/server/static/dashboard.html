/* ===== WebSocket Connection Manager ===== */

const WS_STATES = { OFF: 'off', CONNECTING: 'connecting', AUTH: 'authenticating', CONNECTED: 'connected', DISCONNECTED: 'disconnected' };

const wsm = {
  conn: null,
  state: WS_STATES.OFF,
  backoff: 1000,
  maxBackoff: 30000,
  reconnectTimer: null,
  pingTimer: null,
  subscribedKey: null,
  subscribedNode: null,
  lastEventTimeWs: 0,
  sendCounter: 0,
  _initialSubscribe: false,

  connect() {
    if (this.conn && (this.conn.readyState === WebSocket.OPEN || this.conn.readyState === WebSocket.CONNECTING)) return;

    this.setState(WS_STATES.CONNECTING);
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    this.conn = new WebSocket(proto + '//' + location.host + '/ws');

    this.conn.onopen = () => {
      this.setState(WS_STATES.AUTH);
      const token = getToken();
      this.conn.send(JSON.stringify({ type: 'auth', token: token }));
    };

    this.conn.onmessage = (evt) => {
      try { this.onMessage(JSON.parse(evt.data)); }
      catch (err) { console.error('ws parse error:', err); }
    };

    this.conn.onclose = () => {
      this.cleanup();
      this.setState(WS_STATES.DISCONNECTED);
      this.scheduleReconnect();
    };

    this.conn.onerror = () => {};
  },

  cleanup() {
    if (this.pingTimer) { clearInterval(this.pingTimer); this.pingTimer = null; }
  },

  disconnect() {
    if (this.reconnectTimer) { clearTimeout(this.reconnectTimer); this.reconnectTimer = null; }
    this.cleanup();
    if (this.conn) { this.conn.close(); this.conn = null; }
    this.subscribedKey = null;
    this.subscribedNode = null;
    this._pendingSubscribeKey = null;
    this._pendingSubscribeNode = null;
    this.setState(WS_STATES.OFF);
  },

  scheduleReconnect() {
    if (this.reconnectTimer) return;
    this.reconnectTimer = setTimeout(() => {
      this.reconnectTimer = null;
      this.connect();
    }, this.backoff);
    this.backoff = Math.min(this.backoff * 2, this.maxBackoff);
  },

  onMessage(msg) {
    switch (msg.type) {
      case 'auth_ok':
        this.setState(WS_STATES.CONNECTED);
        this.backoff = 1000;
        this.startPing();
        this.onConnected();
        break;
      case 'auth_fail':
        showToast('WS auth failed: ' + (msg.error || 'invalid token'));
        this.conn.close();
        break;
      case 'subscribed':
        // Server confirmed subscription
        this.subscribedKey = this._pendingSubscribeKey || msg.key;
        this.subscribedNode = this._pendingSubscribeNode || 'local';
        this._pendingSubscribeKey = null;
        this._pendingSubscribeNode = null;
        break;
      case 'error':
        // Subscribe failed (e.g. session not found yet) — reset pending
        this._pendingSubscribeKey = null;
        this._pendingSubscribeNode = null;
        break;
      case 'history':
        this.onHistory(msg);
        break;
      case 'event':
        this.onEvent(msg);
        break;
      case 'send_ack':
        this.onSendAck(msg);
        break;
      case 'interrupt_ack':
        break;
      case 'session_state':
        this.onSessionState(msg);
        break;
      case 'sessions_update':
        fetchSessions().then(() => {
          // Auto-subscribe to newly created session (only if no active or pending subscription)
          if (selectedKey && !wsm.subscribedKey && !wsm._pendingSubscribeKey && sessionsData[sid(selectedKey, selectedNode)]) {
            wsm.subscribe(selectedKey, selectedNode);
          }
        });
        break;
      case 'cron_result':
        if (currentTab === 'cron') fetchCronJobs();
        break;
      case 'pong':
        break;
    }
  },

  startPing() {
    if (this.pingTimer) clearInterval(this.pingTimer);
    this.pingTimer = setInterval(() => {
      if (this.conn && this.conn.readyState === WebSocket.OPEN) {
        this.conn.send(JSON.stringify({ type: 'ping' }));
      }
    }, 30000);
  },

  send(msg) {
    if (this.conn && this.conn.readyState === WebSocket.OPEN) {
      this.conn.send(JSON.stringify(msg));
      return true;
    }
    return false;
  },

  subscribe(key, node) {
    node = node || 'local';
    this._pendingSubscribeKey = key;
    this._pendingSubscribeNode = node;
    const msg = { type: 'subscribe', key: key };
    if (node && node !== 'local') msg.node = node;
    this._initialSubscribe = (this.lastEventTimeWs === 0);
    if (this.lastEventTimeWs > 0) msg.after = this.lastEventTimeWs;
    this.send(msg);
  },

  unsubscribe() {
    if (this.subscribedKey) {
      const msg = { type: 'unsubscribe', key: this.subscribedKey };
      if (this.subscribedNode && this.subscribedNode !== 'local') msg.node = this.subscribedNode;
      this.send(msg);
    }
    this.subscribedKey = null;
    this.subscribedNode = null;
    this._pendingSubscribeKey = null;
    this._pendingSubscribeNode = null;
    this.lastEventTimeWs = 0;
  },

  /* -- WS event handlers -- */

  onConnected() {
    if (eventTimer) { clearInterval(eventTimer); eventTimer = null; }
    if (selectedKey) {
      if (lastEventTime > 0 && this.lastEventTimeWs === 0) {
        this.lastEventTimeWs = lastEventTime;
      }
      this.subscribe(selectedKey, selectedNode);
    }
  },

  onHistory(msg) {
    if (msg.key !== selectedKey || (msg.node || 'local') !== selectedNode) return;
    const el = document.getElementById('events-scroll');
    if (!el) return;
    const events = msg.events || [];
    const isInitial = this._initialSubscribe;
    this._initialSubscribe = false;

    const display = processEventsForDisplay(events);

    if (isInitial) {
      el.innerHTML = display.map(eventHtml).filter(Boolean).join('') || '<div class="empty-state">no events yet</div>';
      el.scrollTop = el.scrollHeight;
      runMermaid();
  runKatex();
    } else {
      const wasBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
      display.forEach(e => { const h = eventHtml(e); if (h) el.insertAdjacentHTML('beforeend', h); });
      if (wasBottom) el.scrollTop = el.scrollHeight;
      runMermaid();
  runKatex();
    }

    if (events.length > 0) {
      const last = events[events.length - 1];
      if (last.time > this.lastEventTimeWs) this.lastEventTimeWs = last.time;
    }
  },

  onEvent(msg) {
    if (msg.key !== selectedKey || (msg.node || 'local') !== selectedNode) return;
    const ev = msg.event;
    if (!ev) return;
    if (ev.time > this.lastEventTimeWs) this.lastEventTimeWs = ev.time;
    // Update header title when a new user message arrives
    if (ev.type === 'user') {
      const text = ev.detail || ev.summary || '';
      if (text) {
        const h2 = document.querySelector('.main-header h2');
        if (h2) h2.textContent = text;
      }
    }
    if (ev.type === 'tool_use' || ev.type === 'result') return;
    const html = eventHtml(ev);
    if (!html) return;
    const el = document.getElementById('events-scroll');
    if (!el) return;
    const empty = el.querySelector('.empty-state');
    if (empty) empty.remove();
    const wasBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
    el.insertAdjacentHTML('beforeend', html);
    if (wasBottom) el.scrollTop = el.scrollHeight;
    runMermaid();
  runKatex();
  },

  onSendAck(msg) {
    if (msg.status === 'accepted') {
      flashSendBtn();
      // For new sessions: backend needs time to spawn the process before
      // the session appears in the API. Retry subscribe after a short delay.
      const ackKey = msg.key || selectedKey;
      if (ackKey && !wsm.subscribedKey && !wsm._pendingSubscribeKey) {
        setTimeout(() => {
          if (selectedKey === ackKey && !wsm.subscribedKey && !wsm._pendingSubscribeKey) {
            wsm.lastEventTimeWs = 0;
            wsm.subscribe(ackKey, selectedNode);
          }
        }, 1500);
      }
      // Re-subscribe is NOT needed here for already-subscribed sessions.
      // The existing eventPushLoop is still connected to the process's event
      // log and will deliver new events (including the user message we just
      // sent). Re-subscribing would cause a history replay that overlaps with
      // events already pushed by the running eventPushLoop, resulting in
      // duplicate user messages in the UI.
      // For process restarts (dead/suspended → running), onSessionState
      // handles re-subscription exclusively.
    } else if (msg.status === 'error') {
      showToastVariant('send error: ' + (msg.error || 'unknown'), 'error');
    }
  },

  onSessionState(msg) {
    const msgNode = msg.node || 'local';
    const sKey = sid(msg.key, msgNode);
    const prevState = sessionsData[sKey] ? sessionsData[sKey].state : null;
    if (sessionsData[sKey]) {
      sessionsData[sKey].state = msg.state;
      if (msg.reason) sessionsData[sKey].death_reason = msg.reason;
    }
    let card = null;
    document.querySelectorAll('.session-card').forEach(c => {
      if (c.dataset.key === msg.key && (c.dataset.node || 'local') === msgNode) card = c;
    });
    if (card) {
      const badge = card.querySelector('.badge');
      if (badge) { badge.className = 'badge ' + msg.state; badge.textContent = msg.state; }
      card.classList.toggle('dead-card', msg.state === 'suspended');
    }
    if (msg.key === selectedKey && msgNode === selectedNode) updateMainState(msg.state, msg.reason);
    // Process restarted (suspended → running): re-subscribe to pick up the
    // new process's event log. The old eventPushLoop exited when the old process
    // closed its subscriber channels, so the subscription is stale.
    if (msg.key === selectedKey && msgNode === selectedNode &&
        msg.state === 'running' && prevState === 'suspended' &&
        wsm.subscribedKey === msg.key) {
      wsm.subscribe(msg.key, selectedNode);
    }
    // Session became suspended: re-render sidebar to move it to history
    if (msg.state === 'suspended') { lastSessionsJSON = ''; fetchSessions(); }
  },

  setState(s) {
    this.state = s;
    renderWsStatus();
    if (s === WS_STATES.CONNECTED) {
      // WS connected: stop session polling, rely on push
      if (sessionPollTimer) { clearInterval(sessionPollTimer); sessionPollTimer = null; }
      // Reduce discovered scan frequency
      if (discoveredPollTimer) { clearInterval(discoveredPollTimer); discoveredPollTimer = null; }
      discoveredPollTimer = setInterval(scanDiscovered, 30000);
    } else if (s === WS_STATES.DISCONNECTED) {
      // WS lost: start fallback polling
      if (!sessionPollTimer) sessionPollTimer = setInterval(fetchSessions, 5000);
      if (discoveredPollTimer) { clearInterval(discoveredPollTimer); discoveredPollTimer = null; }
      discoveredPollTimer = setInterval(scanDiscovered, 5000);
      if (selectedKey && !eventTimer) {
        lastEventTime = this.lastEventTimeWs;
        eventTimer = setInterval(() => fetchEvents(false), 1000);
      }
    }
  },

  isConnected() { return this.state === WS_STATES.CONNECTED; }
};

/* ===== WS Helper Functions ===== */

function renderWsStatus() {
  const el = document.getElementById('ws-status');
  if (!el) return;
  const map = {
    off: ['gray', ''],
    connecting: ['yellow', ''],
    authenticating: ['yellow', ''],
    connected: ['green', ''],
    disconnected: ['red', 'reconnecting']
  };
  const [color, label] = map[wsm.state] || ['gray', ''];
  el.className = 'ws-badge' + (wsm.state === 'disconnected' ? ' disconnected' : '');
  el.innerHTML = '<span class="ws-dot ' + color + '"></span><span class="ws-label">' + label + '</span>';
}

function updateMainState(state, reason) {
  const header = document.querySelector('.main-header');
  if (!header) return;
  const badge = header.querySelector('.badge');
  if (badge) { badge.className = 'badge ' + state; badge.textContent = state; }
  const ia = document.getElementById('input-area');
  if (ia) ia.classList.toggle('disabled', false);
  updateSendButton(state);
  if (reason) {
    let dt = header.querySelector('.death-tag');
    if (!dt) {
      dt = document.createElement('span');
      dt.className = 'death-tag';
      if (badge) badge.insertAdjacentElement('afterend', dt);
    }
    dt.textContent = reason.replace(/_/g, ' ');
  }
}

function flashSendBtn() {
  const btn = document.getElementById('btn-send');
  if (!btn) return;
  btn.style.boxShadow = '0 0 8px #3fb950';
  setTimeout(() => { btn.style.boxShadow = ''; }, 600);
}

function showToastVariant(msg, variant) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (variant ? ' ' + variant : '');
  setTimeout(() => { el.className = 'toast'; }, 3000);
}

function stopPreviewPolling() {
  if (previewTimer) { clearInterval(previewTimer); previewTimer = null; }
  previewEventCount = 0;
}

/* ===== Discovery & Takeover ===== */

async function scanDiscovered() {
  try {
    const headers = {};
    const t = getToken();
    if (t) headers['Authorization'] = 'Bearer ' + t;
    const r = await fetch('/api/discovered', { headers });
    discoveredItems = (await r.json()) || [];
    // Trigger sidebar re-render to merge discovered into project groups
    lastSessionsJSON = '';
    fetchSessions();
  } catch (e) {
    showToast('scan error: ' + e.message);
  }
}

function discoveredInlineHtml(s) {
  const cwd = s.cwd || 'unknown';
  const ago = timeAgo(s.last_active || s.started_at);
  const pst = s.proc_start_time || 0;
  const state = s.state || 'ready';
  const prompt = s.last_prompt || s.summary || '';
  const node = s.node || '';
  return '<div class="session-card cli-card" data-pid="' + s.pid + '" data-session-id="' + esc(s.session_id) + '" data-cwd="' + esc(cwd) + '" data-pst="' + pst + '" data-node="' + esc(node) + '" onclick="handleDiscoveredClick(this)">' +
    '<div class="platform">cli</div>' +
    (prompt ? '<div class="session-prompt" title="' + esc(prompt) + '">' + esc(prompt) + '</div>' : '') +
    '<div class="meta">' +
      '<span class="badge ' + state + '">' + state + '</span>' +
      '<span>' + ago + '</span>' +
    '</div>' +
  '</div>';
}

function handleDiscoveredClick(el) {
  previewDiscovered(el.dataset.sessionId, el.dataset.cwd, Number(el.dataset.pid), Number(el.dataset.pst), el.dataset.node || '');
}

async function previewDiscovered(sessionId, cwd, pid, procStartTime, node) {
  stopPreviewPolling();
  // Deselect any managed session
  selectedKey = null;
  selectedNode = null;
  if (wsm.subscribedKey) wsm.unsubscribe();
  if (eventTimer) { clearInterval(eventTimer); eventTimer = null; }
  document.querySelectorAll('.session-card').forEach(el => el.classList.remove('active'));
  mobileEnterChat();

  // Highlight the discovered card
  document.querySelectorAll('.cli-card').forEach(el => el.classList.remove('active'));
  const card = document.querySelector('.cli-card[data-pid="' + pid + '"]');
  if (card) card.classList.add('active');

  const base = cwd.split('/').pop() || cwd;
  const main = document.getElementById('main');
  main.innerHTML =
    '<div class="main-header">' +
      '<button class="btn-mobile-back" onclick="mobileBack()" title="back">&#8592;</button>' +
      '<div class="main-header-content">' +
        '<h2>' + esc(base) + ' <span class="badge" style="background:#9e6a03;color:#fff">external</span></h2>' +
        '<div class="detail"></div>' +
        '<div class="workspace-path" data-copy="' + esc(cwd) + '" onclick="copyText(this.dataset.copy)" title="click to copy">' + esc(cwd) + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="events" id="events-scroll"><div class="empty-state">loading...</div></div>' +
    '<div class="input-area" id="input-area">' +
      '<div class="file-preview" id="file-preview"></div>' +
      '<div class="input-row">' +
        '<textarea id="msg-input" rows="1" placeholder="send a message to take over..." onkeydown="handleKey(event)" oncompositionend="lastCompositionEnd=Date.now()" oninput="autoGrow(this)"></textarea>' +
        '<button class="btn-icon btn-send" id="btn-send" onclick="sendMessage()" title="send">&#x27a4;</button>' +
      '</div>' +
    '</div>';
  pendingDiscovered = {pid: pid, sessionId: sessionId, cwd: cwd, procStartTime: procStartTime, node: node};

  try {
    const nodeParam = node ? '&node=' + encodeURIComponent(node) : '';
    const headers = {};
    const t = getToken();
    if (t) headers['Authorization'] = 'Bearer ' + t;
    const r = await fetch('/api/discovered/preview?session_id=' + encodeURIComponent(sessionId) + nodeParam, { headers });
    if (!r.ok) { showToast('preview failed'); return; }
    const events = await r.json();
    const el = document.getElementById('events-scroll');
    if (!el) return;
    const display = processEventsForDisplay(events);
    if (events.length === 0) {
      el.innerHTML = '<div class="empty-state">no conversation history</div>';
    } else {
      el.innerHTML = display.map(eventHtml).filter(Boolean).join('');
      el.scrollTop = el.scrollHeight;
    }
    previewEventCount = events.length;
    const capturedSid = sessionId;
    previewTimer = setInterval(async () => {
      try {
        const headers2 = {};
        const t2 = getToken();
        if (t2) headers2['Authorization'] = 'Bearer ' + t2;
        const r2 = await fetch('/api/discovered/preview?session_id=' + encodeURIComponent(capturedSid) + nodeParam, { headers: headers2 });
        if (!r2.ok) return;
        const all = await r2.json();
        if (all.length <= previewEventCount) return;
        const fresh = all.slice(previewEventCount);
        previewEventCount = all.length;
        const el2 = document.getElementById('events-scroll');
        if (!el2) { stopPreviewPolling(); return; }
        const empty = el2.querySelector('.empty-state');
        if (empty) empty.remove();
        const wasBottom = el2.scrollTop + el2.clientHeight >= el2.scrollHeight - 30;
        fresh.forEach(e => {
          if (e.type === 'tool_use' || e.type === 'result') return;
          const h = eventHtml(e); if (h) el2.insertAdjacentHTML('beforeend', h);
        });
        if (wasBottom) el2.scrollTop = el2.scrollHeight;
      } catch (_) {}
    }, 2000);
  } catch (e) {
    showToast('preview error: ' + e.message);
  }
}

function handleTakeoverClick(el) {
  takeover(el, Number(el.dataset.pid), el.dataset.sessionId, el.dataset.cwd, Number(el.dataset.pst), el.dataset.node || '');
}

async function takeover(btn, pid, sessionId, cwd, procStartTime, node) {
  btn.classList.add('taking');
  btn.textContent = 'taking over...';
  try {
    const headers = {'Content-Type': 'application/json'};
    const token = getToken();
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const r = await fetch('/api/discovered/takeover', {
      method: 'POST', headers,
      body: JSON.stringify({pid: pid, session_id: sessionId, cwd: cwd, proc_start_time: procStartTime || 0, node: node || ''})
    });
    if (!r.ok) {
      const text = await r.text();
      showToast('takeover failed: ' + text);
      btn.classList.remove('taking');
      btn.textContent = 'takeover';
      return;
    }
    const data = await r.json();
    showToastVariant('session taken over', 'success');
    // Immediately remove the discovered card from DOM
    const card = document.querySelector('.cli-card[data-pid="' + pid + '"]');
    if (card) card.remove();
    // Force refresh (clear cache so renderSidebar runs)
    lastSessionsJSON = '';
    await fetchSessions();
    if (data.key) {
      selectSession(data.key, node || 'local');
    }
  } catch (e) {
    showToast('takeover error: ' + e.message);
    btn.classList.remove('taking');
    btn.textContent = 'takeover';
  }
}

/* ===== Mobile Navigation ===== */

const mobileQuery = window.matchMedia('(max-width:768px)');
function isMobile() { return mobileQuery.matches; }

// Re-initialise when crossing the 768px breakpoint (e.g. orientation change)
mobileQuery.addEventListener('change', e => {
  if (!e.matches) {
    document.body.classList.remove('mobile-list-view', 'mobile-chat-view');
  } else {
    initMobile();
  }
});

function mobileEnterChat() {
  if (!isMobile()) return;
  history.pushState({ view: 'chat' }, '');
  document.body.classList.remove('mobile-list-view');
  document.body.classList.add('mobile-chat-view');
}

function mobileBack() {
  document.body.classList.remove('mobile-chat-view');
  document.body.classList.add('mobile-list-view');
  if (document.activeElement) document.activeElement.blur();
}

// Handle Android back button and iOS swipe-back gesture
window.addEventListener('popstate', () => {
  if (isMobile() && document.body.classList.contains('mobile-chat-view')) {
    mobileBack();
  }
});

function initMobile() {
  if (!isMobile()) return;
  const hasSession = !!selectedKey;
  document.body.classList.toggle('mobile-chat-view', hasSession);
  document.body.classList.toggle('mobile-list-view', !hasSession);
}

function initSwipeDelete() {
  const list = document.getElementById('session-list');
  if (!list) return;
  let card = null, startX = 0, startY = 0, tracking = false;
  list.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) { card = null; return; }
    const c = e.target.closest('.session-card[data-key]');
    if (!c) return;
    card = c; startX = e.touches[0].clientX; startY = e.touches[0].clientY; tracking = false;
  }, {passive:true});
  list.addEventListener('touchmove', e => {
    if (!card) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!tracking) {
      if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
      if (Math.abs(dy) >= Math.abs(dx)) { card = null; return; }
      tracking = true;
    }
    if (dx >= 0) return;
    card.classList.add('swiping');
    card.style.transform = 'translateX(' + dx + 'px)';
    card.style.background = 'rgba(218,54,51,' + Math.min(0.35, -dx / card.offsetWidth * 0.6) + ')';
  }, {passive:true});
  list.addEventListener('touchend', e => {
    if (!card || !tracking) { card = null; tracking = false; return; }
    const dx = e.changedTouches[0].clientX - startX;
    const c = card; card = null; tracking = false;
    c.classList.remove('swiping');
    if (dx < -c.offsetWidth * 0.4) {
      c.style.transition = 'transform .2s ease, opacity .2s ease';
      c.style.transform = 'translateX(-100%)';
      c.style.opacity = '0';
      setTimeout(() => dismissSession(c.dataset.key, c.dataset.node || 'local'), 180);
    } else {
      c.style.transition = 'transform .2s ease, background .2s ease';
      c.style.transform = '';
      c.style.background = '';
      setTimeout(() => { c.style.transition = ''; }, 200);
    }
  }, {passive:true});
}

/* ===== Cron Tab ===== */

let cronJobs = [];
let selectedCronJob = null;
let currentTab = 'sessions';
let cronPollTimer = null;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.sidebar-tabs button').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'sessions') || (i === 1 && tab === 'cron'));
  });
  const sessionList = document.getElementById('session-list');
  const discoveredSection = document.getElementById('discovered-section');
  const cronList = document.getElementById('cron-list');
  const actionsBtn = document.querySelector('.sidebar-actions');

  if (tab === 'sessions') {
    sessionList.style.display = '';
    if (discoveredItems.length > 0) discoveredSection.style.display = '';
    cronList.style.display = 'none';
    if (actionsBtn) actionsBtn.style.display = '';
    if (cronPollTimer) { clearInterval(cronPollTimer); cronPollTimer = null; }
  } else {
    sessionList.style.display = 'none';
    discoveredSection.style.display = 'none';
    cronList.style.display = '';
    if (actionsBtn) actionsBtn.style.display = 'none';
    fetchCronJobs();
    if (!cronPollTimer) cronPollTimer = setInterval(fetchCronJobs, 10000);
  }
}

async function fetchCronJobs() {
  try {
    const headers = {};
    const t = getToken();
    if (t) headers['Authorization'] = 'Bearer ' + t;
    const r = await fetch('/api/cron', { headers });
    if (!r.ok) return;
    const data = await r.json();
    cronJobs = data.jobs || [];
    renderCronList();
  } catch (e) { console.error('fetch cron:', e); }
}

function renderCronList() {
  const el = document.getElementById('cron-list');
  if (!el) return;

  let html = '<div class="cron-add-form">' +
    '<label>Schedule</label>' +
    '<input id="cron-schedule" placeholder="@every 30m or 0 9 * * 1-5">' +
    '<label>Prompt</label>' +
    '<textarea id="cron-prompt" rows="2" placeholder="task to execute..."></textarea>' +
    '<label>Notify IM (optional, format: platform:chat_id)</label>' +
    '<input id="cron-notify" placeholder="feishu:oc_xxxx">' +
    '<div class="form-row"><button onclick="addCronJob()">+ Add</button></div>' +
    '</div>';

  if (cronJobs.length === 0) {
    html += '<div class="no-sessions" style="padding:20px 16px">no cron jobs</div>';
  } else {
    cronJobs.sort((a, b) => b.created_at - a.created_at);
    html += cronJobs.map(cronCardHtml).join('');
  }
  el.innerHTML = html;
}

function cronCardHtml(j) {
  const isActive = selectedCronJob === j.id;
  const status = j.paused ? '<span class="badge suspended">paused</span>' : '<span class="badge running">active</span>';
  const source = j.platform === 'dashboard' ? 'dashboard' : j.platform + ':' + (j.chat_id || '').substring(0, 8);
  const nextStr = j.next_run ? timeAgo(j.next_run, true) : '';
  const lastRunStr = j.last_run_at ? timeAgo(j.last_run_at) : '';
  const resultPreview = j.last_error
    ? '<div class="cron-error-preview" title="' + esc(j.last_error) + '">\u2716 ' + esc(j.last_error) + '</div>'
    : (j.last_result ? '<div class="cron-result-preview" title="' + esc(j.last_result) + '">\u2714 ' + esc(j.last_result.substring(0, 100)) + '</div>' : '');

  return '<div class="cron-card' + (isActive ? ' active' : '') + '" data-id="' + esc(j.id) + '" onclick="selectCronJob(this.dataset.id)">' +
    '<div class="cron-prompt">' + esc(j.prompt) + '</div>' +
    '<div class="cron-schedule">' + esc(j.schedule) + '</div>' +
    '<div class="cron-meta">' + status +
      '<span>' + esc(source) + '</span>' +
      (lastRunStr ? '<span>ran ' + lastRunStr + '</span>' : '') +
      (nextStr ? '<span>next ' + nextStr + '</span>' : '') +
    '</div>' +
    resultPreview +
    '<div class="cron-actions">' +
      (j.paused
        ? '<button data-id="' + esc(j.id) + '" onclick="event.stopPropagation();cronResume(this.dataset.id)">resume</button>'
        : '<button data-id="' + esc(j.id) + '" onclick="event.stopPropagation();cronPause(this.dataset.id)">pause</button>') +
      '<button class="danger" data-id="' + esc(j.id) + '" onclick="event.stopPropagation();cronDelete(this.dataset.id)">delete</button>' +
    '</div>' +
    '</div>';
}

function selectCronJob(id) {
  selectedCronJob = (selectedCronJob === id) ? null : id;
  document.querySelectorAll('.cron-card').forEach(el => {
    el.classList.toggle('active', el.dataset.id === selectedCronJob);
  });
  if (selectedCronJob) {
    const j = cronJobs.find(x => x.id === selectedCronJob);
    if (j) renderCronDetail(j);
  } else {
    document.getElementById('main').innerHTML = '<div class="empty-state">select a cron job to view details</div>';
  }
}

function renderCronDetail(j) {
  const main = document.getElementById('main');
  const status = j.paused ? 'paused' : 'active';
  const source = j.platform === 'dashboard' ? 'dashboard' : j.platform + ':' + (j.chat_id || '');
  const nextStr = j.next_run ? new Date(j.next_run).toLocaleString() : 'N/A';
  const lastRunStr = j.last_run_at ? new Date(j.last_run_at).toLocaleString() : 'never';
  const notify = j.notify_platform ? j.notify_platform + ':' + (j.notify_chat_id || '') : 'none';

  let resultHtml = '';
  if (j.last_error) {
    resultHtml = '<div class="cd-field"><div class="cd-label">Last Error</div><div class="cd-result" style="border-color:#da3633;color:#da3633">' + esc(j.last_error) + '</div></div>';
  }
  if (j.last_result) {
    resultHtml += '<div class="cd-field"><div class="cd-label">Last Result</div><div class="cd-result">' + esc(j.last_result) + '</div></div>';
  }

  main.innerHTML =
    '<div class="main-header">' +
      '<button class="btn-mobile-back" onclick="mobileBack()" title="back">&#8592;</button>' +
      '<div class="main-header-content">' +
      '<h2>Cron: ' + esc(j.id) + '</h2>' +
      '<div class="detail"><span class="badge ' + (j.paused ? 'suspended' : 'running') + '">' + status + '</span><span>' + esc(source) + '</span></div>' +
      '</div>' +
    '</div>' +
    '<div class="cron-detail">' +
      '<div class="cd-field"><div class="cd-label">Schedule</div><div class="cd-value">' + esc(j.schedule) + '</div></div>' +
      '<div class="cd-field"><div class="cd-label">Prompt</div><div class="cd-value">' + esc(j.prompt) + '</div></div>' +
      '<div class="cd-field"><div class="cd-label">Notify</div><div class="cd-value">' + esc(notify) + '</div></div>' +
      '<div class="cd-field"><div class="cd-label">Next Run</div><div class="cd-value">' + esc(nextStr) + '</div></div>' +
      '<div class="cd-field"><div class="cd-label">Last Run</div><div class="cd-value">' + esc(lastRunStr) + '</div></div>' +
      resultHtml +
    '</div>';
}

async function addCronJob() {
  const schedule = document.getElementById('cron-schedule')?.value.trim();
  const prompt = document.getElementById('cron-prompt')?.value.trim();
  const notifyRaw = document.getElementById('cron-notify')?.value.trim();
  if (!schedule || !prompt) { showToast('schedule and prompt are required'); return; }

  const body = { schedule, prompt };
  if (notifyRaw) {
    const parts = notifyRaw.split(':');
    if (parts.length >= 2) {
      body.notify_platform = parts[0];
      body.notify_chat_id = parts.slice(1).join(':');
    } else {
      showToast('notify format: platform:chat_id'); return;
    }
  }

  try {
    const headers = { 'Content-Type': 'application/json' };
    const t = getToken();
    if (t) headers['Authorization'] = 'Bearer ' + t;
    const r = await fetch('/api/cron', { method: 'POST', headers, body: JSON.stringify(body) });
    if (!r.ok) {
      const text = await r.text().catch(() => r.status);
      showToast('create failed: ' + text);
      return;
    }
    const data = await r.json();
    showToast('Job ' + data.id + ' created', 'success');
    fetchCronJobs();
  } catch (e) { showToast('error: ' + e.message); }
}

async function cronPause(id) {
  try {
    const headers = { 'Content-Type': 'application/json' };
    const t = getToken();
    if (t) headers['Authorization'] = 'Bearer ' + t;
    const r = await fetch('/api/cron/pause', { method: 'POST', headers, body: JSON.stringify({ id }) });
    if (!r.ok) { showToast('pause failed'); return; }
    fetchCronJobs();
  } catch (e) { showToast('error: ' + e.message); }
}

async function cronResume(id) {
  try {
    const headers = { 'Content-Type': 'application/json' };
    const t = getToken();
    if (t) headers['Authorization'] = 'Bearer ' + t;
    const r = await fetch('/api/cron/resume', { method: 'POST', headers, body: JSON.stringify({ id }) });
    if (!r.ok) { showToast('resume failed'); return; }
    fetchCronJobs();
  } catch (e) { showToast('error: ' + e.message); }
}

async function cronDelete(id) {
  if (!confirm('Delete cron job ' + id + '?')) return;
  try {
    const headers = {};
    const t = getToken();
    if (t) headers['Authorization'] = 'Bearer ' + t;
    const r = await fetch('/api/cron?id=' + encodeURIComponent(id), { method: 'DELETE', headers });
    if (!r.ok) { showToast('delete failed'); return; }
    if (selectedCronJob === id) {
      selectedCronJob = null;
      document.getElementById('main').innerHTML = '<div class="empty-state">select a cron job to view details</div>';
    }
    fetchCronJobs();
  } catch (e) { showToast('error: ' + e.message); }
}

loadPendingSessions();
fetchSessions();
sessionPollTimer = setInterval(fetchSessions, 5000);
scanDiscovered();
discoveredPollTimer = setInterval(scanDiscovered, 5000);
wsm.connect();
initMobile();
initSwipeDelete();
