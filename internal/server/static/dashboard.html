  .sidebar-footer .sf-help{width:32px;height:32px;font-size:14px}
}
body.kbd-open .sidebar-footer{display:none}

/* ==========================================================================
   UX sweep — non-functional polish (2026-04-27)
   Every rule below is additive: later declarations with equal specificity
   override earlier ones, so structure/behavior is untouched.
   ========================================================================== */

/* ---- Track A: touch-target sizing on coarse pointers (mobile + tablet) ---- */
/* WCAG 2.5.5 Target Size — minimum 44x44 on touch input.
   Uses (pointer:coarse) so mouse-driven desktops keep their compact sizes. */
@media (pointer: coarse){
  .btn-icon,.btn-send,.btn-stop{min-width:44px;min-height:44px}
  /* R110-P1 touch-target: bump to WCAG AAA 44x44 baseline (matched to
     .btn-icon / .btn-send) so three header icons packed in a 390px
     viewport stop being sub-Fitts targets. Paired with .hdr-btns gap
     bump below so adjacent 44px targets don't overlap the 8px fuzzy
     zone between tap centers. */
  .hdr-btn{min-width:44px;min-height:44px}
  .hdr-btns{gap:8px}
  .section-header .sh-btn{min-width:32px;min-height:32px;padding:6px}
  /* RNEW-UX-011: bumped from 40 to 44 to hit the WCAG 2.5.5 AA floor for
     touch targets. The visual footprint stays the same (padding + icon
     are unchanged); only the hit-box widens. */
  .session-card .btn-dismiss{min-width:44px;min-height:44px;padding:8px;font-size:19px;opacity:.75}
  .btn-mobile-back{min-width:44px;min-height:44px}
  /* RNEW-UX-011: manual-reconnect chip was 22px tall — impossible to tap
     reliably on a phone right after a WS blip. Only grow the hit-box on
     coarse pointers so desktop keeps the compact 11px / 22px chrome. */
  .sidebar-status .status-reconnect{min-width:44px;min-height:44px;padding:8px 12px;font-size:13px}
  .empty-cta-btn{min-height:44px}
  .fv-btn{min-width:40px;min-height:40px}
  /* Inline @file reference chips: keep the visual small but grow the tap area. */
  .file-ref .fr-btn{min-width:32px;min-height:32px;padding:4px 8px}
  /* "Load earlier" pagination button in event stream. */
  .earlier-events-btn{min-height:36px}
}

/* ---- Track B: font-size floors to prevent iOS Safari auto-zoom on focus ---- */
/* Any editable control needs >=16px computed font-size or Safari zooms in. */
.login-panel input[type="password"]{font-size:16px}
@media(max-width:768px){
  .freq-num,.freq-time,.freq-select{font-size:16px}
  /* Todo chips / task metadata shouldn't overpower the message body on narrow screens. */
  .md-task-chip,.todo-chip{font-size:12px;line-height:1.35}
}

/* ---- Track C: responsive breakpoints for landscape phones & small tablets ---- */
/* iPhone landscape (844x390) and similar touch devices with limited vertical space
   should use the same drawer UX as portrait phones. Adds to existing 768px rule,
   does not override it. */
@media (max-width: 950px) and (orientation: landscape) and (pointer: coarse){
  .container{display:block;height:100%;overflow:hidden}
  .sidebar{position:fixed;inset:0;width:100%!important;min-width:0;max-width:none;z-index:10;background:var(--nz-bg-0);transform:translateX(0);transition:transform .25s ease;border-right:none;overflow:hidden}
  body.mobile-chat-view .sidebar{transform:translateX(-100%)}
  body.mobile-list-view .sidebar{transform:translateX(0)}
  .resizer{display:none}
  .main{position:fixed;top:var(--vv-top,0);left:0;right:0;height:var(--vv-height,100dvh);width:100%;display:flex;flex-direction:column;z-index:5;overflow:hidden}
  .sidebar{top:var(--vv-top,0);height:var(--vv-height,100%);bottom:auto}
  .btn-mobile-back{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;width:40px;height:40px;background:none;border:none;color:var(--nz-text-mute);font-size:20px;cursor:pointer;padding:0;border-radius:6px;-webkit-tap-highlight-color:transparent}
}

/* ---- Track D: semantic badge colors — red only means "needs attention" ---- */
/* Tokens are consumed by the canonical .hdr-badge rule earlier in this
   file (base=neutral). Alert / warn variants stay here so the "opt-in
   red" intent is obvious at the point of definition: JS adds .is-alert
   when attention > 0, never by default. */
:root{
  --nz-badge-info:#30363d;       /* neutral count */
  --nz-badge-info-text:#c9d1d9;
  --nz-badge-warn:#d29922;       /* amber */
  --nz-badge-danger:#da3633;     /* unchanged red, opt-in */
}
.hdr-badge.is-alert{background:var(--nz-badge-danger);color:#fff;border-color:transparent}
.hdr-badge.is-warn{background:var(--nz-badge-warn);color:#1b1b1b;border-color:transparent}

/* ==========================================================================
   UX sweep vol.2 — high-resolution desktop layout (2026-04-27)
   Targets QHD (2560x1440), 4K, ultrawide. Leaves <=1440px untouched.
   All rules are min-width queries that stack progressively; the legacy
   1200px clamp on .event still applies below 1600px.
   ========================================================================== */

/* Reading column widens proportionally so wide screens don't feel empty. */
@media (min-width: 1600px){
  .event{max-width:min(1320px, 72vw)}
  .event.text .event-content{max-width:min(1240px, 68vw)}
  .event.todo .event-content{max-width:min(1000px, 58vw)}
  .event.user .event-content{max-width:min(80%, 640px)}
}
@media (min-width: 2200px){   /* QHD bracket — 2560x1440 lands here */
  .event{max-width:min(1560px, 62vw)}
  .event.text .event-content{max-width:min(1460px, 58vw)}
  .event.todo .event-content{max-width:min(1100px, 50vw)}
}
@media (min-width: 3200px){   /* 4K / 5K / ultrawide */
  .event{max-width:min(1800px, 52vw)}
  .event.text .event-content{max-width:min(1700px, 48vw)}
  .event.todo .event-content{max-width:min(1200px, 42vw)}
}

/* Main-header + composer align to the reading column so the "full-width shell
   + narrow content" feeling disappears at 2560+. */
@media (min-width: 1600px){
  .main-header{max-width:min(1380px, 75vw);margin-left:auto;margin-right:auto;width:100%}
  .input-area{max-width:min(1380px, 75vw);margin-left:auto;margin-right:auto;width:100%}
}
@media (min-width: 2200px){
  .main-header{max-width:min(1580px, 64vw)}
  .input-area{max-width:min(1580px, 64vw)}
}
@media (min-width: 3200px){
  .main-header{max-width:min(1820px, 54vw)}
  .input-area{max-width:min(1820px, 54vw)}
}

/* Sidebar widens gently so it's not a thin stripe. Inline style set by the
   .resizer JS uses element.style.width, which has higher specificity than
   these rules, so users who manually resized keep their choice. */
@media (min-width: 1920px){ .sidebar{width:400px} }
@media (min-width: 2560px){ .sidebar{width:420px} }
@media (min-width: 3200px){ .sidebar{width:460px} }

/* Aside (scratch) drawer — right-side preview pane for follow-up questions
   ("追问"). Intentionally mirrors .fv-drawer's surface treatment (bg-1,
   box-shadow, z-index, slide transition) so the dashboard has a single
   "drawer" visual vocabulary, and reuses .main-header + .input-area token
   spacing so the input/header feel matches the main transcript. */
.aside-drawer{position:fixed;top:0;right:0;bottom:0;width:min(420px,94vw);background:var(--nz-bg-1);border-left:1px solid var(--nz-border);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s ease;box-shadow:-2px 0 12px rgba(0,0,0,.4)}
.aside-drawer.visible{transform:translateX(0)}
/* Header shares .fv-header's proportions (10px 14px padding, min-height 48px,
   13px title). Background inherits .aside-drawer bg-1; no separate color so
   the header melts into the drawer body like file-viewer does. */
.aside-drawer .ad-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--nz-border);flex-shrink:0;min-height:48px}
.aside-drawer .ad-title{flex:1;min-width:0;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--nz-text-strong);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.aside-drawer .ad-title .ad-agent{color:var(--nz-text-dim);font-weight:400;font-size:12px;margin-left:4px;overflow:hidden;text-overflow:ellipsis}
.aside-drawer .ad-actions{display:flex;gap:6px;flex-shrink:0}
/* Close button borrows .fv-close directly (font-size:18;line-height:1;padding:0 8px)
   so its optical weight matches the file-viewer drawer users already know. */
.aside-drawer .ad-close{height:26px;padding:0 8px;border:1px solid var(--nz-border);border-radius:6px;background:var(--nz-bg-2);color:var(--nz-text);font-size:18px;line-height:1;font-family:inherit;cursor:pointer;transition:all .15s}
.aside-drawer .ad-close:hover{background:var(--nz-bg-0);border-color:var(--nz-accent);color:var(--nz-accent)}
.aside-drawer .ad-quote-chip{padding:6px 14px;font-size:11px;color:var(--nz-text-dim);background:var(--nz-bg-2);border-bottom:1px solid var(--nz-border);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;flex-shrink:0}
.aside-drawer .ad-quote-chip:hover{color:var(--nz-text-mute)}
.aside-drawer .ad-quote-chip .ad-arrow{color:var(--nz-text-faint);flex-shrink:0}
.aside-drawer .ad-quote-chip .ad-preview{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-style:italic}
.aside-drawer .ad-quote-chip.expanded .ad-preview{white-space:pre-wrap;font-style:normal}
.aside-drawer .ad-quote-chip .ad-trunc{color:var(--nz-red);font-size:10px;margin-left:4px;flex-shrink:0}
.aside-drawer .ad-quote-chip .ad-ctx{color:var(--nz-text-faint);font-size:10px;margin-left:4px;flex-shrink:0}
/* Messages area mirrors .events (padding:16px 0, thin scrollbar). */
.aside-drawer .ad-messages{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 0;scrollbar-width:thin;scrollbar-color:var(--nz-border) transparent;min-width:0;background:var(--nz-bg-0)}
/* Narrow-drawer compression for .event rows: main window uses 6px 24px but
   on a 420px drawer that leaves too little content width. Mobile overrides
   below restore the main-window padding when the drawer is full-screen. */
.aside-drawer .ad-messages .event{max-width:100%;padding:4px 14px}
.aside-drawer .ad-messages .event.user .event-content,
.aside-drawer .ad-messages .event.text .event-content{max-width:95%}
.aside-drawer .ad-empty{padding:40px 20px;text-align:center;color:var(--nz-text-dim);font-size:13px;line-height:1.5}
/* Input area reuses .input-area's visual weight (12px 20px → 10px 14px here
   for the narrower drawer; bg-0 keeps the "floor" feel aligned). */
.aside-drawer .ad-input-area{border-top:1px solid var(--nz-border);padding:10px 14px;flex-shrink:0;background:var(--nz-bg-0)}
.aside-drawer .ad-input-row{display:flex;gap:8px;align-items:flex-end}
/* Input shares #msg-input's box model exactly: same bg, radius, padding,
   min-height 38px, font-size 16px (iOS-zoom safe), max-height 120px. */
.aside-drawer .ad-input{flex:1;background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:8px;color:var(--nz-text);padding:8px 12px;font-family:inherit;font-size:16px;min-height:38px;max-height:120px;outline:none;line-height:1.4;resize:none;overflow-y:auto;-webkit-user-select:text;user-select:text}
.aside-drawer .ad-input:focus{border-color:var(--nz-accent)}
/* Send button IS .btn-icon + .btn-send in visual terms — copy their tokens
   so the hover colour, green fill, border-radius, and 36×36 size match
   the main transcript send key. Feels like the same button. */
.aside-drawer .ad-send{width:36px;height:36px;border:1px solid #238636;background:#238636;border-radius:8px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:all .15s}
.aside-drawer .ad-send:hover{background:#2ea043}
.aside-drawer .ad-send:disabled{opacity:.5;cursor:default;pointer-events:none}
/* Save button follows .btn-icon but full-width + neutral fill. */
.aside-drawer .ad-save-btn{display:none;margin-top:8px;width:100%;background:var(--nz-bg-1);border:1px solid var(--nz-border);border-radius:8px;color:var(--nz-text);padding:8px 12px;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;min-height:36px}
.aside-drawer .ad-save-btn.visible{display:block}
.aside-drawer .ad-save-btn:hover{background:var(--nz-bg-2);border-color:var(--nz-accent);color:var(--nz-accent)}
.aside-drawer .ad-loading{display:none;padding:6px 14px;font-size:11px;color:var(--nz-text-faint);font-style:italic;animation:pulse 1.5s ease-in-out infinite}
.aside-drawer .ad-loading.visible{display:block}
/* Phone breakpoint: match .fv-drawer's full-width treatment and apply the
   same safe-area handling the main .input-area uses so the composer doesn't
   disappear behind the notch / home indicator. */
@media (max-width: 768px){
  .aside-drawer{width:100%;max-width:100vw;border-left:none}
  .aside-drawer .ad-header{padding:max(10px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) 10px max(14px,env(safe-area-inset-left))}
  .aside-drawer .ad-messages .event{padding:6px 20px}
  .aside-drawer .ad-input-area{padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right));padding-bottom:max(10px,env(safe-area-inset-bottom))}
  /* Follow the main window's touch-target scaling: .btn-icon grows to 40×40
     under ≤768 and to min 44×44 under pointer:coarse. Mirror here so the
     send key on phones is the same size as the main composer's. */
  .aside-drawer .ad-send{width:40px;height:40px}
}
@media (pointer: coarse){
  .aside-drawer .ad-send,.aside-drawer .ad-close,.aside-drawer .ad-save-btn{min-width:44px;min-height:44px}
}
/* Ask-aside (↗ 追问) button on AI bubbles. Sits next to the copy button in
   the bubble footer; borrows the same box model so the two buttons line up
   pixel-for-pixel. Tap target enlarges under pointer:coarse along with
   .event-copy-btn — kept in sync so both bubble actions grow together. */
.event-ask-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1px solid var(--nz-border);border-radius:4px;color:var(--nz-text-faint);font-size:11px;padding:1px 8px;cursor:pointer;transition:color .15s,border-color .15s,opacity .12s;line-height:1.6;margin-top:8px;margin-left:6px}
.event-ask-btn:hover{color:var(--nz-accent);border-color:var(--nz-accent)}
/* Mirror .event-copy-btn.hover-only so both bubble actions reveal
   together on hover / keyboard focus and stay hidden otherwise. */
.event-ask-btn.hover-only{opacity:0}
.event:hover .event-ask-btn.hover-only,.event-ask-btn.hover-only:focus-visible{opacity:1}
@media (pointer: coarse){
  .event-ask-btn,.event-copy-btn{font-size:12px;padding:4px 10px;min-height:32px}
}

/* AskUserQuestion interactive card. Rendered as a bubble of type
   .event.ask_question; mirrors .event.todo density (tight vertical rhythm,
   high contrast borders) so the card reads as an actionable block without
   overwhelming the conversation. */
.event.ask_question .ask-card{border:1px solid var(--nz-border);border-radius:8px;padding:12px 14px;background:var(--nz-bg-1)}
.event.ask_question .ask-title{font-size:11px;color:var(--nz-text-faint);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.ask-q-group + .ask-q-group{margin-top:14px;padding-top:12px;border-top:1px solid var(--nz-bg-2)}
.ask-q-header{font-size:12px;color:var(--nz-text-faint);margin-bottom:2px}
.ask-q-text{font-size:14px;line-height:1.5;color:var(--nz-text);margin-bottom:6px}
.ask-q-hint{font-size:11px;color:var(--nz-text-faint);margin-bottom:8px;font-style:italic}
.ask-opts{display:flex;flex-direction:column;gap:6px}
.ask-opt{text-align:left;display:flex;flex-direction:column;gap:2px;background:var(--nz-bg-0);border:1px solid var(--nz-border);border-radius:6px;padding:8px 10px;cursor:pointer;color:var(--nz-text);font:inherit;transition:border-color .15s,background .15s,color .15s;width:100%;box-sizing:border-box;min-width:0;white-space:normal;word-break:break-word;overflow-wrap:anywhere}
.ask-opt:hover:not([disabled]){border-color:var(--nz-accent);background:var(--nz-bg-2)}
.ask-opt.selected{border-color:var(--nz-accent);background:var(--nz-bg-2);color:var(--nz-accent)}
.ask-opt[disabled]{opacity:.55;cursor:not-allowed}
.ask-opt-label{font-size:14px;font-weight:500;word-break:break-word;overflow-wrap:anywhere}
.ask-opt-desc{font-size:12px;color:var(--nz-text-faint);line-height:1.45;word-break:break-word;overflow-wrap:anywhere}
.ask-submit-row{margin-top:14px;padding-top:12px;border-top:1px solid var(--nz-bg-2);display:flex;justify-content:flex-end}
.ask-submit{background:var(--nz-accent);color:var(--nz-bg-0);border:none;border-radius:6px;padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;font:inherit;transition:opacity .15s}
.ask-submit[disabled]{opacity:.4;cursor:not-allowed}
.ask-status{margin-top:10px;font-size:12px;color:var(--nz-text-faint);padding-top:8px;border-top:1px dashed var(--nz-bg-2);word-break:break-word;overflow-wrap:anywhere}
@media (pointer: coarse){
  .ask-opt{padding:10px 12px}
  .ask-submit{min-height:36px;padding:8px 16px}
}
/* AskUserQuestion 卡片在手机上的紧凑布局：
   1) 卡片 padding 收紧，把横向空间还给选项
   2) 提交按钮全宽（手机上拇指难以精准命中右下角小按钮）
   3) degraded 卡同样收紧，避免左侧 border + 内边距双重缩水可读区
   4) 防止长 label / 选项文本撑破 .ask-card 触发横向滚动 */
@media(max-width:768px){
  .event.ask_question .ask-card{padding:10px 12px}
  .ask-q-group + .ask-q-group{margin-top:12px;padding-top:10px}
  .ask-submit-row{justify-content:stretch}
  .ask-submit{width:100%;padding:10px 16px;font-size:14px}
  .ask-degraded .ask-degraded-q{padding:6px 8px}
}
@media(max-width:480px){
  .event.ask_question .ask-card{padding:8px 10px}
  .ask-q-text{font-size:13px;line-height:1.45}
  .ask-opt-label{font-size:13px}
  .ask-opt-desc{font-size:11px}
}

/* Memory wiki-link [[slug]] inline marker + hover/click popover.
   docs/rfc/memory-link-rendering.md. The .md-memlink span is emitted by
   inlineMd; the popover container lives at the end of body and is
   positioned via JS. Broken-link variant uses dotted underline so users
   can tell at a glance which links resolved. */
/* Chip variant (B+D): type emoji + short label, color-coded per memory type.
   Full slug + body still appear in the hover popover below. */
.md-memlink{display:inline-flex;align-items:baseline;gap:4px;
  padding:0 8px 1px 7px;border-radius:10px;
  background:var(--nz-bg-2);color:var(--nz-text);
  border:1px solid transparent;
  font-size:12px;line-height:1.5;cursor:help;text-decoration:none;
  vertical-align:baseline;
  transition:background .12s, border-color .12s, box-shadow .12s}
.md-memlink:hover,.md-memlink:focus{background:var(--nz-bg-1);
  border-color:var(--nz-accent);outline:none;
  box-shadow:0 0 0 1px rgba(88,166,255,.15)}
.md-memlink-icon{font-size:10.5px;display:inline-block;flex:0 0 auto;
  filter:saturate(.9)}
.md-memlink-label{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  font-size:11.5px;letter-spacing:.01em}
.md-memlink[data-type="feedback"]{background:#3a2a14;color:#f7c97a}
.md-memlink[data-type="user"]{background:#1a3a2c;color:#7ad9a3}
.md-memlink[data-type="project"]{background:#1a2a4a;color:#7aacf7}
.md-memlink[data-type="reference"]{background:#3a1a3a;color:#d97af7}
.md-memlink[data-type="memory"]{background:var(--nz-bg-2);color:var(--nz-text)}
.md-memlink-broken,.md-memlink-broken[data-type]{
  background:transparent !important;color:var(--nz-text-mute) !important;
  border:1px dashed var(--nz-text-mute);cursor:not-allowed}
.md-memlink-broken .md-memlink-icon{filter:grayscale(1) opacity(.6)}
.md-memlink-broken:hover{background:rgba(139,148,158,.08) !important}
#mem-popover{position:fixed;z-index:300;max-width:560px;min-width:320px;
  max-height:60vh;overflow:auto;background:var(--nz-bg-1);
  border:1px solid var(--nz-border);border-radius:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);padding:14px 16px;
  font-size:13px;line-height:1.55;color:var(--nz-text);display:none}
#mem-popover.show{display:block}
#mem-popover.pinned{box-shadow:0 8px 32px rgba(0,0,0,.7),
  0 0 0 1px var(--nz-accent)}
.mem-pop-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;
  padding-bottom:8px;border-bottom:1px solid var(--nz-bg-2);
  font-size:11px;color:var(--nz-text-mute);flex-wrap:wrap}
.mem-pop-type{padding:1px 8px;background:var(--nz-bg-2);border-radius:10px;
  font-size:11px;text-transform:uppercase;letter-spacing:.04em;
  color:var(--nz-text-strong)}
.mem-pop-type[data-type="feedback"]{background:#3a2a14;color:#f7c97a}
.mem-pop-type[data-type="user"]{background:#1a3a2c;color:#7ad9a3}
.mem-pop-type[data-type="project"]{background:#1a2a4a;color:#7aacf7}
.mem-pop-type[data-type="reference"]{background:#3a1a3a;color:#d97af7}
.mem-pop-scope{color:var(--nz-text-faint)}
.mem-pop-slug{font-family:ui-monospace,Menlo,monospace;color:var(--nz-text-strong);
  font-size:13px;font-weight:500;margin-bottom:4px;word-break:break-all}
.mem-pop-desc{color:var(--nz-text);margin-bottom:10px;font-style:italic}
.mem-pop-body{color:var(--nz-text);font-size:13px}
.mem-pop-body p:first-child{margin-top:0}
.mem-pop-body p:last-child{margin-bottom:0}
.mem-pop-body pre{background:var(--nz-bg-0);padding:8px;border-radius:4px;
  overflow-x:auto;font-size:12px}
.mem-pop-error{color:var(--nz-text-mute);font-style:italic}
.mem-pop-close{position:absolute;top:8px;right:10px;background:none;border:none;
  color:var(--nz-text-mute);font-size:18px;cursor:pointer;line-height:1;
  padding:2px 6px;display:none}
#mem-popover.pinned .mem-pop-close{display:block}
.mem-pop-close:hover{color:var(--nz-text-strong)}

</style>
</head>
<body>
<div class="container">
  <nav class="sidebar" id="sidebar" aria-label="会话列表">
    <div class="sidebar-header">
      <div class="header-row">
        <h1>naozhi</h1>
        <div class="hdr-btns">
          <button class="hdr-btn" id="btn-sidebar-search" onclick="toggleSidebarSearch()" title="搜索会话 (按 /)" aria-label="搜索会话" aria-expanded="false"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
          <button class="hdr-btn" id="btn-history" onclick="toggleHistory()" title="历史会话" aria-label="查看会话历史" aria-haspopup="dialog"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg><span class="hdr-badge" id="history-badge" style="display:none" aria-label="历史记录数"></span></button>
          <button class="hdr-btn" onclick="createNewSession()" title="New Session" aria-label="Create new session"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          <button class="hdr-btn" id="btn-cron" onclick="openCronPanel()" title="定时任务" aria-label="定时任务面板"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 1.5"/><path d="M5 3L2 6"/><path d="M22 6l-3-3"/><path d="M6.38 18.7L4 21"/><path d="M17.64 18.67L20 21"/></svg><span class="hdr-badge" id="cron-badge" style="display:none" aria-label="定时任务数"></span></button>
          <!-- THEME-1 (#453) — theme cycler. One button cycles auto→light→dark
               (3 states, single click each). Inline SVG swapped by
               cycleTheme() in dashboard.js to surface current mode. -->
          <button class="hdr-btn" id="btn-theme" title="切换主题 (跟随系统/浅色/深色)" aria-label="切换主题"><svg id="theme-icon-auto" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="9"/><path d="M12 3v18"/><path d="M12 12a9 9 0 0 0 0-9"/></svg></button>
        </div>
      </div>
      <!-- UX-P3 sidebar search: default-hidden, toggled via btn-sidebar-search
           or the `/` shortcut. Kept outside #session-list so sessions_update
           re-renders don't blow away the input value or its focus. -->
      <div class="sidebar-search" id="sidebar-search" style="display:none">
        <input type="text" id="sidebar-search-input" class="sidebar-search-input" placeholder="搜索会话、项目或 CLI 名..." autocomplete="off" spellcheck="false" aria-label="搜索会话" />
        <button type="button" class="sidebar-search-clear" id="sidebar-search-clear" onclick="closeSidebarSearch()" title="关闭搜索" aria-label="关闭搜索">&times;</button>
      </div>
    </div>
    <!-- Node selector: shown only when multiple nodes are connected. Replaces
         the per-card .sc-node badge and the per-node rows in .sidebar-status;
         switching a node filters the list to that node's sessions. -->
    <div class="node-selector" id="node-selector" hidden>
      <button type="button" class="ns-trigger" id="ns-trigger" aria-haspopup="listbox" aria-expanded="false" aria-controls="ns-dropdown" onclick="toggleNodeSelector(event)">
        <span class="ns-dot off" id="ns-trigger-dot"></span>
        <span class="ns-label" id="ns-trigger-label">Local</span>
        <svg class="ns-chev" viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        <!-- UI Round 5 R5-5: alert dot 移到 chevron 之外，明确"展开下拉里有
             异常"而非"当前节点异常"。之前夹在 label 和 chevron 之间，操作员
             误解为 connected 状态出错。 -->
        <span class="ns-alert" id="ns-trigger-alert" hidden title="其他节点有异常"></span>
      </button>
      <div class="ns-dropdown" id="ns-dropdown" role="listbox" aria-label="选择节点" hidden></div>
    </div>
    <div class="session-list" id="session-list" role="list">
      <!-- RNEW-UX-012 — 3 skeleton cards pre-fetch. renderSidebar() replaces
           innerHTML on first successful data load, so skeletons vanish
           naturally without any extra teardown logic. -->
      <div class="skeleton-card" aria-hidden="true"><div class="skeleton-line sk-title"></div><div class="skeleton-line sk-meta"></div></div>
      <div class="skeleton-card" aria-hidden="true"><div class="skeleton-line sk-title"></div><div class="skeleton-line sk-meta"></div></div>
      <div class="skeleton-card" aria-hidden="true"><div class="skeleton-line sk-title"></div><div class="skeleton-line sk-meta"></div></div>
    </div>
  </nav>
  <div class="resizer" id="resizer" role="separator" aria-orientation="vertical" aria-label="拖动调整侧栏宽度" tabindex="0">
    <button type="button" class="resizer-handle" id="btn-sidebar-toggle" onclick="toggleSidebarCollapsed()" title="收起/展开侧边栏 (按 [)" aria-label="切换侧边栏" aria-controls="sidebar" aria-expanded="true"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><polyline points="15 18 9 12 15 6"/></svg></button>
  </div>
  <main class="main" id="main" aria-label="会话内容">
    <!-- Cold-start empty state. MUST stay in lockstep with mainEmptyHtml() in
         dashboard.js — dismiss/remove paths call that helper to repaint this
         region, and any divergence creates a "English on first load, Chinese
         after dismiss" regression. TestDashboardHTML_R140_ColdStartEmptyStateMatchesHelper
         locks the two copies together.

         "问点什么？"输入框即空态主 CTA — 敲字 Enter 直接起一个 quick session
         （默认工作目录 + general agent），跳过项目 palette 与弹窗选择，
         最贴近"快速查询"的使用心智。侧栏的 `+` 入口保留给项目化工作流。 -->
    <div class="empty-state empty-cta empty-quick" style="flex-direction:column;gap:14px">
      <span style="font-size:40px;opacity:.35" aria-hidden="true">&gt;_</span>
      <div style="color:var(--nz-text);font-size:17px">问点什么？</div>
      <form class="quick-ask-form" onsubmit="event.preventDefault();submitQuickAsk(event)">
        <textarea id="quick-ask-input" class="quick-ask-input" rows="1" placeholder="Enter 发送 · Shift+Enter 换行" autocomplete="off" spellcheck="false" aria-label="快速提问输入框"></textarea>
        <button type="submit" class="quick-ask-send" aria-label="发送"><svg viewBox="0 0 24 24" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </form>
      <div style="font-size:12px;color:var(--nz-text-dim)">默认目录 · general agent · 随时 <code>/cd</code> 切换目录，或用上方 <b>+</b> 开项目会话</div>
      <!-- R110-P1 Home panel slot: renderRecentSessionsPanel() fills this
           with up to 5 most-recently-active session cards after fetchSessions
           lands. Stays empty on cold-start (no data yet) or when there are
           zero sessions, so the minimal empty-state UX doesn't regress. -->
      <div id="recent-sessions-panel" class="recent-panel-wrap"></div>
    </div>
  </main>
</div>
<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
<!-- RNEW-UX-010 — dedicated polite live region for non-toast announcements
     (WS state transitions, new sessions, cron completions). Kept separate
     from #toast so toast re-paints don't interrupt in-flight announcements
     and vice-versa. announce() in dashboard.js drives this element. -->
<div id="sr-announce" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>
<aside class="fv-drawer hidden" id="fv-drawer" role="dialog" aria-modal="false" aria-label="文件预览">
  <header class="fv-header">
    <div class="fv-title-wrap">
      <span class="fv-title" id="fv-title">文件</span>
      <span class="fv-meta" id="fv-meta"></span>
    </div>
    <div class="fv-actions">
      <button type="button" class="fv-btn" id="fv-btn-copy" title="复制路径" aria-label="复制路径">复制</button>
      <button type="button" class="fv-btn" id="fv-btn-download" title="下载文件" aria-label="下载文件">下载</button>
      <button type="button" class="fv-btn fv-close" id="fv-btn-close" title="关闭" aria-label="关闭预览">&times;</button>
    </div>
  </header>
  <div class="fv-body" id="fv-body"></div>
</aside>
<aside class="aside-drawer" id="aside-drawer" role="dialog" aria-modal="false" aria-label="追问抽屉">
  <header class="ad-header">
    <div class="ad-title">
      <span>↗ 追问</span>
      <span class="ad-agent" id="ad-agent"></span>
    </div>
    <div class="ad-actions">
      <button type="button" class="ad-close" id="ad-close" title="关闭" aria-label="关闭追问窗口">&times;</button>
    </div>
  </header>
  <div class="ad-quote-chip" id="ad-quote-chip" title="点击展开/回到源消息">
    <span class="ad-arrow">↳</span>
    <span class="ad-preview" id="ad-quote-preview"></span>
    <span class="ad-trunc" id="ad-quote-trunc" style="display:none">(已截断)</span>
    <span class="ad-ctx" id="ad-quote-ctx" style="display:none" title="已将源会话中此消息前后若干轮作为上下文注入"></span>
  </div>
  <div class="ad-messages" id="ad-messages">
    <div class="ad-empty" id="ad-empty">就这段内容问点什么？<br><span style="font-size:11px;color:var(--nz-text-faint)">此窗口的对话不会出现在主窗口</span></div>
  </div>
  <div class="ad-loading" id="ad-loading">正在思考…</div>
  <div class="ad-input-area">
    <div class="ad-input-row">
      <textarea class="ad-input" id="ad-input" rows="1" placeholder="问一下这段内容…"></textarea>
      <button type="button" class="ad-send" id="ad-send" title="发送" aria-label="发送">↵</button>
    </div>
    <button type="button" class="ad-save-btn" id="ad-save" title="保存为正式会话">💾 保存为正式会话</button>
  </div>
</aside>
<div class="voice-overlay" id="voice-overlay" role="dialog" aria-modal="true" aria-label="语音录制">
  <div class="vo-card">
    <div class="vo-timer" id="vo-timer" aria-live="off">0s</div>
    <div class="vo-wave" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="vo-hint" id="vo-hint"></div>
  </div>
</div>
<!-- §16 inline-expand 回归: cron-run-sheet 浮层 DOM 已删，详情现在直接嵌
     在 timeline 行下方（cronTimelineRowHtml 内 .ctr-detail 容器）。 -->
<div id="mem-popover" role="dialog" aria-label="记忆预览" aria-hidden="true">
  <button type="button" class="mem-pop-close" id="mem-pop-close" aria-label="关闭预览">&times;</button>
  <div id="mem-pop-content"></div>
</div>
<script src="/static/dashboard.js"></script>
<script src="/static/agent_view.js"></script>
</body>
</html>
