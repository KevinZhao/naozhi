name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag is on master
        run: |
          if ! git branch -r --contains "${{ github.sha }}" | grep -q 'origin/master'; then
            echo "::error::Tag must be on master branch"
            exit 1
          fi

  build:
    needs: check-branch
    runs-on: ubuntu-latest
    strategy:
      # A single matrix cell failure should not cancel sibling builds.
      # Without fail-fast: false, any late-breaking build break on one arch
      # wipes the already-compiled artifacts from the others.
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          # Windows is intentionally not in the release matrix: internal/shim
          # relies on POSIX-only syscalls (Kill, Setsid) that do not exist in
          # syscall.SysProcAttr on windows/*, and install.sh already refuses
          # MINGW/MSYS/CYGWIN targets. Re-adding Windows requires a compat
          # layer in internal/shim behind build tags (_unix.go / _windows.go).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUTPUT="naozhi-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/${OUTPUT}" ./cmd/naozhi/
          cd dist && sha256sum "${OUTPUT}" > "${OUTPUT}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: naozhi-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Need the repo for install.sh to ship as a release asset. install.sh
      # is intentionally static (no per-release substitution); it fetches
      # checksums.txt from whichever tag it targets at runtime.
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Create checksums file
        run: cat dist/*.sha256 > dist/checksums.txt

      - name: Stage install.sh
        # Copy into dist/ so it is uploaded alongside the binaries. Raw GitHub
        # (raw.githubusercontent.com/.../master/install.sh) remains the primary
        # distribution URL; this copy exists so a user who pins a version can
        # also pin the exact installer that shipped with it.
        run: cp install.sh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/naozhi-*
            dist/checksums.txt
            dist/install.sh
