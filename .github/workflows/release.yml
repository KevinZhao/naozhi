name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify tag is on master
        run: |
          if ! git branch -r --contains "${{ github.sha }}" | grep -q 'origin/master'; then
            echo "::error::Tag must be on master branch"
            exit 1
          fi

  build:
    needs: check-branch
    runs-on: ubuntu-latest
    strategy:
      # A single matrix cell failure should not cancel sibling builds.
      # Without fail-fast: false, any late-breaking build break on one arch
      # wipes the already-compiled artifacts from the others.
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          # Windows is not in the release matrix: install.sh refuses MINGW/MSYS/
          # CYGWIN and the shim requires POSIX process semantics (Setsid, Kill)
          # that have no Windows equivalent even with the syscall build-tag split.
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUTPUT="naozhi-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "dist/${OUTPUT}" ./cmd/naozhi/
          cd dist && sha256sum "${OUTPUT}" > "${OUTPUT}.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: naozhi-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  # Post-deploy screenshot gate. Boots the freshly built linux/amd64 binary in
  # dashboard-only mode (no Feishu creds, stub CLI) and drives every top-level
  # dashboard view with Playwright, asserting render + zero-console-error per
  # view. `release` needs this job, so a gate failure blocks the GitHub Release
  # from being published — `naozhi upgrade` only sees tagged Release assets, so
  # a broken dashboard can never reach an upgrading operator even though the tag
  # already exists. Runner cannot reach the operator's systemd instance, so this
  # validates the binary's own embedded dashboard, which is byte-identical to
  # what ships. See scripts/release-gate.mjs + docs/ops/release-gate.md.
  e2e-gate:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v8
        with:
          name: naozhi-linux-amd64
          path: dist/

      - name: Install Playwright + chromium
        working-directory: test/e2e
        # npm install (not ci): repo policy gitignores package-lock.json
        # (.gitignore:18), and the suite has a single pinned dep.
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run screenshot gate
        env:
          NAOZHI_GATE_BIN: dist/naozhi-linux-amd64
        run: |
          chmod +x dist/naozhi-linux-amd64
          ./scripts/gate-instance.sh

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-screenshots
          path: tmp/release-gate/
          if-no-files-found: warn

  release:
    needs: [build, e2e-gate]
    runs-on: ubuntu-latest
    steps:
      # Need the repo for install.sh to ship as a release asset. install.sh
      # is intentionally static (no per-release substitution); it fetches
      # checksums.txt from whichever tag it targets at runtime.
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Create checksums file
        run: cat dist/*.sha256 > dist/checksums.txt

      - name: Stage install.sh
        # Copy into dist/ so it is uploaded alongside the binaries. Raw GitHub
        # (raw.githubusercontent.com/.../master/install.sh) remains the primary
        # distribution URL; this copy exists so a user who pins a version can
        # also pin the exact installer that shipped with it.
        run: cp install.sh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/naozhi-*
            dist/checksums.txt
            dist/install.sh
